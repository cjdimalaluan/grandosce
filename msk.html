<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSK OSCE Master - Official Reviewer Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }

        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .chat-bubble-student { background-color: #0891b2; color: #ffffff; border-radius: 1.25rem 1.25rem 0.25rem 1.25rem; }
        .chat-bubble-examiner { background-color: #f1f5f9; color: #334155; border-radius: 1.25rem 1.25rem 1.25rem 0.25rem; border: 1px solid #e2e8f0; }
        
        .blank-hidden { background-color: #e2e8f0; color: transparent; user-select: none; border-bottom: 2px dashed #0891b2; transition: all 0.2s ease;}
        .blank-hidden:hover { background-color: #cbd5e1; color: transparent; transform: scale(1.02); }
        
        .toggle-checkbox:checked { right: 0; border-color: #0891b2; }
        .toggle-checkbox:checked + .toggle-label { background-color: #0891b2; }

        .xray-hotspot { fill: transparent; stroke: transparent; cursor: pointer; transition: all 0.2s; }
        .xray-hotspot:hover { stroke: #06b6d4; stroke-width: 3; fill: rgba(6, 182, 212, 0.2); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-cyan-200 selection:text-cyan-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- DATA STRUCTURES ---

        const mskData = {
            intro: "0. INTRODUCTION & CONSENT\n\n1. Identity & Role:\nMagandang araw/hapon po. Ako po si {CJ}, isang estudyanteng doktor dito sa {PGH}. Maaari ko po bang malaman ang inyong {buong pangalan at edad}?\n\n2. Purpose & Confidentiality:\nNandito po ako ngayon para {magsagawa ng pisikal na eksaminasyon sa inyong buto at kasukasuan} upang malaman ang sanhi ng inyong nararamdaman, at upang mabigyan natin ito ng lunas. Gusto ko pong ipaalala na ang lahat ng pag-uusapan at gagawin natin ay {mananatiling pribado} at para lamang sa aming medical team na tutulong sa inyo, maliban na lang kung may kinalaman ito sa inyong {kaligtasan} o ng ibang tao.\n\n3. Consent:\n{Okay lang po ba} na magsimula tayo?",
            
            ddx: "1. Localize: {Joint} vs. {Periarticular} vs. {Referred pain}.\n2. VINDICATE: {Vascular, Inflammatory/Infectious, Neoplastic, Degenerative, Idiopathic, Congenital, Autoimmune, Traumatic, Endocrine}.\n3. Patient Profile: Filter by {Age, Sex, Occupation}.\n4. Pain Pattern: {Mechanical} (worse with use, better with rest) vs. {Inflammatory} (morning stiffness > 30 mins, improves with use).\n5. Rank & Exclude: Top tier ({Most likely}), Middle tier (Also consider), Bottom tier ({Must exclude/Red flags}).",
            
            xray: "A - Alignment: {Dislocation}, {subluxation}, {step-off} (spondylolisthesis).\nB - Bone Density: {Lytic/blastic} lesions, {diffuse osteopenia}, {sclerosis}.\nC - Cartilage/Joint Space: {Narrowing} (symmetric vs asymmetric).\nD - Dense Shadows: {Soft tissue swelling}, {calcifications}, {loose bodies}.\nS - Special Signs:\n  ◦ Hip OA: {Superolateral} Joint Space Narrowing, LOSS ({Loss of space, Osteophytes, Subchondral sclerosis, Subchondral cysts}).\n  ◦ RA: {Periarticular osteopenia}, {marginal erosions}, {symmetric} narrowing, NO osteophytes.\n  ◦ AS: {Sacroiliitis}, {bamboo spine}, syndesmophytes.\n  ◦ ACL Tear: {Segond fracture} (lateral capsular avulsion).",
            
            pearls: "Swelling Timing: Immediate (0-2h) = {Hemarthrosis} (ACL, fracture). Delayed (6-24h) = {Synovial fluid} (Meniscus).\nMechanisms: {Valgus} force = MCL. {Varus} force = LCL. {Dashboard injury} = PCL. {Rotational} = Meniscus/ACL.\nRed Flags: {Unexplained weight loss}, {night pain}, {fever}, {saddle anesthesia}, {bowel/bladder incontinence}."
        };

        const dermatomes = [
            { root: "L2", motor: "{Hip flexion} (Iliopsoas)", reflex: "{None}", sensation: "{Anterior thigh}", disc: "L1-L2" },
            { root: "L3", motor: "{Knee extension} (Quads)", reflex: "{Patellar}", sensation: "{Anterior lower thigh}", disc: "L2-L3" },
            { root: "L4", motor: "{Ankle dorsiflexion} (Tib Ant)", reflex: "{Patellar}", sensation: "{Medial leg/malleolus}", disc: "L3-L4" },
            { root: "L5", motor: "{Great toe extension} (EHL)", reflex: "{Medial Hamstring}", sensation: "{Lateral leg, dorsal foot}", disc: "L4-L5" },
            { root: "S1", motor: "{Ankle plantarflexion} (Gastroc)", reflex: "{Achilles}", sensation: "{Lateral foot/malleolus}", disc: "L5-S1" },
            { root: "S2-S4", motor: "{Bowel/bladder tone}", reflex: "{Bulbocavernosus}", sensation: "{Perianal (saddle)}", disc: "Central disc" }
        ];

        const specialTests = [
            { name: "Adam's Forward Bend", region: "Spine", perf: "Patient bends forward at waist", pos: "{Rib hump} or asymmetry", path: "{Structural Scoliosis}", sens: "High sensitivity for screening" },
            { name: "Straight Leg Raise (SLR)", region: "Spine", perf: "Passive elevation of symptomatic leg in supine", pos: "Radiating pain below knee at {30-70°}", path: "{L4-S1 nerve root irritation}/disc herniation", sens: "Sens 91%, Spec 26%" },
            { name: "Well Leg Raise", region: "Spine", perf: "Passive elevation of asymptomatic leg", pos: "Pain in {symptomatic leg}", path: "Large space-occupying lesion (disc)", sens: "Sens 29%, Spec 88%" },
            { name: "FABER (Patrick's)", region: "Hip", perf: "Flexion, ABduction, External Rotation", pos: "Groin pain or {posterior SI pain}", path: "Hip joint pathology or {SI joint dysfunction}", sens: "High sensitivity for SIJ" },
            { name: "Schober's Test", region: "Spine", perf: "Mark L5 and 10cm above, patient flexes forward", pos: "Distance increases {< 5cm}", path: "{Ankylosing Spondylitis} (restricted mobility)", sens: "Good clinical indicator" },
            { name: "Thomas Test", region: "Hip", perf: "Patient supine, maximally flexes asymptomatic hip to chest", pos: "{Symptomatic thigh rises} off table", path: "{Hip flexor (iliopsoas) contracture}", sens: "Clinical evaluation standard" },
            { name: "Hip Scour", region: "Hip", perf: "Flex hip & knee, compress and rotate", pos: "Pain, catching, apprehension", path: "{Labral tear, OA}", sens: "Sens 62%, Spec 75%" },
            { name: "Bulge Sign", region: "Knee", perf: "Stroke medial aspect up, lateral aspect down", pos: "{Fluid wave} on medial side", path: "{Minor joint effusion}", sens: "Highly specific for minor effusions" },
            { name: "Valgus Stress", region: "Knee", perf: "Valgus force applied at 0° and 30° flexion", pos: "Laxity or pain", path: "{MCL tear} (at 30°)", sens: "Sens 86-96%" },
            { name: "Varus Stress", region: "Knee", perf: "Varus force applied at 0° and 30° flexion", pos: "Laxity or pain", path: "{LCL tear} (at 30°)", sens: "Sens 25%" },
            { name: "Lachman's Test", region: "Knee", perf: "Knee 20-30° flexed, anterior translation of tibia", pos: "Increased translation, {soft endpoint}", path: "{ACL tear}", sens: "Sens 85%, Spec 94%" },
            { name: "Anterior Drawer", region: "Knee", perf: "Knee 90° flexed, anterior pull on tibia", pos: "Increased translation", path: "{ACL tear}", sens: "Sens 55%, Spec 92%" },
            { name: "Posterior Drawer", region: "Knee", perf: "Knee 90° flexed, posterior push on tibia", pos: "Increased translation backwards", path: "{PCL tear}", sens: "Sens 90%, Spec 99%" },
            { name: "McMurray's Test", region: "Knee", perf: "Flex knee, rotate tibia, extend knee (valgus/varus force)", pos: "Pain or palpable {click}", path: "{Meniscal tear}", sens: "Sens 51%, Spec 77%" }
        ];

        // --- COMPONENTS ---

        const ClozeWord = ({ word, isRecallMode }) => {
            const [revealed, setRevealed] = useState(false);
            useEffect(() => { setRevealed(false); }, [isRecallMode]);

            if (!isRecallMode) {
                return <span className="font-bold text-cyan-700 bg-cyan-50 px-1 rounded">{word}</span>;
            }

            return (
                <span 
                    className={revealed ? "font-bold bg-cyan-100 text-cyan-800 px-1.5 py-0.5 rounded mx-0.5 shadow-sm inline-block cursor-pointer transition-colors" : "blank-hidden px-2 py-0.5 rounded cursor-pointer mx-0.5 shadow-sm inline-block"} 
                    onClick={() => setRevealed(!revealed)}
                    title={revealed ? "Click to hide" : "Click to reveal"}
                >
                    {word}
                </span>
            );
        };

        const processCloze = (str, isRecallMode) => {
            if (!str) return null;
            const clozeRegex = /\{(.*?)\}/g;
            const parts = str.split(clozeRegex);
            return parts.map((part, index) => {
                if (index % 2 === 1) return <ClozeWord key={`cloze-${index}`} word={part} isRecallMode={isRecallMode} />;
                return <span key={`text-${index}`}>{part}</span>;
            });
        };

        const renderText = (text, isRecallMode) => {
            if (!text) return null;
            const lines = text.split('\n');
            return (
                <div className="space-y-1.5">
                    {lines.map((line, lineIndex) => {
                        if (line.trim() === '') return <div key={`empty-${lineIndex}`} className="h-2"></div>;
                        const isSubheader = /^[0-9A-Z\s&/()\-]+:(\)?)$/.test(line.trim());
                        let lineClass = "leading-relaxed text-[15px] text-slate-700 font-medium";
                        if (isSubheader) {
                            lineClass = "font-bold text-slate-800 text-xs tracking-wider mt-4 uppercase border-b border-slate-200 pb-1 opacity-80";
                        }
                        return (
                            <div key={lineIndex} className={lineClass}>
                                {processCloze(line, isRecallMode)}
                            </div>
                        );
                    })}
                </div>
            );
        };

        // --- X-RAY LAB COMPONENT ---
        const XRayLab = () => {
            const [activeTab, setActiveTab] = useState('anatomy');
            const [tooltip, setTooltip] = useState({ show: false, title: '', desc: ''});

            const handleHover = (title, desc) => {
                setTooltip({ show: true, title, desc });
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <span className="text-2xl">🩻</span>
                            <h3 className="font-bold text-white text-lg tracking-wide">Interactive X-Ray Lab</h3>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setActiveTab('anatomy')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${activeTab === 'anatomy' ? 'bg-cyan-500 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>Anatomy Spotter</button>
                            <button onClick={() => setActiveTab('pathology')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${activeTab === 'pathology' ? 'bg-cyan-500 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>Pathology Spotter</button>
                        </div>
                    </div>
                    
                    <div className="p-8 bg-slate-900 flex flex-col md:flex-row gap-8 items-center justify-center min-h-[500px]">
                        
                        <div className="flex-1 w-full max-w-md relative">
                            {activeTab === 'anatomy' ? (
                                <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" className="w-full h-auto drop-shadow-2xl">
                                    {/* Pelvis/Hip Schematic */}
                                    <path d="M50,100 Q100,50 200,80 Q300,50 350,100 Q380,200 300,250 Q200,280 100,250 Q20,200 50,100 Z" stroke="#e2e8f0" strokeWidth="2" fill="none"/>
                                    <path d="M120,200 L120,300 M140,200 L140,300" stroke="#e2e8f0" strokeWidth="2" fill="none"/>
                                    <path d="M280,200 L280,300 M260,200 L260,300" stroke="#e2e8f0" strokeWidth="2" fill="none"/>
                                    <circle cx="130" cy="190" r="25" stroke="#e2e8f0" strokeWidth="2" fill="none"/>
                                    <circle cx="270" cy="190" r="25" stroke="#e2e8f0" strokeWidth="2" fill="none"/>
                                    
                                    {/* Interactive Hotspots */}
                                    <circle cx="130" cy="190" r="30" className="xray-hotspot" onMouseEnter={() => handleHover('Femoral Head', 'Look for AVN (crescent sign), fracture, or loss of sphericity.')} onMouseLeave={() => setTooltip({show:false})} />
                                    <path d="M25,100 Q70,60 150,85" className="xray-hotspot" strokeWidth="20" fill="none" onMouseEnter={() => handleHover('Iliac Crest', 'Site of avulsion fractures or bone graft harvesting.')} onMouseLeave={() => setTooltip({show:false})} />
                                    <circle cx="270" cy="160" r="35" className="xray-hotspot" onMouseEnter={() => handleHover('Acetabulum', 'Evaluate joint space for OA (LOSS changes).')} onMouseLeave={() => setTooltip({show:false})} />
                                </svg>
                            ) : (
                                <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg" className="w-full h-auto drop-shadow-2xl max-w-xs mx-auto">
                                    {/* Knee AP Schematic */}
                                    <path d="M80,20 L80,120 Q60,150 90,160 Q100,140 110,160 Q140,150 120,120 L120,20" stroke="#e2e8f0" strokeWidth="2" fill="none"/>
                                    <path d="M70,300 L70,180 Q90,170 130,180 L130,300" stroke="#e2e8f0" strokeWidth="2" fill="none"/>
                                    <path d="M60,175 L75,170" stroke="#e2e8f0" strokeWidth="3" fill="none"/> 
                                    
                                    {/* Pathology Hotspot */}
                                    <rect x="50" y="150" width="100" height="40" className="xray-hotspot" onMouseEnter={() => handleHover('Knee Osteoarthritis', 'Medial Joint Space Narrowing + Marginal Osteophyte.\nDiagnosis: Medial Compartment Knee OA.')} onMouseLeave={() => setTooltip({show:false})} />
                                </svg>
                            )}
                        </div>

                        {/* Information Panel */}
                        <div className="w-full md:w-64 h-48 bg-slate-800 rounded-xl border border-slate-700 p-6 shadow-inner flex flex-col justify-center">
                            {tooltip.show ? (
                                <div className="animate-fade-in">
                                    <h4 className="text-cyan-400 font-black text-lg mb-2">{tooltip.title}</h4>
                                    <p className="text-slate-300 text-sm leading-relaxed whitespace-pre-line">{tooltip.desc}</p>
                                </div>
                            ) : (
                                <div className="text-center text-slate-500 font-medium">
                                    <svg className="w-8 h-8 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                                    Hover over the highlighted regions on the schematic X-ray to reveal findings.
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- AI SIMULATOR COMPONENT ---
        const AISimulator = () => {
            const [apiKey, setApiKey] = useState('');
            const [simActive, setSimActive] = useState(false);
            const [chat, setChat] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [config, setConfig] = useState({ diff: 'Intermediate', region: 'Knee' });
            
            const chatEndRef = useRef(null);
            
            const sysPrompt = `You are a strict but fair MSK OSCE examiner for senior medical students. You generate realistic patient cases and evaluate student responses with precision.
            CASE GENERATION: Create cases for spine/hip/knee based on user difficulty. Do NOT reveal diagnosis. Include vitals, HPI, PMHx, and focused physical exam findings. End by asking: "What are your top 3 differential diagnoses and your reasoning?"
            EVALUATION: Score sections out of 10. Challenge weak answers. Keep responses concise. Ask probing follow-up questions one at a time. Format responses with clear section labels. If the user says 'end case', provide a final debrief.`;

            const scrollToBottom = () => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => { scrollToBottom(); }, [chat, isLoading]);

            const startSimulation = async () => {
                if (!apiKey.trim()) return alert("Please enter your Anthropic API Key. It is stored locally during this session only.");
                setSimActive(true);
                setIsLoading(true);
                
                const initPrompt = `Generate a realistic ${config.diff} level MSK patient case for the ${config.region} region.`;
                
                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01',
                            'anthropic-dangerous-direct-browser-access': 'true',
                            'content-type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'claude-3-haiku-20240307', // Faster model for generation
                            system: sysPrompt,
                            messages: [{role: "user", content: initPrompt}],
                            max_tokens: 800
                        })
                    });
                    
                    if(!response.ok) throw new Error(`API Error: ${response.status}`);
                    const data = await response.json();
                    
                    setChat([
                        { role: 'user', content: initPrompt, hidden: true },
                        { role: 'assistant', content: data.content[0].text }
                    ]);
                } catch (err) {
                    setChat([{ role: 'assistant', content: `Error connecting to API: ${err.message}. Please check your API key.` }]);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if(!input.trim() || isLoading) return;

                const userText = input.trim();
                const newChat = [...chat, { role: 'user', content: userText }];
                setChat(newChat);
                setInput('');
                setIsLoading(true);

                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01',
                            'anthropic-dangerous-direct-browser-access': 'true',
                            'content-type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'claude-3-haiku-20240307',
                            system: sysPrompt,
                            messages: newChat.filter(m => !m.hidden).map(m => ({role: m.role, content: m.content})),
                            max_tokens: 800
                        })
                    });
                    
                    if(!response.ok) throw new Error(`API Error: ${response.status}`);
                    const data = await response.json();
                    
                    setChat([...newChat, { role: 'assistant', content: data.content[0].text }]);
                } catch (err) {
                    setChat([...newChat, { role: 'assistant', content: `Error: ${err.message}` }]);
                } finally {
                    setIsLoading(false);
                }
            };

            if (!simActive) {
                return (
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 max-w-2xl mx-auto mt-8">
                        <div className="text-center mb-8">
                            <div className="text-5xl mb-4">🤖</div>
                            <h2 className="text-2xl font-black text-slate-800">Live AI Preceptor</h2>
                            <p className="text-slate-500 mt-2 font-medium">Powered by Anthropic Claude API</p>
                        </div>
                        
                        <div className="space-y-6">
                            <div className="bg-cyan-50 p-5 rounded-xl border border-cyan-100">
                                <label className="block text-sm font-bold text-cyan-900 mb-2 uppercase tracking-wider">Anthropic API Key</label>
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={e => setApiKey(e.target.value)} 
                                    placeholder="sk-ant-..." 
                                    className="w-full p-3 border border-cyan-200 rounded-lg focus:ring-2 focus:ring-cyan-400 outline-none font-mono text-sm"
                                />
                                <p className="text-xs text-cyan-700 mt-2 font-medium">Stored locally in your browser memory for this session only.</p>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Difficulty</label>
                                    <select value={config.diff} onChange={e => setConfig({...config, diff: e.target.value})} className="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-cyan-400 font-medium">
                                        <option>Beginner</option>
                                        <option>Intermediate</option>
                                        <option>Advanced</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Target Region</label>
                                    <select value={config.region} onChange={e => setConfig({...config, region: e.target.value})} className="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-cyan-400 font-medium">
                                        <option>Spine</option>
                                        <option>Hip</option>
                                        <option>Knee</option>
                                        <option>Random</option>
                                    </select>
                                </div>
                            </div>
                            
                            <button onClick={startSimulation} className="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-black py-4 rounded-xl shadow-lg transition-colors uppercase tracking-widest text-lg mt-4">
                                Start Simulation
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col h-[700px]">
                    <div className="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center z-10 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-cyan-600 rounded-full flex items-center justify-center text-xl shadow-inner border border-cyan-400">👨‍🏫</div>
                            <div>
                                <h3 className="font-bold text-white">AI Examiner ({config.diff} - {config.region})</h3>
                                <p className="text-xs text-cyan-400 font-medium flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-cyan-400 inline-block"></span> Live Session</p>
                            </div>
                        </div>
                        <button onClick={() => setSimActive(false)} className="text-slate-300 hover:text-white bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors border border-slate-600">
                            End Session
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 space-y-5 bg-[#f8fafc] bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
                        {chat.filter(m => !m.hidden).map((msg, idx) => (
                            <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] md:max-w-[75%] p-5 shadow-sm text-[15px] leading-relaxed whitespace-pre-wrap ${msg.role === 'user' ? 'chat-bubble-student' : 'chat-bubble-examiner font-medium'}`}>
                                    {msg.content}
                                </div>
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex justify-start">
                                <div className="chat-bubble-examiner p-4 flex gap-2 items-center text-slate-500 font-medium text-sm shadow-sm">
                                    <span className="animate-pulse">●</span><span className="animate-pulse" style={{animationDelay: '0.2s'}}>●</span><span className="animate-pulse" style={{animationDelay: '0.4s'}}>●</span> Examiner is typing...
                                </div>
                            </div>
                        )}
                        <div ref={chatEndRef} className="h-2" />
                    </div>

                    <form onSubmit={handleSend} className="p-4 bg-white border-t border-slate-200 flex gap-3 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <input 
                            type="text" 
                            value={input} 
                            onChange={(e) => setInput(e.target.value)} 
                            disabled={isLoading}
                            placeholder="Type your response or clinical reasoning..."
                            className="flex-1 p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200 disabled:bg-slate-100 transition-all font-medium text-slate-700 placeholder-slate-400"
                        />
                        <button type="submit" disabled={isLoading || !input.trim()} className="bg-cyan-600 hover:bg-cyan-700 text-white font-bold px-6 rounded-xl transition-colors disabled:opacity-50 shadow-md flex items-center justify-center">
                            <svg className="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19V6m0 0l-8 8m8-8l8 8"></path></svg>
                        </button>
                    </form>
                </div>
            );
        };


        // --- MAIN APP CONTAINER ---
        const MSKApp = () => {
            const [view, setView] = useState('ref'); 
            const [memorizeMode, setMemorizeMode] = useState(false);
            const [isCompleted, setIsCompleted] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);

            useEffect(() => {
                const progress = JSON.parse(localStorage.getItem('osce_progress') || '{}');
                if (progress.s9) setIsCompleted(true);
            }, []);

            const markCompleted = () => {
                const progress = JSON.parse(localStorage.getItem('osce_progress') || '{}');
                progress.s9 = true; // s9 matches MSK in index.html
                localStorage.setItem('osce_progress', JSON.stringify(progress));
                setIsCompleted(true);
                window.location.href = 'index.html';
            };

            const tabs = [
                { id: 'ref', label: '1. MSK Cheat Sheet', icon: '📋' },
                { id: 'tests', label: '2. Special Tests', icon: '🦴' },
                { id: 'xray', label: '3. X-Ray Lab', icon: '🩻' },
                { id: 'sim', label: '4. AI Case Simulator', icon: '🤖' }
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#f8fafc]">
                    {/* Mobile Header */}
                    <div className="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center z-30 sticky top-0 shadow-md">
                        <h1 className="text-xl font-black text-cyan-400">MSK 250 OSCE</h1>
                        <button onClick={() => setSidebarOpen(!sidebarOpen)} className="p-2 bg-slate-800 rounded">☰</button>
                    </div>

                    {/* SIDEBAR NAVIGATION */}
                    <nav className={`${sidebarOpen ? 'block' : 'hidden'} md:flex w-full md:w-72 bg-gradient-to-b from-slate-900 to-slate-800 text-white shadow-2xl flex-shrink-0 z-20 flex-col fixed md:sticky top-0 h-screen overflow-y-auto transition-all`}>
                        <div className="p-8 pb-4 border-b border-white/10 mb-6 hidden md:block">
                            <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-teal-400 tracking-tight">MSK 250</h1>
                            <p className="text-xs text-slate-400 mt-2 uppercase tracking-widest font-bold">LU5 Grand OSCE Mastery</p>
                        </div>
                        
                        <ul className="space-y-2 px-4 mb-8 flex-1">
                            {tabs.map((tab) => (
                                <li key={tab.id}>
                                    <button onClick={() => {setView(tab.id); setSidebarOpen(false);}} className={`w-full flex items-center p-3.5 rounded-xl font-semibold transition-all duration-300 ${view === tab.id ? 'bg-cyan-600 text-white shadow-lg shadow-cyan-900/50 transform translate-x-2' : 'text-slate-400 hover:bg-white/5 hover:text-white hover:translate-x-1'}`}>
                                        <span className="mr-4 text-xl bg-white/10 p-1.5 rounded-lg">{tab.icon}</span>
                                        <span className="tracking-wide text-sm">{tab.label}</span>
                                    </button>
                                </li>
                            ))}
                        </ul>
                        
                        <div className="mt-auto pt-6 border-t border-white/10 px-6 pb-8">
                            <button onClick={markCompleted} className={`w-full py-3.5 px-4 rounded-xl font-bold transition-all shadow-lg uppercase tracking-wider text-xs flex items-center justify-center gap-2 ${isCompleted ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 hover:bg-emerald-500/30' : 'bg-slate-700/50 text-slate-300 hover:bg-cyan-600 hover:text-white border border-slate-600'}`}>
                                {isCompleted ? '✓ Station Reviewed' : 'Mark as Reviewed'}
                            </button>
                            <a href="index.html" className="block text-center mt-6 text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-white transition-colors">
                                &larr; Back to Dashboard
                            </a>
                        </div>
                    </nav>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto relative h-screen custom-scrollbar scroll-smooth">
                        {/* Sticky Header Row */}
                        <div className="sticky top-0 z-10 bg-[#f8fafc]/90 backdrop-blur-md border-b border-slate-200 px-6 md:px-12 py-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h2 className="text-3xl font-black text-slate-900 flex items-center gap-3">
                                    <span className="text-3xl drop-shadow-sm">{tabs.find(t => t.id === view).icon}</span>
                                    {tabs.find(t => t.id === view).label}
                                </h2>
                                <p className="text-slate-500 mt-1.5 font-medium text-sm">Review standardized rubrics, clinical frameworks, and perform virtual simulations.</p>
                            </div>
                            
                            {/* Active Recall Toggle */}
                            {(view === 'ref' || view === 'tests') && (
                                <div className="flex flex-col items-end gap-3">
                                    <div className="flex items-center gap-3 bg-white p-2 rounded-xl shadow-sm border border-slate-200">
                                        <span className="text-sm font-semibold text-slate-600 px-2">Active Recall</span>
                                        <div className="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                            <input type="checkbox" id="toggle" checked={memorizeMode} onChange={() => setMemorizeMode(!memorizeMode)} className="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 z-10 top-0 left-0" />
                                            <label htmlFor="toggle" className="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer transition-colors duration-300"></label>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className={`max-w-6xl mx-auto space-y-10 animate-fade-in pb-24 pt-8 px-6 md:px-12`}>
                            
                            {/* VIEW 1: CHEAT SHEET */}
                            {view === 'ref' && (
                                <div className="space-y-8">
                                    {/* Standard Intro */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden group hover:border-slate-300 transition-colors">
                                        <div className="bg-slate-50 border-b border-slate-100 px-6 py-4 flex items-center gap-3">
                                            <div className="bg-white p-2 rounded-lg shadow-sm border border-slate-100 text-xl">🤝</div> 
                                            <h3 className="font-bold text-slate-800 text-lg">Standardized Introduction Script</h3>
                                        </div>
                                        <div className="p-8">
                                            <div className="relative">
                                                <div className="absolute top-0 left-0 w-1 h-full bg-cyan-500 rounded-full"></div>
                                                <div className="pl-6 text-slate-700 font-medium">
                                                    {renderText(mskData.intro, memorizeMode)}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid lg:grid-cols-2 gap-8">
                                        {/* DDx Framework */}
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                            <div className="bg-cyan-600 text-white px-6 py-4 font-bold flex items-center gap-3 tracking-wide">
                                                <span className="text-xl">🧠</span> Diagnostic Framework (5-Step)
                                            </div>
                                            <div className="p-6 text-slate-700 font-medium">
                                                {renderText(mskData.ddx, memorizeMode)}
                                            </div>
                                        </div>

                                        {/* Pearls */}
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                            <div className="bg-cyan-600 text-white px-6 py-4 font-bold flex items-center gap-3 tracking-wide">
                                                <span className="text-xl">💡</span> Rapid Recall Pearls
                                            </div>
                                            <div className="p-6 text-slate-700 font-medium">
                                                {renderText(mskData.pearls, memorizeMode)}
                                            </div>
                                        </div>
                                    </div>

                                    {/* X-Ray Guide */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="bg-slate-800 text-white px-6 py-4 font-bold flex items-center gap-3 tracking-wide">
                                            <span className="text-xl">🩻</span> ABCDS Method & Diagnosis Findings
                                        </div>
                                        <div className="p-6 text-slate-700 font-medium">
                                            {renderText(mskData.xray, memorizeMode)}
                                        </div>
                                    </div>

                                    {/* Dermatomes Table */}
                                    <div className="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
                                        <div className="bg-slate-800 text-white px-6 py-4 font-bold flex items-center justify-between gap-3 tracking-wide">
                                            <div className="flex items-center gap-3">
                                                <span className="text-xl">⚡</span> Dermatomal & Nerve Root Map
                                            </div>
                                            <div className="bg-cyan-900/50 border border-cyan-500/30 px-4 py-1.5 rounded-lg text-xs font-medium text-cyan-200">
                                                Memory Trick: L4 walks on floor, S1 walks on toes.
                                            </div>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="min-w-full text-left text-sm border-collapse">
                                                <thead className="bg-slate-100 text-slate-600 uppercase text-[11px] tracking-wider">
                                                    <tr>
                                                        <th className="px-6 py-4 font-bold border-b">Root</th>
                                                        <th className="px-6 py-4 font-bold border-b">Motor Weakness</th>
                                                        <th className="px-6 py-4 font-bold border-b">Reflex Lost</th>
                                                        <th className="px-6 py-4 font-bold border-b">Sensation Area</th>
                                                        <th className="px-6 py-4 font-bold border-b">Disc Level</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-slate-800 font-medium">
                                                    {dermatomes.map((item, idx) => (
                                                        <tr key={idx} className="hover:bg-cyan-50/30 transition-colors">
                                                            <td className="px-6 py-4 font-black text-cyan-900 bg-slate-50/50 border-r border-slate-100">{item.root}</td>
                                                            <td className="px-6 py-4">{processCloze(item.motor, memorizeMode)}</td>
                                                            <td className="px-6 py-4">{processCloze(item.reflex, memorizeMode)}</td>
                                                            <td className="px-6 py-4">{processCloze(item.sensation, memorizeMode)}</td>
                                                            <td className="px-6 py-4 text-slate-500">{item.disc}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* VIEW 2: SPECIAL TESTS */}
                            {view === 'tests' && (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {specialTests.map((test, idx) => (
                                        <div key={idx} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col hover:border-cyan-300 transition-colors">
                                            <div className="flex justify-between items-start mb-4 border-b border-slate-100 pb-3">
                                                <h3 className="font-black text-slate-800 text-lg leading-tight pr-2">{test.name}</h3>
                                                <span className="bg-cyan-100 text-cyan-800 text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded shadow-sm flex-shrink-0">{test.region}</span>
                                            </div>
                                            <div className="space-y-4 flex-1 text-[14px]">
                                                <div>
                                                    <span className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">How to Perform</span>
                                                    <span className="text-slate-700 font-medium">{processCloze(test.perf, memorizeMode)}</span>
                                                </div>
                                                <div>
                                                    <span className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Positive Sign</span>
                                                    <span className="text-slate-700 font-medium">{processCloze(test.pos, memorizeMode)}</span>
                                                </div>
                                                <div>
                                                    <span className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Pathology</span>
                                                    <span className="text-cyan-800 font-bold">{processCloze(test.path, memorizeMode)}</span>
                                                </div>
                                            </div>
                                            <div className="mt-4 pt-3 border-t border-slate-100">
                                                <span className="text-[12px] text-slate-500 font-medium italic">{test.sens}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* VIEW 3: X-RAY LAB */}
                            {view === 'xray' && <XRayLab />}

                            {/* VIEW 4: SIMULATOR */}
                            {view === 'sim' && <AISimulator />}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MSKApp />);
    </script>
</body>
</html>

<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>FamMed OSCE Master - Ultimate CEA Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .blank-hidden { background-color: #cbd5e1; color: transparent; user-select: none; border-bottom: 2px dashed #0f766e; transition: all 0.2s ease;}
        .blank-hidden:hover { background-color: #94a3b8; color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Utility function to render text with hideable keywords using [keyword] syntax
        const renderRecallText = (text, stepIndex, role, hiddenWords, toggleWord, memorizeMode, highlightColor = "teal") => {
            if (!text) return null;
            if (!memorizeMode) {
                const parts = text.split(/\[(.*?)\]/g);
                return parts.map((part, i) => i % 2 === 1 ? <strong key={i} className={`text-${highlightColor}-700`}>{part}</strong> : <span key={i}>{part}</span>);
            }
            const parts = text.split(/\[(.*?)\]/g);
            return parts.map((part, i) => {
                if (i % 2 === 1) {
                    const wordId = `${stepIndex}-${role}-${i}`;
                    const isHidden = hiddenWords.has(wordId);
                    if (isHidden) {
                        return <span key={wordId} onClick={() => toggleWord(wordId)} className="blank-hidden px-2 py-0.5 rounded cursor-pointer mx-0.5 shadow-inner" title="Click to reveal">{part}</span>;
                    } else {
                        return <span key={wordId} className={`font-bold bg-${highlightColor}-100 text-${highlightColor}-800 px-1 rounded mx-0.5 shadow-sm`}>{part}</span>;
                    }
                }
                return <span key={i}>{part}</span>;
            });
        };

        // --- View 1: Master Intro & CEA Rubric ---
        const CEARubric = () => {
            const [memorizeMode, setMemorizeMode] = useState(false);
            const [hiddenWords, setHiddenWords] = useState(new Set());

            const ceaSteps = [
                {
                    phase: "0. INTRODUCTION & CONSENT",
                    points: [
                        { step: "1. Identity & Role", script: "Magandang araw/hapon po. Ako po si [CJ], isang estudyanteng doktor dito sa [PGH]. Maaari ko po bang malaman ang inyong [buong pangalan at edad]?", pearl: "Always establish rapport and verify patient identity." },
                        { step: "2. Purpose & Confidentiality", script: "Nandito po ako ngayon para [pag-usapan ang inyong mga nararamdaman at naiisip] tungkol sa inyong sakit at gamutan. Nais ko pong makatulong upang makabuo tayo ng ligtas at epektibong plano para sa inyong kalusugan. Gusto ko pong ipaalala na ang lahat ng pag-uusapan at gagawin natin ay [mananatiling pribado] at para lamang sa aming medical team na tutulong sa inyo, maliban na lang kung may kinalaman ito sa inyong [kaligtasan] o ng ibang tao.", pearl: "Verbalize specific purpose and establish the boundaries of confidentiality." },
                        { step: "3. Consent", script: "[Okay lang po ba] na magsimula tayo?", pearl: "Do not proceed without explicit consent." }
                    ]
                },
                {
                    phase: "A. CATHARSIS (Identify Misperception)",
                    points: [
                        { step: "1. Asked Thoughts", script: "Ano po ang [nasa isip niyo] tungkol sa inyong sakit at gamutan?", pearl: "Open-ended question to draw out the misperception." },
                        { step: "2. Asked Feelings", script: "Ano po ang [nararamdaman niyo] kapag naiisip niyo ito?", pearl: "Elicit the emotional response (Fear, anxiety, frustration)." },
                        { step: "3. Reflected/Paraphrased", script: "[Kung tama po ang pagkakaintindi ko], natatakot kayong inumin ang gamot dahil baka masira ang bato ninyo?", pearl: "Validate by echoing their exact concern. DO NOT correct them yet." },
                        { step: "4. Probed Feelings", script: "Maaari niyo po bang [ikwento pa] kung saan niyo ito narinig o bakit niyo ito nararamdaman?", pearl: "Dig deeper into the root cause of the misperception using SCREEM factors." },
                        { step: "5. Summarized", script: "[Kaya pala] hindi niyo naiinom ang gamot ay [dahil sa] takot na masira ang kidney at narinig niyo sa kapitbahay. [Tama po ba]?", pearl: "Tie the thoughts and feelings together to transition to Education." }
                    ]
                },
                {
                    phase: "B. EDUCATION (Correct Misperception)",
                    points: [
                        { step: "1. Corrected the Misperception", script: "[Naiintindihan ko po] ang inyong takot. Subalit, gusto ko pong ipaliwanag na [ang hindi pag-inom ng gamot ang mismong sumisira] sa inyong kidney dahil sa patuloy na pagtaas ng presyon/asukal.", pearl: "Address the specific fear directly but gently. Use analogies." }
                    ]
                },
                {
                    phase: "C. ACTION (Plan of Action)",
                    points: [
                        { step: "1. Diagnostics", script: "Para makasiguro tayo sa lagay ng inyong organo, magpapakuha tayo ng [12-Lead ECG], [Urinalysis], at [Serum Creatinine].", pearl: "Must name SPECIFIC tests assessing Target Organ Damage (TOD)." },
                        { step: "2. Therapeutics", script: "Ipagpapatuloy po natin ang [Amlodipine 5mg OD]. Ito ay ligtas at poprotekta sa inyong puso.", pearl: "Name the drug, dose, and frequency explicitly." },
                        { step: "3. Non-Pharmacologic", script: "Bukod sa gamot, kailangan din natin bawasan ang [alat sa pagkain] at [mag-ehersisyo ng 30 minuto] kada araw.", pearl: "Be specific: DASH diet, <2g Sodium/day, 150 mins/week exercise." }
                    ]
                }
            ];

            const toggleWord = (id) => {
                setHiddenWords(prev => {
                    const next = new Set(prev);
                    next.delete(id);
                    return next;
                });
            };

            const randomize = () => {
                const newHidden = new Set();
                ceaSteps.forEach((phase, fIdx) => {
                    phase.points.forEach((p, pIdx) => {
                        const text = p.script;
                        const parts = text.split(/\[(.*?)\]/g);
                        parts.forEach((part, i) => {
                            if (i % 2 === 1 && Math.random() > 0.3) {
                                newHidden.add(`${fIdx}-${pIdx}-${i}`);
                            }
                        });
                    });
                });
                setHiddenWords(newHidden);
            };

            useEffect(() => {
                if (memorizeMode) randomize();
                else setHiddenWords(new Set());
            }, [memorizeMode]);

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="border-b-2 border-slate-200 pb-4 mb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                        <div>
                            <h2 className="text-3xl font-black text-slate-800 flex items-center">
                                <span className="mr-3 text-3xl">🗣️</span> Intro & CEA Scripts
                            </h2>
                            <p className="text-slate-500 mt-2 font-medium">Master the standardized introduction and the official LU5 C-E-A counseling rubric.</p>
                        </div>
                        <div className="flex flex-col gap-2">

                                <input type="checkbox" checked={memorizeMode} onChange={() => setMemorizeMode(!memorizeMode)} className="mr-3 w-5 h-5 accent-teal-600" />
                                Active Recall Mode
                            </label>
                            {memorizeMode && (
                                <button onClick={randomize} className="text-sm bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded-lg shadow transition-colors">
                                    🔀 Shuffle Blanks
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="space-y-6">
                        {ceaSteps.map((phase, fIdx) => (
                            <div key={fIdx} className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                                <div className={`${fIdx === 0 ? 'bg-slate-800 text-white' : 'bg-teal-600 text-white'} p-4 flex items-center`}>
                                    <h3 className="font-bold text-lg">{phase.phase}</h3>
                                </div>
                                <div className="p-0">
                                    <table className="min-w-full text-left text-sm">
                                        <tbody className="divide-y divide-slate-100">
                                            {phase.points.map((pt, pIdx) => (
                                                <tr key={pIdx} className="hover:bg-slate-50 transition-colors">

                                                        <span className="text-xs text-amber-600 font-bold mt-2 block">💡 Pearl: {pt.pearl}</span>
                                                    </td>
                                                    <td className="p-4 border-l border-slate-100 w-2/3">
                                                        <span className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">Filipino Script:</span>
                                                        <span className="text-slate-700 font-medium italic text-[16px] leading-relaxed">
                                                            "{renderRecallText(pt.script, `${fIdx}-${pIdx}`, '', hiddenWords, toggleWord, memorizeMode, fIdx === 0 ? "slate" : "teal")}"
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

                    <div className="grid md:grid-cols-2 gap-6">

                                </div>

                </div>

        };

                4: {
                    title: "Case 4: The Vaping COPD Patient",
                    patient: "A 65-year-old male with chronic cough and dyspnea. He stopped smoking cigarettes but switched to vaping. 'Doc, nag-vape na ako kaya safe na ito. Masarap sa lalamunan at wala nang usok, water vapor na lang.'",
                    answers: {
                        catharsis: "Probe: 'Maaari niyo po bang ikwento kung sino ang nagpayo sa inyo na mas ligtas ang vape kaysa sa sigarilyo?'",
                        education: "Correct: 'Naiintindihan ko po na ginawa niyo ito para umiwas sa sigarilyo. Ngunit, ang vape ay may mga kemikal pa rin na nagiging sanhi ng matinding pamamaga sa inyong baga na nagpapalala ng inyong ubo at hika.'",
                        actionDx: "Spirometry (Post-bronchodilator FEV1/FVC < 0.70)",
                        actionTx: "Prescribe LAMA/LABA inhaler (e.g., Tiotropium/Olodaterol)",
                        actionNonPharm: "5 A's of Smoking/Vaping Cessation, Pneumococcal Vaccine"
                    },
                    options: {
                        catharsis: [
                            "Probe: 'Maaari niyo po bang ikwento kung sino ang nagpayo sa inyo na mas ligtas ang vape kaysa sa sigarilyo?'",
                            "Summarize: 'Gusto niyo po bang mamatay nang maaga kaya kayo nag-vape?'",
                            "Reflect: 'Masarap po ba sa lalamunan ang vape?'"
                        ],
                        education: [
                            "Correct: 'Naiintindihan ko po na ginawa niyo ito para umiwas sa sigarilyo. Ngunit, ang vape ay may mga kemikal pa rin na nagiging sanhi ng matinding pamamaga sa inyong baga na nagpapalala ng inyong ubo at hika.'",
                            "Correct: 'Ligtas naman po ang vape basta wag lang araw-araw.'",
                            "Correct: 'Ang water vapor ay nakakalunod ng baga kaya kayo inuubo.'"
                        ],
                        actionDx: ["Arterial Blood Gas daily", "Spirometry (Post-bronchodilator FEV1/FVC < 0.70)", "CT Scan of Chest with Contrast"],
                        actionTx: ["Prescribe LAMA/LABA inhaler (e.g., Tiotropium/Olodaterol)", "Oral Prednisone 40mg daily indefinitely", "Codeine cough syrup PRN"],
                        actionNonPharm: ["Drink 3L of water daily to wash out vapor", "5 A's of Smoking/Vaping Cessation, Pneumococcal Vaccine", "Avoid cold weather permanently"]
                    }
                },
                5: {
                    title: "Case 5: Alternative Med in Cancer",
                    patient: "A 55-year-old female just diagnosed with Stage 2 Breast Cancer. She refuses surgery. 'Doc, iinom na lang ako ng katas ng soursop at malunggay, may kapitbahay ako na gumaling doon. Ayokong magpa-opera kasi mamamatay lang daw ako sa table.'",
                    answers: {
                        catharsis: "Feelings: 'Mukhang labis po kayong natatakot sa posibilidad ng operasyon. Ano po ang pinakanakakabahala sa inyo tungkol dito?'",
                        education: "Correct: 'Naiintindihan ko po ang takot ninyong maoperahan. Subalit, ang kanser po ninyo ay nasa Stage 2 pa lang at mataas ang tsansang gumaling kung maaalis natin ang bukol. Ang herbal na gamot ay walang sapat na ebidensya para puksain ang cancer cells.'",
                        actionDx: "Metastatic workup (CT Scan Chest/Abdomen), ER/PR/HER2 status",
                        actionTx: "Refer to Multidisciplinary Tumor Board (Surgery, Oncology)",
                        actionNonPharm: "Explore Family APGAR for support, Discuss fears openly"
                    },
                    options: {
                        catharsis: [
                            "Thoughts: 'Saan niyo po mabibili ang soursop?'",
                            "Feelings: 'Mukhang labis po kayong natatakot sa posibilidad ng operasyon. Ano po ang pinakanakakabahala sa inyo tungkol dito?'",
                            "Summarize: 'Kaya ayaw niyo magpa-opera kasi mas mura ang malunggay?'"
                        ],
                        education: [
                            "Correct: 'Naiintindihan ko po ang takot ninyong maoperahan. Subalit, ang kanser po ninyo ay nasa Stage 2 pa lang at mataas ang tsansang gumaling kung maaalis natin ang bukol. Ang herbal na gamot ay walang sapat na ebidensya para puksain ang cancer cells.'",
                            "Correct: 'Sige po, subukan niyo ang malunggay ng 6 months tapos balik kayo.'",
                            "Correct: 'Mali po ang kapitbahay ninyo, walang nakaka-survive sa soursop.'"
                        ],
                        actionDx: ["Metastatic workup (CT Scan Chest/Abdomen), ER/PR/HER2 status", "Full body MRI every month", "Tumor markers (CEA) weekly"],
                        actionTx: ["Start Doxorubicin immediately", "Schedule Mastectomy tomorrow without consulting patient", "Refer to Multidisciplinary Tumor Board (Surgery, Oncology)"],
                        actionNonPharm: ["Explore Family APGAR for support, Discuss fears openly", "Tell family to force her to do surgery", "Give up and discharge patient"]
                    }
                }
            };

            const evaluateCase = () => {
                let pts = 100; let fb = []; const activeCase = cases[currentCaseId].answers;
                
                const checks = [
                    { key: 'catharsis', name: 'Phase A: Catharsis', pass: selections.catharsis === activeCase.catharsis },
                    { key: 'education', name: 'Phase B: Education', pass: selections.education === activeCase.education },
                    { key: 'actionDx', name: 'Phase C: Diagnostics', pass: selections.actionDx === activeCase.actionDx },
                    { key: 'actionTx', name: 'Phase C: Therapeutics', pass: selections.actionTx === activeCase.actionTx },
                    { key: 'actionNonPharm', name: 'Phase C: Non-Pharm', pass: selections.actionNonPharm === activeCase.actionNonPharm }
                ];

                checks.forEach(check => {
                    if (check.pass) {
                        fb.push({type: 'ok', msg: `${check.name}: Correct.`});
                    } else {
                        pts -= 20;
                        fb.push({type: 'err', msg: `${check.name}: Incorrect.`, rationale: `Expected: ${activeCase[check.key]}`});
                    }
                });

                fb.push({type: 'pearl', msg: 'Non-Verbals (Attending Skills)', rationale: "Maintain eye contact, lean forward slightly (SOLER), and do not interrupt. This accounts for the final 2 points on the CEA rubric."});

                setScore(Math.max(0, pts)); setFeedback(fb); setSubmitted(true);
            };

            const loadCase = (id) => { 
                setSubmitted(false); setCurrentCaseId(id); 
                setSelections({catharsis: "", education: "", actionDx: "", actionTx: "", actionNonPharm: ""}); 
                setFeedback([]); 
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="border-b-2 border-slate-200 pb-4 mb-6">
                        <h2 className="text-3xl font-black text-slate-800 flex items-center">
                            <span className="mr-3 text-3xl">💬</span> CEA Case Simulators
                        </h2>
                        <p className="text-slate-500 mt-2 font-medium">Test your ability to navigate the C-E-A method across 5 common NCD scenarios.</p>
                    </div>

                    <div className="flex flex-wrap gap-2 border-b-2 border-teal-100 pb-4 mb-6">
                        {Object.keys(cases).map(id => (
                            <button key={id} onClick={() => loadCase(parseInt(id))} className={`px-4 py-2 rounded-full font-bold transition-colors shadow-sm text-sm ${currentCaseId === parseInt(id) ? 'bg-teal-700 text-white ring-2 ring-teal-300' : 'bg-white text-slate-600 hover:bg-teal-50 border border-slate-200'}`}>
                                {cases[id].title.split(':')[0]}
                            </button>
                        ))}
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-lg border border-slate-200">
                        <div className="bg-slate-800 border-l-4 border-teal-500 p-5 rounded-r-lg mb-8 shadow-sm">
                            <h3 className="font-black text-teal-400 uppercase tracking-widest text-sm mb-2">{cases[currentCaseId].title}</h3>
                            <p className="text-lg text-white italic">"{cases[currentCaseId].patient}"</p>
                        </div>
                        
                        <div className="space-y-8 mb-8">
                            {/* Catharsis */}
                            <div className="bg-slate-50 p-5 rounded-lg border border-slate-200">
                                <h4 className="font-black text-slate-800 mb-4 border-b border-slate-200 pb-2">Step 1: CATHARSIS (Identify Misperception)</h4>
                                <div className="space-y-3">
                                    {cases[currentCaseId].options.catharsis.map(opt => (
                                        <label key={opt} className={`block p-4 border rounded-lg cursor-pointer text-sm transition-colors shadow-sm ${selections.catharsis === opt ? 'bg-teal-50 border-teal-500 font-bold text-teal-900 ring-1 ring-teal-500' : 'bg-white hover:bg-slate-50 border-slate-200'}`}>
                                            <input type="radio" checked={selections.catharsis === opt} onChange={() => setSelections({...selections, catharsis: opt})} disabled={submitted} className="mr-3 w-4 h-4 accent-teal-600" />{opt}
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {/* Education */}
                            <div className="bg-slate-50 p-5 rounded-lg border border-slate-200">
                                <h4 className="font-black text-slate-800 mb-4 border-b border-slate-200 pb-2">Step 2: EDUCATION (Correct Misperception)</h4>
                                <div className="space-y-3">
                                    {cases[currentCaseId].options.education.map(opt => (
                                        <label key={opt} className={`block p-4 border rounded-lg cursor-pointer text-sm transition-colors shadow-sm ${selections.education === opt ? 'bg-teal-50 border-teal-500 font-bold text-teal-900 ring-1 ring-teal-500' : 'bg-white hover:bg-slate-50 border-slate-200'}`}>
                                            <input type="radio" checked={selections.education === opt} onChange={() => setSelections({...selections, education: opt})} disabled={submitted} className="mr-3 w-4 h-4 accent-teal-600" />{opt}
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {/* Action */}
                            <div className="bg-slate-50 p-5 rounded-lg border border-slate-200">
                                <h4 className="font-black text-slate-800 mb-4 border-b border-slate-200 pb-2">Step 3: ACTION PLAN</h4>
                                <div className="grid md:grid-cols-3 gap-6">
                                    <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                        <p className="text-xs font-black uppercase tracking-widest text-slate-500 mb-3 border-b pb-1">Diagnostics</p>
                                        <div className="space-y-2">
                                            {cases[currentCaseId].options.actionDx.map(opt => (
                                                <label key={opt} className={`block p-3 border rounded-lg cursor-pointer text-xs font-medium transition-colors ${selections.actionDx === opt ? 'bg-teal-50 border-teal-500 text-teal-900 font-bold' : 'bg-slate-50 hover:bg-slate-100'}`}>
                                                    <input type="radio" checked={selections.actionDx === opt} onChange={() => setSelections({...selections, actionDx: opt})} disabled={submitted} className="hidden" />{opt}
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                        <p className="text-xs font-black uppercase tracking-widest text-slate-500 mb-3 border-b pb-1">Therapeutics</p>
                                        <div className="space-y-2">
                                            {cases[currentCaseId].options.actionTx.map(opt => (
                                                <label key={opt} className={`block p-3 border rounded-lg cursor-pointer text-xs font-medium transition-colors ${selections.actionTx === opt ? 'bg-teal-50 border-teal-500 text-teal-900 font-bold' : 'bg-slate-50 hover:bg-slate-100'}`}>
                                                    <input type="radio" checked={selections.actionTx === opt} onChange={() => setSelections({...selections, actionTx: opt})} disabled={submitted} className="hidden" />{opt}
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                        <p className="text-xs font-black uppercase tracking-widest text-slate-500 mb-3 border-b pb-1">Non-Pharmacologic</p>
                                        <div className="space-y-2">
                                            {cases[currentCaseId].options.actionNonPharm.map(opt => (
                                                <label key={opt} className={`block p-3 border rounded-lg cursor-pointer text-xs font-medium transition-colors ${selections.actionNonPharm === opt ? 'bg-teal-50 border-teal-500 text-teal-900 font-bold' : 'bg-slate-50 hover:bg-slate-100'}`}>
                                                    <input type="radio" checked={selections.actionNonPharm === opt} onChange={() => setSelections({...selections, actionNonPharm: opt})} disabled={submitted} className="hidden" />{opt}
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {!submitted ? (
                            <button 
                                onClick={evaluateCase} 
                                disabled={!selections.catharsis || !selections.education || !selections.actionDx || !selections.actionTx || !selections.actionNonPharm} 
                                className="w-full bg-teal-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-teal-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-lg uppercase tracking-widest"
                            >
                                Submit OSCE Response
                            </button>
                        ) : (
                            <div className="p-8 rounded-xl border-t-8 border-teal-600 bg-slate-50 shadow-inner">
                                <h3 className="text-3xl font-black text-slate-800 mb-6">OSCE Feedback: {score}%</h3>
                                <ul className="space-y-4">
                                    {feedback.map((f, i) => (
                                        <li key={i} className={`flex flex-col p-5 rounded-lg border shadow-sm ${f.type === 'err' ? 'bg-red-50 border-red-200 text-red-900' : f.type === 'pearl' ? 'bg-amber-50 border-amber-200 text-amber-900' : 'bg-white border-teal-200 text-teal-900'}`}>
                                            <div className="flex items-start">
                                                <span className="mr-3 font-bold text-xl">{f.type === 'err' ? '✘' : f.type === 'pearl' ? '💡' : '✔'}</span>
                                                <span className="font-bold text-base leading-snug">{f.msg}</span>
                                            </div>
                                            {f.rationale && <div className={`mt-2 ml-8 text-sm ${f.type === 'pearl' ? 'italic font-medium text-base' : 'text-slate-600'}`}>{f.rationale}</div>}
                                        </li>
                                    ))}
                                </ul>
                                <button onClick={() => loadCase(currentCaseId)} className="mt-8 w-full md:w-auto bg-slate-800 text-white font-bold px-10 py-4 rounded-lg hover:bg-slate-700 shadow-md transition-colors uppercase tracking-wider text-sm">
                                    Retry Case
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('frameworks');
            const [isCompleted, setIsCompleted] = useState(false);
            
            // Check completion status on load
            useEffect(() => {
                const progress = JSON.parse(localStorage.getItem('osce_progress') || '{}');
                if (progress.s1) {
                    setIsCompleted(true);
                }
            }, []);
            
            // Mark as complete and redirect to dashboard
            const markCompleted = () => {
                const progress = JSON.parse(localStorage.getItem('osce_progress') || '{}');
                progress.s1 = true; // s1 matches Family Medicine in index.html
                localStorage.setItem('osce_progress', JSON.stringify(progress));
                setIsCompleted(true);
                window.location.href = 'index.html'; // Redirect to main dashboard
            };

            const tabs = [
                { id: 'frameworks', label: '1. Intro & CEA Scripts', icon: '🗣️' },
                { id: 'theory', label: '2. Detailed Action Plans', icon: '🩺' },
                { id: 'sim', label: '3. CEA Case Simulators', icon: '💬' }
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row font-sans">
                    <nav className="w-full md:w-72 bg-slate-900 text-white p-6 shadow-2xl flex-shrink-0 z-10 flex flex-col">
                        <div className="mb-10">
                            <h1 className="text-3xl font-black text-teal-400 tracking-tight">FAM MED 250</h1>
                            <p className="text-xs text-slate-400 mt-2 uppercase tracking-widest font-bold">LU5 Grand OSCE Mastery</p>
                        </div>
                        
                        <ul className="space-y-3 mb-8">
                            {tabs.map(tab => (
                                <li key={tab.id}>
                                    <button 
                                        onClick={() => setView(tab.id)} 
                                        className={`w-full flex items-center p-3 rounded-lg font-bold transition-all duration-200 ${view === tab.id ? 'bg-teal-600 text-white shadow-lg transform scale-105' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                    >
                                        <span className="mr-3 text-xl">{tab.icon}</span>
                                        {tab.label}
                                    </button>
                                </li>
                            ))}
                        </ul>
                        
                        {/* Progress Sync Control */}
                        <div className="mt-auto pt-6 border-t border-slate-800">
                            <button 
                                onClick={markCompleted}
                                className={`w-full p-4 rounded-lg font-black transition-all shadow-md uppercase tracking-wider text-sm ${isCompleted ? 'bg-emerald-600 text-white hover:bg-emerald-500' : 'bg-slate-700 text-slate-300 hover:bg-emerald-600 hover:text-white'}`}
                            >
                                {isCompleted ? '✓ Station Reviewed' : 'Mark as Reviewed'}
                            </button>
                            <a href="index.html" className="block text-center mt-6 text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-white transition-colors">
                                &larr; Back to Dashboard
                            </a>
                        </div>
                    </nav>
                    
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto bg-slate-100 h-screen custom-scrollbar">
                        <div className="max-w-5xl mx-auto">
                            {view === 'frameworks' && <CEARubric />}
                            {view === 'theory' && <MedicalPlanBank />}
                            {view === 'sim' && <CEASimulator />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

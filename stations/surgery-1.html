<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURG 250 OSCE Master - Clinical Breast Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fdf2f8; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }
        .blank-hidden { background-color: #cbd5e1; color: transparent; user-select: none; }
        .blank-hidden:hover { background-color: #94a3b8; color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- View 1: The Interactive Script with Random Active Recall ---
        const OSCECBEScript = () => {
            const [activeStep, setActiveStep] = useState(0);
            const [memorizeMode, setMemorizeMode] = useState(false);
            const [hiddenWords, setHiddenWords] = useState(new Set());

            const steps = [
                {
                    id: 1,
                    title: "Phase 1: Introduction, Consent & The Chaperone Trap",
                    checklist: [1, 2, 3, 4],
                    patient: "Magandang umaga/hapon po, Ma’am. Ako po si Doc CJ, isang estudyanteng doktor mula sa UP. Kailangan ko po sanang suriin ang inyong mga [suso at kili-kili] para makasiguro tayong walang bukol. Dahil medyo maselan po ang pagsusuring ito, kukuha po ako ng kasamang [babaeng nurse] dito sa loob ng kwarto para sa inyong kapanatagan. Papayag po ba kayo?",
                    preceptor: "Good morning, Doctors. I have washed my hands and introduced myself. I am establishing patient identity and gaining consent. Because I am a [male examinee], I am explicitly requesting a [female chaperone] to be present in the room before I proceed. I will ensure patient privacy and ask the patient to disrobe to the waist."
                },
                {
                    id: 2,
                    title: "Phase 2: Visual Inspection (The 4 Positions)",
                    checklist: [5, 6],
                    patient: "Ma’am, maaari po bang maupo kayo sa gilid ng kama? Una po, ibaba niyo ang inyong mga kamay sa gilid. Pangalawa, paki-[pamewang nang mariin] para tumigas ang kalamnan sa dibdib. Pangatlo, paki-[taas ang dalawang kamay] sa likod ng ulo. At panghuli, maaari po bang [yumuko kayo] nang kaunti paharap?",
                    preceptor: "With the patient seated, I am inspecting the breasts in four positions: [arms at sides], [hands pressed firmly on hips] to contract the pectoral muscles, [arms raised over the head], and [leaning forward] to check suspensory ligaments. I am looking for [symmetry], contour, skin changes like [peau d'orange] or erythema, and assessing the nipples for [retraction], deviation, or discharge."
                },
                {
                    id: 3,
                    title: "Phase 3: Breast Palpation (The Vertical Strip)",
                    checklist: [7, 8, 9, 10],
                    patient: "Ngayon po ay hihiga tayo. Ipapatong ko po itong unan sa likod ng inyong kanang balikat. Paki-taas po ang inyong [kanang kamay] at ilagay sa likod ng ulo. Kakapain ko na po ang inyong dibdib, sabihin niyo po kung may masakit.",
                    preceptor: "I am placing the patient in a [supine position] with a pillow under the ipsilateral shoulder and the arm tucked behind the head to flatten the breast tissue. Using the [pads of my 2nd, 3rd, and 4th fingers], I am palpating using the [vertical strip] pattern. I will apply [light, medium, and deep] pressure at each point, covering the entire breast from the clavicle down to the inframammary fold, and from the midsternal line to the posterior axillary line. I am also ensuring I palpate the [Tail of Spence]."
                },
                {
                    id: 4,
                    title: "Phase 4: Lymph Node Palpation",
                    checklist: [11, 12, 13],
                    patient: "Ma'am, maaari po ba kayong maupo ulit? Ipatong niyo lang po ang inyong braso sa aking braso para makapag-relax ang inyong kili-kili. Kakapain ko po ang inyong mga kulani.",
                    preceptor: "I ask the patient to sit. I am [supporting the patient's arm] to fully relax the axillary floor. I am palpating high into the apex for the [central nodes], against the anterior axillary fold for the [pectoral nodes], against the posterior fold for the [subscapular nodes], and against the upper humerus for the [lateral nodes]. I will then palpate the [supraclavicular] and [infraclavicular] lymph node chains."
                },
                {
                    id: 5,
                    title: "Phase 5: Conclusion & Reporting",
                    checklist: [14, 15],
                    patient: "Tapos na po ang ating pagsusuri. Maaari na po kayong magbihis. Base po sa aking nakapa, wala naman po tayong nakitang kakaibang bukol. Maraming salamat po sa inyong kooperasyon.",
                    preceptor: "The examination is complete. The patient has been covered and asked to dress. Doc, presenting my findings: Breasts are [symmetric] with no visible skin dimpling, retractions, or peau d'orange. Palpation using the vertical strip method revealed [no palpable masses], tenderness, or nipple discharge. There is [no axillary or supraclavicular lymphadenopathy] noted. The clinical breast exam is normal."
                }
            ];

            const rubric = [
                {id: 1, text: "Perform Hand Hygiene", phase: 1},
                {id: 2, text: "Introduce self, ID patient, Explain Procedure", phase: 1},
                {id: 3, text: "EXPLICITLY Request Female Chaperone", phase: 1},
                {id: 4, text: "Expose chest completely with dignity", phase: 1},
                {id: 5, text: "Inspect in 4 distinct positions", phase: 2},
                {id: 6, text: "Verbalize inspection (symmetry, skin, nipple)", phase: 2},
                {id: 7, text: "Position patient supine, arm behind head", phase: 3},
                {id: 8, text: "Use pads of 3 middle fingers", phase: 3},
                {id: 9, text: "Use Vertical Strip pattern (or concentric)", phase: 3},
                {id: 10, text: "Palpate Light, Medium, and Deep", phase: 3},
                {id: 11, text: "Palpate Tail of Spence", phase: 3},
                {id: 12, text: "Support arm to relax axilla (Sitting)", phase: 4},
                {id: 13, text: "Palpate Axillary & Supraclavicular nodes", phase: 4},
                {id: 14, text: "Assist patient in dressing", phase: 5},
                {id: 15, text: "Formal presentation of findings", phase: 5}
            ];

            const shuffleBlanks = (stepIdx) => {
                const step = steps[stepIdx];
                const newHidden = new Set();
                const processText = (text, role) => {
                    if (!text) return;
                    const parts = text.split(/\[(.*?)\]/g);
                    parts.forEach((part, i) => {
                        if (i % 2 === 1) { 
                            if (Math.random() > 0.3) {
                                newHidden.add(`${stepIdx}-${role}-${i}`);
                            }
                        }
                    });
                };
                processText(step.patient, 'patient');
                processText(step.preceptor, 'preceptor');
                setHiddenWords(newHidden);
            };

            useEffect(() => {
                if (memorizeMode) shuffleBlanks(activeStep);
                else setHiddenWords(new Set());
            }, [activeStep, memorizeMode]);

            const revealWord = (id) => {
                setHiddenWords(prev => {
                    const next = new Set(prev);
                    next.delete(id);
                    return next;
                });
            };

            const renderText = (text, stepIndex, role) => {
                if (!text) return null;
                if (!memorizeMode) {
                    const parts = text.split(/\[(.*?)\]/g);
                    return parts.map((part, i) => i % 2 === 1 ? <strong key={i} className="text-current">{part}</strong> : <span key={i}>{part}</span>);
                }
                const parts = text.split(/\[(.*?)\]/g);
                return parts.map((part, i) => {
                    if (i % 2 === 1) {
                        const wordId = `${stepIndex}-${role}-${i}`;
                        const isHidden = hiddenWords.has(wordId);
                        if (isHidden) {
                            return <span key={wordId} onClick={() => revealWord(wordId)} className="blank-hidden px-2 py-0.5 rounded cursor-pointer mx-0.5 shadow-inner" title="Click to reveal">{part}</span>;
                        } else {
                            return <span key={wordId} className="font-bold bg-pink-100 text-pink-800 px-1 rounded mx-0.5 shadow-sm">{part}</span>;
                        }
                    }
                    return <span key={i}>{part}</span>;
                });
            };

            return (
                <div className="flex flex-col md:flex-row gap-6 animate-fade-in pb-10">
                    <div className="flex-1 space-y-4">
                        <div className="bg-slate-800 text-white p-5 rounded-xl shadow-lg mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h2 className="text-2xl font-black text-pink-400">The CBE OSCE Script</h2>
                                <p className="text-sm text-slate-300 mt-1">Verbalize the Filipino text to the patient, and the English text to the preceptor.</p>
                            </div>
                            <div className="flex flex-col gap-2">
                                <label className="text-sm font-bold text-white cursor-pointer select-none flex items-center bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-lg transition-colors">
                                    <input type="checkbox" checked={memorizeMode} onChange={() => setMemorizeMode(!memorizeMode)} className="mr-2 w-4 h-4 accent-pink-500" />
                                    Active Recall Mode
                                </label>
                                {memorizeMode && (
                                    <button onClick={() => shuffleBlanks(activeStep)} className="text-xs bg-pink-600 hover:bg-pink-500 text-white font-bold py-1.5 px-3 rounded shadow">
                                        🔀 Shuffle Blanks
                                    </button>
                                )}
                            </div>
                        </div>

                        {memorizeMode && (
                            <div className="bg-amber-50 border-l-4 border-amber-400 p-4 mb-6 text-amber-900 text-sm flex items-start shadow-sm">
                                <span className="text-xl mr-3">🧠</span>
                                <div><strong>Randomized Recall Active!</strong> Approx 70% of the clinical keywords have been hidden. Say the line out loud, then click the gray boxes to reveal.</div>
                            </div>
                        )}

                        {steps.map((step, idx) => (
                            <div key={step.id} className={`border-2 rounded-xl transition-all overflow-hidden ${activeStep === idx ? 'border-pink-500 shadow-md ring-4 ring-pink-50' : 'border-slate-200 hover:border-pink-300 cursor-pointer'}`}>
                                <div className={`p-4 font-bold flex justify-between items-center ${activeStep === idx ? 'bg-pink-50 text-pink-900' : 'bg-slate-50 text-slate-700'}`} onClick={() => setActiveStep(idx)}>
                                    <span>{step.title}</span>
                                    {activeStep !== idx && <span className="text-xs font-normal text-slate-400">Click to expand</span>}
                                </div>
                                {activeStep === idx && (
                                    <div className="p-5 space-y-5 bg-white">
                                        {step.patient && (
                                            <div className="bg-emerald-50 p-5 rounded-lg border border-emerald-200 relative">
                                                <span className="absolute -top-3 left-4 bg-emerald-600 text-white text-xs font-bold px-3 py-1 rounded shadow-sm">TO PATIENT (FILIPINO)</span>
                                                <p className="text-emerald-900 font-medium leading-relaxed mt-2 text-[15px]">"{renderText(step.patient, idx, 'patient')}"</p>
                                            </div>
                                        )}
                                        {step.preceptor && (
                                            <div className="bg-pink-50 p-5 rounded-lg border border-pink-200 relative">
                                                <span className="absolute -top-3 left-4 bg-pink-700 text-white text-xs font-bold px-3 py-1 rounded shadow-sm">TO PRECEPTOR (ENGLISH)</span>
                                                <p className="text-pink-900 font-medium leading-relaxed mt-2 text-[15px]">"{renderText(step.preceptor, idx, 'preceptor')}"</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    <div className="w-full md:w-80 flex-shrink-0">
                        <div className="sticky top-6 bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                            <div className="bg-slate-800 p-4 text-white flex justify-between items-center">
                                <span className="font-bold">OSCE Checklist</span>
                                <span className="text-xs bg-emerald-600 px-2 py-1 rounded font-bold shadow-inner">Pass: 11/15</span>
                            </div>
                            <div className="p-4 h-[75vh] overflow-y-auto bg-slate-50">
                                <ul className="space-y-2">
                                    {rubric.map(item => {
                                        const isCovered = steps[activeStep].checklist.includes(item.id);
                                        return (
                                            <li key={item.id} className={`p-2.5 rounded-lg text-sm flex items-start transition-all duration-300 ${isCovered ? 'bg-pink-100 text-pink-900 border border-pink-300 font-bold shadow-sm' : 'text-slate-500 bg-white border border-slate-100'}`}>
                                                <span className={`mr-2 ${isCovered ? 'text-pink-600' : 'text-slate-300'}`}>{isCovered ? '✔' : '○'}</span>
                                                <span className="leading-tight">{item.text}</span>
                                            </li>
                                        )
                                    })}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- View 2: High-Yield Theory ---
        const TheoryReviewer = () => (
            <div className="space-y-8 animate-fade-in pb-10">
                <h2 className="text-3xl font-black text-slate-800 border-b-2 border-slate-300 pb-2">Preceptor Pimping (Must-Knows)</h2>
                
                <div className="grid md:grid-cols-2 gap-6">
                    <div className="bg-white rounded-xl shadow border border-slate-200 p-6">
                        <h3 className="text-xl font-bold text-red-700 mb-4 flex items-center"><span className="text-2xl mr-2">🚨</span> The Chaperone Trap</h3>
                        <p className="text-sm text-slate-700 mb-4">Because you are a male clinical clerk performing an intimate exam, you <strong>MUST</strong> explicitly verbalize the request for a female chaperone.</p>
                        <div className="bg-red-50 p-4 rounded border border-red-100">
                            <p className="text-sm text-red-900 font-medium italic">"As a male physician, I am requesting a female nurse or chaperone to be present in the room during this breast examination to ensure patient comfort and medico-legal safety."</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow border border-slate-200 p-6">
                        <h3 className="text-xl font-bold text-pink-700 mb-4 flex items-center"><span className="text-2xl mr-2">👀</span> Pathophysiology of Inspection</h3>
                        <ul className="space-y-3 text-sm text-slate-700">
                            <li><strong className="text-pink-900">Dimpling:</strong> Caused by tumor invasion and fibrotic shortening of the <strong>Suspensory Ligaments of Cooper</strong>, pulling the skin inward.</li>
                            <li><strong className="text-pink-900">Peau d'orange:</strong> French for "orange peel." Caused by tumor emboli obstructing the <strong>subdermal lymphatic channels</strong>, causing local lymphedema and prominent skin pores.</li>
                            <li><strong className="text-pink-900">Nipple Retraction:</strong> Can be normal if long-standing, but new onset suggests a subareolar cancer infiltrating and pulling the mammary ducts.</li>
                        </ul>
                    </div>

                    <div className="bg-white rounded-xl shadow border border-slate-200 p-6">
                        <h3 className="text-xl font-bold text-indigo-700 mb-4 flex items-center"><span className="text-2xl mr-2">🤚</span> Palpation Principles</h3>
                        <ul className="space-y-3 text-sm text-slate-700">
                            <li><strong className="text-indigo-900">Why Vertical Strip?</strong> Studies show the vertical strip (lawnmower) pattern is the most validated method to ensure no breast tissue is missed.</li>
                            <li><strong className="text-indigo-900">Why Light, Medium, Deep?</strong> Light pressure palpates the subcutaneous tissue. Medium palpates the mid-mammary tissue. Deep palpates down to the pectoral fascia.</li>
                            <li><strong className="text-indigo-900">The Tail of Spence:</strong> Breast tissue that extends into the upper outer quadrant toward the axilla. It is the most common site for breast cancer.</li>
                        </ul>
                    </div>

                    <div className="bg-white rounded-xl shadow border border-slate-200 p-6">
                        <h3 className="text-xl font-bold text-emerald-700 mb-4 flex items-center"><span className="text-2xl mr-2">🟢</span> Lymph Node Anatomy</h3>
                        <p className="text-sm text-slate-700 mb-3">You must know where your fingers are pressing during the axillary exam:</p>
                        <ul className="space-y-2 text-sm text-slate-700">
                            <li>• <strong>Pectoral (Anterior):</strong> Lower border of pec major.</li>
                            <li>• <strong>Subscapular (Posterior):</strong> Lateral border of scapula.</li>
                            <li>• <strong>Lateral:</strong> Along the upper humerus.</li>
                            <li>• <strong>Central:</strong> High in the axillary apex (where the other 3 groups drain into).</li>
                        </ul>
                    </div>
                </div>
            </div>
        );

        // --- View 3: Pathology Matrix ---
        const PathologyMatrix = () => (
            <div className="space-y-8 animate-fade-in pb-10">
                <h2 className="text-3xl font-black text-slate-800 border-b-2 border-slate-300 pb-2">Breast Mass Differentiation</h2>

                <div className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
                    <div className="bg-pink-50 p-5 border-b border-pink-200">
                        <h3 className="font-bold text-pink-900 text-lg">Describing a Mass (The 6 Features)</h3>
                        <p className="text-sm text-pink-800 mt-2 leading-relaxed">If you palpate a mass during the OSCE, you must describe it using 6 characteristics: <strong>Location</strong> (Clock face/Quadrant & distance from nipple), <strong>Size</strong> (in cm), <strong>Shape</strong> (round, irregular), <strong>Consistency</strong> (soft, rubbery, firm, hard), <strong>Mobility</strong> (mobile, fixed to skin/muscle), and <strong>Tenderness</strong>.</p>
                    </div>
                    
                    <div className="p-6 overflow-x-auto">
                        <table className="min-w-full text-left text-sm border-collapse">
                            <thead>
                                <tr className="bg-slate-100 text-slate-800">
                                    <th className="p-3 border font-bold">Etiology</th>
                                    <th className="p-3 border font-bold">Typical Age</th>
                                    <th className="p-3 border font-bold">Palpation Characteristics</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y text-slate-700">
                                <tr className="hover:bg-slate-50">
                                    <td className="p-3 border font-black text-slate-900">Fibroadenoma</td>
                                    <td className="p-3 border font-medium">15 - 25 years</td>
                                    <td className="p-3 border">
                                        Single, usually 1-2 cm, round/disc-like. <span className="font-bold text-green-700">Firm and rubbery.</span> Highly mobile ("breast mouse"). Non-tender.
                                    </td>
                                </tr>
                                <tr className="hover:bg-slate-50">
                                    <td className="p-3 border font-black text-slate-900">Fibrocystic Changes</td>
                                    <td className="p-3 border font-medium">30 - 50 years</td>
                                    <td className="p-3 border">
                                        Multiple/bilateral. Round, soft to firm. <span className="font-bold text-amber-600">Tender.</span> Mobile. Size and tenderness fluctuate with the menstrual cycle.
                                    </td>
                                </tr>
                                <tr className="hover:bg-slate-50">
                                    <td className="p-3 border font-black text-slate-900">Breast Cancer</td>
                                    <td className="p-3 border font-medium">30 - 90+ years</td>
                                    <td className="p-3 border">
                                        Usually single. Irregular or stellate shape. <span className="font-bold text-red-700">Hard consistency.</span> Fixed to skin or underlying tissue. Usually painless.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('script');
            const tabs = [
                { id: 'script', label: '1. CBE Interactive Script', icon: '🩺' },
                { id: 'theory', label: '2. Preceptor Must-Knows', icon: '🧠' },
                { id: 'pathology', label: '3. Mass Differentiation', icon: '📊' }
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row font-sans">
                    <nav className="w-full md:w-72 bg-slate-900 text-white p-6 shadow-2xl flex-shrink-0 z-10">
                        <div className="mb-10">
                            <h1 className="text-3xl font-black text-pink-400 tracking-tight">SURG 250</h1>
                            <p className="text-xs text-slate-400 mt-2 uppercase tracking-widest font-bold">LU5 Breast Exam OSCE</p>
                        </div>
                        <ul className="space-y-3">
                            {tabs.map(tab => (
                                <li key={tab.id}>
                                    <button 
                                        onClick={() => setView(tab.id)} 
                                        className={`w-full flex items-center p-3 rounded-lg font-bold transition-all duration-200 ${view === tab.id ? 'bg-pink-600 text-white shadow-lg transform scale-105' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                    >
                                        <span className="mr-3 text-xl">{tab.icon}</span>
                                        {tab.label}
                                    </button>
                                </li>
                            ))}
                        </ul>
                    </nav>
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto bg-slate-50">
                        <div className="max-w-6xl mx-auto">
                            {view === 'script' && <OSCECBEScript />}
                            {view === 'theory' && <TheoryReviewer />}
                            {view === 'pathology' && <PathologyMatrix />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

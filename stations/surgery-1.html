<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURG 250 OSCE - Ultimate CBE Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fdf2f8; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }
        .blank-hidden { background-color: #cbd5e1; color: transparent; user-select: none; }
        .blank-hidden:hover { background-color: #94a3b8; color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- View 1: The Interactive Script ---
        const OSCECBEScript = () => {
            const [activeStep, setActiveStep] = useState(0);
            const [memorizeMode, setMemorizeMode] = useState(false);
            const [hiddenWords, setHiddenWords] = useState(new Set());

            const steps = [
                {
                    id: 1,
                    title: "Phase 1: Intro, Tools & The Chaperone",
                    checklist: [1],
                    patient: "Magandang umaga/hapon po, Ma’am. Ako po si Doc CJ, isang clinical clerk mula sa UP. Kailangan ko po sanang suriin ang inyong mga {suso at kili-kili}. Dahil medyo maselan po ang pagsusuring ito, kukuha po ako ng kasamang {babaeng nurse o chaperone} dito sa loob ng kwarto para sa inyong kapanatagan. Papayag po ba kayo?",
                    preceptor: "Good morning, Doctors. I have washed my hands and introduced myself. I am verifying patient identity and gaining consent. Because I am a {male examinee}, I am explicitly requesting a {female chaperone} to be present. I have prepared my {caliper} and {marker}. I will ensure privacy and ask the patient to disrobe to the waist."
                },
                {
                    id: 2,
                    title: "Phase 2: Visual Inspection (The 4 Maneuvers)",
                    checklist: [2, 3, 4, 5, 6, 7],
                    patient: "Ma’am, maaari po bang maupo kayo sa gilid ng kama? Una po, ibaba niyo ang inyong mga kamay sa gilid. Pangalawa, paki-{pamewang nang mariin} para tumigas ang kalamnan sa dibdib. Pangatlo, paki-{taas ang dalawang kamay} sa likod ng ulo. At panghuli, maaari po bang {yumuko kayo} nang kaunti paharap?",
                    preceptor: "With the patient seated, I am inspecting in 4 positions to check for {size and symmetry}, any visible {masses}, skin changes like {peau d'orange}, any {nipple retraction} or deviation, and the presence of {rashes or ulcerations}."
                },
                {
                    id: 3,
                    title: "Phase 3: Palpation (Ipsilateral Stance & Borders)",
                    checklist: [8, 9, 10, 11, 12, 13],
                    patient: "Ngayon po ay hihiga tayo. Ipapatong ko po itong unan sa likod ng inyong kanang balikat. Paki-taas po ang inyong {kanang kamay} at ilagay sa likod ng ulo. Kakapain ko na po ang inyong dibdib.",
                    preceptor: "I am placing the patient {supine} with the arm raised over 90 degrees to flatten the tissue. Crucially, I am standing on the {ipsilateral side} of the breast being examined to avoid reaching over. Using the pads of my {2nd, 3rd, and 4th fingers} of {two hands}, I am palpating in a {vertical strip} pattern. I will cover the strict anatomical borders: superiorly to the {clavicle}, medially to the {mid-sternum}, laterally to the {mid-axillary line}, and inferiorly to the {inframammary fold}. I will also palpate the {axillary tail of Spence} and gently compress the areola for {nipple discharge}."
                },
                {
                    id: 4,
                    title: "Phase 4: Lymph Nodes (The Caudal Sweep)",
                    checklist: [14, 15],
                    patient: "Ma'am, maaari po ba kayong maupo ulit? Ipatong niyo lang po ang inyong braso sa aking braso para makapag-relax ang inyong kili-kili. Kakapain ko po ang inyong mga kulani.",
                    preceptor: "The patient is seated. I am supporting the patient's arm to fully relax the axillary floor. I am strictly using my {contralateral hand} to examine the axilla. I push upward toward the apex, then gently bring my hand {caudally} while pressing against the chest wall to palpate the central, pectoral, subscapular, and lateral nodes. I will also palpate the {supraclavicular} and {infraclavicular} fossae."
                },
                {
                    id: 5,
                    title: "Phase 5: Reporting (The Calliper Format)",
                    checklist: [16, 17],
                    patient: "Tapos na po ang ating pagsusuri. Maaari na po kayong magbihis. Base po sa aking nakapa, narito po ang ating mga susunod na hakbang... Maraming salamat po sa inyong kooperasyon.",
                    preceptor: "The examination is complete. Presenting my findings: In the Left breast, I palpated a mass at {Location/Clock-face}, measuring exactly {Size} cm using my {caliper}, described as {Shape and Consistency}. In the Right breast, {Findings}. There is no nipple discharge and no axillary or supraclavicular lymphadenopathy noted."
                }
            ];

            const rubric = [
                {id: 1, text: "Intro, ID patient, Request Female Chaperone", phase: 1},
                {id: 2, text: "INSPECT: Position - explain 4 different maneuvers", phase: 2},
                {id: 3, text: "INSPECT: Report size and symmetry", phase: 2},
                {id: 4, text: "INSPECT: Mass (report any visible mass)", phase: 2},
                {id: 5, text: "INSPECT: Skin changes (peau d' orange)", phase: 2},
                {id: 6, text: "INSPECT: Nipple retraction", phase: 2},
                {id: 7, text: "INSPECT: Rashes or ulcerations", phase: 2},
                {id: 8, text: "PALPATE: Patient supine, arms over head", phase: 3},
                {id: 9, text: "PALPATE: Systematic exam (vertical strip) using 2 hands", phase: 3},
                {id: 10, text: "PALPATE: Left breast (use CALIPER) & Describe", phase: 3},
                {id: 11, text: "PALPATE: Right breast (use CALIPER) & Describe", phase: 3},
                {id: 12, text: "PALPATE: Tail of Spence explicitly palpated", phase: 3},
                {id: 13, text: "NIPPLE: Check for discharge bilaterally", phase: 3},
                {id: 14, text: "AXILLA: Support arm, use contralateral hand, caudal sweep", phase: 4},
                {id: 15, text: "SUPRACLAVICULAR: Palpate fossae", phase: 4},
                {id: 16, text: "IMPRESSION: Left Breast (Location, Size, Description)", phase: 5},
                {id: 17, text: "IMPRESSION: Right Breast (Location, Size, Description)", phase: 5}
            ];

            const shuffleBlanks = (stepIdx) => {
                const step = steps[stepIdx];
                const newHidden = new Set();
                const processText = (text, role) => {
                    if (!text) return;
                    const parts = text.split(/\{(.*?)\}/g);
                    parts.forEach((part, i) => {
                        if (i % 2 === 1 && Math.random() > 0.3) {
                            newHidden.add(`${stepIdx}-${role}-${i}`);
                        }
                    });
                };
                processText(step.patient, 'patient');
                processText(step.preceptor, 'preceptor');
                setHiddenWords(newHidden);
            };

            useEffect(() => {
                if (memorizeMode) shuffleBlanks(activeStep);
                else setHiddenWords(new Set());
            }, [activeStep, memorizeMode]);

            const revealWord = (id) => {
                setHiddenWords(prev => {
                    const next = new Set(prev);
                    next.delete(id);
                    return next;
                });
            };

            const renderText = (text, stepIndex, role) => {
                if (!text) return null;
                if (!memorizeMode) {
                    const parts = text.split(/\{(.*?)\}/g);
                    return parts.map((part, i) => i % 2 === 1 ? <strong key={i} className="text-pink-700">{part}</strong> : <span key={i}>{part}</span>);
                }
                const parts = text.split(/\{(.*?)\}/g);
                return parts.map((part, i) => {
                    if (i % 2 === 1) {
                        const wordId = `${stepIndex}-${role}-${i}`;
                        const isHidden = hiddenWords.has(wordId);
                        if (isHidden) {
                            return <span key={wordId} onClick={() => revealWord(wordId)} className="blank-hidden px-2 py-0.5 rounded cursor-pointer mx-0.5 shadow-inner" title="Click to reveal">{part}</span>;
                        } else {
                            return <span key={wordId} className="font-bold bg-pink-100 text-pink-800 px-1 rounded mx-0.5 shadow-sm">{part}</span>;
                        }
                    }
                    return <span key={i}>{part}</span>;
                });
            };

            return (
                <div className="flex flex-col md:flex-row gap-6 animate-fade-in pb-10">
                    <div className="flex-1 space-y-4">
                        <div className="bg-slate-800 text-white p-5 rounded-xl shadow-lg mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h2 className="text-2xl font-black text-pink-400">The CBE Master Script</h2>
                                <p className="text-sm text-slate-300 mt-1">Verbalize the Filipino text to the patient, and the English text to the preceptor.</p>
                            </div>
                            <div className="flex flex-col gap-2">
                                <label className="text-sm font-bold text-white cursor-pointer select-none flex items-center bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-lg transition-colors">
                                    <input type="checkbox" checked={memorizeMode} onChange={() => setMemorizeMode(!memorizeMode)} className="mr-2 w-4 h-4 accent-pink-500" />
                                    Active Recall Mode
                                </label>
                                {memorizeMode && (
                                    <button onClick={() => shuffleBlanks(activeStep)} className="text-xs bg-pink-600 hover:bg-pink-500 text-white font-bold py-1.5 px-3 rounded shadow">
                                        🔀 Shuffle Blanks
                                    </button>
                                )}
                            </div>
                        </div>

                        {memorizeMode && (
                            <div className="bg-amber-50 border-l-4 border-amber-400 p-4 mb-6 text-amber-900 text-sm flex items-start shadow-sm">
                                <span className="text-xl mr-3">🧠</span>
                                <div><strong>Randomized Recall Active!</strong> Approx 70% of the clinical keywords have been hidden. Say the line out loud, then click the gray boxes to reveal.</div>
                            </div>
                        )}

                        {steps.map((step, idx) => (
                            <div key={step.id} className={`border-2 rounded-xl transition-all overflow-hidden ${activeStep === idx ? 'border-pink-500 shadow-md ring-4 ring-pink-50' : 'border-slate-200 hover:border-pink-300 cursor-pointer'}`}>
                                <div className={`p-4 font-bold flex justify-between items-center ${activeStep === idx ? 'bg-pink-50 text-pink-900' : 'bg-slate-50 text-slate-700'}`} onClick={() => setActiveStep(idx)}>
                                    <span>{step.title}</span>
                                    {activeStep !== idx && <span className="text-xs font-normal text-slate-400">Click to expand</span>}
                                </div>
                                {activeStep === idx && (
                                    <div className="p-5 space-y-5 bg-white">
                                        {step.patient && (
                                            <div className="bg-emerald-50 p-5 rounded-lg border border-emerald-200 relative">
                                                <span className="absolute -top-3 left-4 bg-emerald-600 text-white text-xs font-bold px-3 py-1 rounded shadow-sm">TO PATIENT (FILIPINO)</span>
                                                <p className="text-emerald-900 font-medium leading-relaxed mt-2 text-[15px]">"{renderText(step.patient, idx, 'patient')}"</p>
                                            </div>
                                        )}
                                        {step.preceptor && (
                                            <div className="bg-pink-50 p-5 rounded-lg border border-pink-200 relative">
                                                <span className="absolute -top-3 left-4 bg-pink-700 text-white text-xs font-bold px-3 py-1 rounded shadow-sm">TO PRECEPTOR (ENGLISH)</span>
                                                <p className="text-pink-900 font-medium leading-relaxed mt-2 text-[15px]">"{renderText(step.preceptor, idx, 'preceptor')}"</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    <div className="w-full md:w-80 flex-shrink-0">
                        <div className="sticky top-6 bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                            <div className="bg-slate-800 p-4 text-white flex justify-between items-center">
                                <span className="font-bold">LU5 OSCE Checklist</span>
                                <span className="text-xs bg-emerald-600 px-2 py-1 rounded font-bold shadow-inner">Pass: 12/17</span>
                            </div>
                            <div className="p-4 h-[75vh] overflow-y-auto bg-slate-50">
                                <ul className="space-y-2">
                                    {rubric.map(item => {
                                        const isCovered = steps[activeStep].checklist.includes(item.id);
                                        return (
                                            <li key={item.id} className={`p-2.5 rounded-lg text-sm flex items-start transition-all duration-300 ${isCovered ? 'bg-pink-100 text-pink-900 border border-pink-300 font-bold shadow-sm' : 'text-slate-500 bg-white border border-slate-100'}`}>
                                                <span className={`mr-2 ${isCovered ? 'text-pink-600' : 'text-slate-300'}`}>{isCovered ? '✔' : '○'}</span>
                                                <span className="leading-tight">{item.text}</span>
                                            </li>
                                        )
                                    })}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- View 2: High-Yield Theory ---
        const TheoryReviewer = () => (
            <div className="space-y-8 animate-fade-in pb-10">
                <h2 className="text-3xl font-black text-slate-800 border-b-2 border-slate-300 pb-2">Top-Student Preceptor Pearls</h2>
                
                <div className="grid md:grid-cols-2 gap-6">
                    <div className="bg-white rounded-xl shadow border border-slate-200 p-6">
                        <h3 className="text-xl font-bold text-red-700 mb-4 flex items-center"><span className="text-2xl mr-2">🚨</span> The Positioning Traps</h3>
                        <ul className="space-y-3 text-sm text-slate-700">
                            <li><strong className="text-red-900">The Ipsilateral Stance:</strong> NEVER reach over the patient's chest. You must physically move to stand on the side of the breast being examined (ipsilateral side).</li>
                            <li><strong className="text-red-900">The Contralateral Hand:</strong> For the axillary exam, do NOT use your left hand to examine the left axilla. Use your contralateral hand (right hand for left axilla), pushing up to the apex and sweeping <strong>caudally</strong> against the chest wall.</li>
                        </ul>
                    </div>

                    <div className="bg-white rounded-xl shadow border border-slate-200 p-6">
                        <h3 className="text-xl font-bold text-emerald-700 mb-4 flex items-center"><span className="text-2xl mr-2">📍</span> The Absolute Boundaries</h3>
                        <p className="text-sm text-slate-700 mb-4">Verbalizing "I am palpating the breast" is insufficient. You must trace and state the exact anatomical borders:</p>
                        <div className="bg-emerald-50 p-4 rounded border border-emerald-100">
                            <ul className="space-y-2 text-sm text-emerald-900 font-medium">
                                <li>• <strong>Superior:</strong> Clavicle</li>
                                <li>• <strong>Medial:</strong> Mid-sternum</li>
                                <li>• <strong>Lateral:</strong> Mid-axillary line</li>
                                <li>• <strong>Inferior:</strong> Inframammary fold ("bra line")</li>
                            </ul>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow border border-slate-200 p-6">
                        <h3 className="text-xl font-bold text-indigo-700 mb-4 flex items-center"><span className="text-2xl mr-2">🪡</span> Prior Mastectomy Protocol</h3>
                        <p className="text-sm text-slate-700 mb-4">If the standardized patient has a mastectomy scar, your examination priorities shift.</p>
                        <ul className="space-y-3 text-sm text-slate-700">
                            <li><strong className="text-indigo-900">Inspect the Scar & Axilla:</strong> Look for nodularity, masses, or color changes, which are highly worrisome for local recurrence.</li>
                            <li><strong className="text-indigo-900">Inspect the Arm:</strong> Check for swelling (Lymphedema). This is caused by disruption of lymphatic chains from prior axillary node dissection or sampling.</li>
                        </ul>
                    </div>

                    <div className="bg-white rounded-xl shadow border border-slate-200 p-6">
                        <h3 className="text-xl font-bold text-pink-700 mb-4 flex items-center"><span className="text-2xl mr-2">👀</span> Pathophysiology of Inspection</h3>
                        <ul className="space-y-3 text-sm text-slate-700">
                            <li><strong className="text-pink-900">Dimpling:</strong> Caused by tumor invasion and fibrotic shortening of the <strong>Suspensory Ligaments of Cooper</strong>.</li>
                            <li><strong className="text-pink-900">Peau d'orange:</strong> Caused by tumor emboli obstructing the <strong>subdermal lymphatic channels</strong>, causing local lymphedema.</li>
                            <li><strong className="text-pink-900">Tools of the Trade:</strong> Always mention using the <strong>Caliper</strong> to measure, and the <strong>Marker</strong> to mark the skin overlaying the lesion for future biopsy/surgical mapping.</li>
                        </ul>
                    </div>
                </div>
            </div>
        );

        // --- View 3: Pathology Matrix ---
        const PathologyMatrix = () => (
            <div className="space-y-8 animate-fade-in pb-10">
                <h2 className="text-3xl font-black text-slate-800 border-b-2 border-slate-300 pb-2">Clinical Impression Formulation</h2>

                <div className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
                    <div className="bg-pink-50 p-5 border-b border-pink-200">
                        <h3 className="font-bold text-pink-900 text-lg">Describing a Mass (The 6 Features)</h3>
                        <p className="text-sm text-pink-800 mt-2 leading-relaxed">During the Clinical Impression portion of the rubric, you must describe lesions using these features: <strong>Location</strong> (Clock face/Quadrant & distance from nipple), <strong>Size</strong> (in cm using caliper), <strong>Shape</strong> (round, irregular), <strong>Consistency</strong> (soft, rubbery, firm, hard), <strong>Mobility</strong> (mobile, fixed to skin/muscle), and <strong>Tenderness</strong>.</p>
                    </div>
                    
                    <div className="p-6 overflow-x-auto">
                        <table className="min-w-full text-left text-sm border-collapse">
                            <thead>
                                <tr className="bg-slate-100 text-slate-800">
                                    <th className="p-3 border font-bold">Etiology</th>
                                    <th className="p-3 border font-bold">Typical Age</th>
                                    <th className="p-3 border font-bold">Palpation Characteristics</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y text-slate-700">
                                <tr className="hover:bg-slate-50">
                                    <td className="p-3 border font-black text-slate-900">Fibroadenoma</td>
                                    <td className="p-3 border font-medium">15 - 25 years</td>
                                    <td className="p-3 border">
                                        Single, usually 1-2 cm, round/disc-like. <span className="font-bold text-green-700">Firm and rubbery.</span> Highly mobile ("breast mouse"). Non-tender.
                                    </td>
                                </tr>
                                <tr className="hover:bg-slate-50">
                                    <td className="p-3 border font-black text-slate-900">Fibrocystic Changes</td>
                                    <td className="p-3 border font-medium">30 - 50 years</td>
                                    <td className="p-3 border">
                                        Multiple/bilateral. Round, soft to firm. <span className="font-bold text-amber-600">Tender.</span> Mobile. Size and tenderness fluctuate with the menstrual cycle.
                                    </td>
                                </tr>
                                <tr className="hover:bg-slate-50">
                                    <td className="p-3 border font-black text-slate-900">Breast Malignancy</td>
                                    <td className="p-3 border font-medium">30 - 90+ years</td>
                                    <td className="p-3 border">
                                        Usually single. Irregular or stellate shape. <span className="font-bold text-red-700">Hard consistency.</span> Fixed to skin or underlying tissue. Usually painless.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('script');
            const tabs = [
                { id: 'script', label: '1. CBE Interactive Script', icon: '🩺' },
                { id: 'theory', label: '2. Preceptor Must-Knows', icon: '🧠' },
                { id: 'pathology', label: '3. Clinical Impressions', icon: '📊' }
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row font-sans">
                    <nav className="w-full md:w-72 bg-slate-900 text-white p-6 shadow-2xl flex-shrink-0 z-10">
                        <div className="mb-10">
                            <h1 className="text-3xl font-black text-pink-400 tracking-tight">SURG 250</h1>
                            <p className="text-xs text-slate-400 mt-2 uppercase tracking-widest font-bold">LU5 Breast Exam OSCE</p>
                        </div>
                        <ul className="space-y-3">
                            {tabs.map(tab => (
                                <li key={tab.id}>
                                    <button 
                                        onClick={() => setView(tab.id)} 
                                        className={`w-full flex items-center p-3 rounded-lg font-bold transition-all duration-200 ${view === tab.id ? 'bg-pink-600 text-white shadow-lg transform scale-105' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                    >
                                        <span className="mr-3 text-xl">{tab.icon}</span>
                                        {tab.label}
                                    </button>
                                </li>
                            ))}
                        </ul>
                    </nav>
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto bg-slate-50">
                        <div className="max-w-6xl mx-auto">
                            {view === 'script' && <OSCECBEScript />}
                            {view === 'theory' && <TheoryReviewer />}
                            {view === 'pathology' && <PathologyMatrix />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

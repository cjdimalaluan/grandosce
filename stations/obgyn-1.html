            const [revealed, setRevealed] = useState(false);

            useEffect(() => {
                setRevealed(false);
            }, [isRecallMode]);

            if (!isRecallMode) {
                return <span className="font-bold text-sky-700">{word}</span>;
            }

            return (
                <span 
                    className={revealed ? "cloze-revealed" : "cloze-hidden"} 
                    onClick={() => setRevealed(!revealed)}
                    title={revealed ? "Click to hide" : "Click to reveal"}
                >
                    {word}
                </span>
            );
        };

        const processCloze = (str, isRecallMode) => {
            const clozeRegex = /\{(.*?)\}/g;
            const parts = str.split(clozeRegex);
            
            return parts.map((part, index) => {
                if (index % 2 === 1) { 
                    return <ClozeWord key={`cloze-${index}`} word={part} isRecallMode={isRecallMode} />;
                }
                return <span key={`text-${index}`}>{part}</span>;
            });

        const ScriptLine = ({ item, isRecallMode }) => {
            if (item.type === "section") {
                return <div className="font-black text-sky-800 text-sm tracking-widest mt-6 mb-2 uppercase border-b border-sky-100 pb-1">{item.text}</div>;
            }
            
            let badgeClass = "bg-slate-100 text-slate-800";
            let badgeText = "Action";
            
            if (item.type === "action") {
                badgeClass = "bg-amber-100 text-amber-800 border border-amber-200";
                badgeText = "Narration";
            } else if (item.type === "patient") {
                badgeClass = "bg-rose-100 text-rose-800 border border-rose-200";
                badgeText = "Script";
            } else if (item.type === "report") {
                badgeClass = "bg-indigo-100 text-indigo-800 border border-indigo-200";
                badgeText = "Report";
            }

            return (
                <div className="flex items-start gap-3 py-1.5 text-[15.5px] text-slate-700 leading-relaxed">
                    <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded flex-shrink-0 mt-1 ${badgeClass}`}>
                        {badgeText}
                    </span>
                    <div className="flex-1">
                        {processCloze(item.text, isRecallMode)}
                    </div>
                </div>
            );
        };

        // Main App
        const ObgynApp = () => {
            const [view, setView] = useState('script'); 
            const [activeIdx, setActiveIdx] = useState(0);
            const [isRecallMode, setIsRecallMode] = useState(false);
            const [scores, setScores] = useState({});
            
            const handleScoreChange = (id, value) => {
                setScores(prev => ({ ...prev, [id]: value }));
            };

            const totalScore = Object.values(scores).reduce((a, v) => a + (v || 0), 0);
            const passThreshold = Math.round(MAX_SCORE * 0.70); // 55
            const activePage = PAGES[activeIdx];
            
            const getActiveRubricItems = () => {
                const items = [];
                RUBRIC.forEach(category => {
                    category.items.forEach(item => {
                        if (activePage.rubricIds.includes(item.id)) {
                            items.push(item);
                        }
                    });
                });
                return items;
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    
                    {/* SIDEBAR */}
                    <nav className="w-full md:w-72 bg-slate-900 text-white shadow-2xl flex-shrink-0 z-10 flex flex-col">
                        <div className="p-6 pb-2 border-b border-slate-800">
                            <h1 className="text-3xl font-black text-sky-400 tracking-tight">OSCE PRO</h1>
                            <p className="text-xs text-slate-400 mt-2 uppercase tracking-widest font-bold">OB-GYN 250 Station 1</p>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            <button onClick={() => setView('script')} className={`w-full flex items-center p-3 rounded-lg font-bold transition-all duration-200 text-left ${view === 'script' ? 'bg-sky-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <span className="mr-3 text-xl">🗣️</span> Exam Script
                            </button>
                            <button onClick={() => setView('reporting')} className={`w-full flex items-center p-3 rounded-lg font-bold transition-all duration-200 text-left ${view === 'reporting' ? 'bg-sky-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <span className="mr-3 text-xl">📋</span> Formal Report
                            </button>
                            <button onClick={() => setView('grader')} className={`w-full flex items-center p-3 rounded-lg font-bold transition-all duration-200 text-left border-t border-slate-700 mt-4 pt-4 ${view === 'grader' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <span className="mr-3 text-xl">💯</span> Rubric Grader
                            </button>
                        </div>
                        
                        {(view === 'script' || view === 'reporting') && (
                            <div className="p-6 bg-slate-950 mt-auto border-t border-slate-800">
                                <label className="text-sm font-bold text-white cursor-pointer select-none flex items-center justify-center bg-slate-800 hover:bg-slate-700 px-4 py-3 rounded-lg transition-colors border border-slate-700 shadow-inner">
                                    <input 
                                        type="checkbox" 
                                        checked={isRecallMode} 
                                        onChange={() => setIsRecallMode(!isRecallMode)} 
                                        className="mr-3 w-5 h-5 accent-sky-500" 
                                    />
                                    Active Recall Mode
                                </label>
                            </div>
                        )}
                    </nav>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto h-screen custom-scrollbar">
                        <div className="max-w-6xl mx-auto space-y-6 animate-fade-in pb-20">
                            
                            {/* VIEW 1: SCRIPT */}
                            {view === 'script' && (
                                <>
                                    <div className="border-b-2 border-slate-200 pb-4">
                                        <h2 className="text-3xl font-black text-slate-800">🗣️ Gynecologic Exam Script</h2>
                                        <p className="text-slate-500 mt-2 font-medium">Follow the sequence strictly per the 2025 Grand OSCE checklist. Total perfect score: <strong>78</strong>.</p>
                                    </div>

                                    {/* Pagination */}
                                    <div className="flex gap-2 overflow-x-auto pb-4 custom-scrollbar">
                                        {PAGES.map((page, idx) => (
                                            <button 
                                                key={page.id}
                                                onClick={() => setActiveIdx(idx)}
                                                className={`whitespace-nowrap px-4 py-2 rounded-full font-bold text-sm transition-all shadow-sm ${activeIdx === idx ? 'bg-sky-600 text-white ring-2 ring-sky-300' : 'bg-white text-slate-600 hover:bg-sky-50 border border-slate-200'}`}
                                            >
                                                {page.icon} {page.title}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-fade-in">
                                        {/* Left Col: Script */}
                                        <div className="space-y-6">
                                            <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                                                <div className="bg-sky-700 text-white p-4 font-bold flex items-center">
                                                    <span className="text-xl mr-2">{activePage.icon}</span> {activePage.title} — Actions & Script
                                                </div>
                                                <div className="p-6 bg-sky-50 overflow-y-auto max-h-[65vh] custom-scrollbar">
                                                    {activePage.script.map((item, i) => (
                                                        <ScriptLine key={i} item={item} isRecallMode={isRecallMode} />
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Right Col: Rubric Alignment */}
                                        <div className="space-y-6">
                                            <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                                                <div className="bg-slate-800 text-white p-4 font-bold flex items-center justify-between">
                                                    <div className="flex items-center"><span className="text-xl mr-2">📋</span> Target Checklist Items</div>
                                                </div>
                                                <div className="p-0 bg-slate-50">
                                                    <ul className="divide-y divide-slate-200">
                                                        {getActiveRubricItems().map((item) => (
                                                            <li key={item.id} className="p-4 flex items-start text-sm text-slate-700 font-medium hover:bg-slate-100 transition-colors">
                                                                <input type="checkbox" className="mt-1 mr-3 w-5 h-5 accent-emerald-500 rounded cursor-pointer" />
                                                                <span className="leading-snug">{item.text}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                            
                                            {activePage.id === 'hpv' && (
                                                <div className="bg-amber-100 border border-amber-300 text-amber-800 px-4 py-3 rounded-lg font-bold text-sm shadow-sm flex items-center gap-2">
                                                    <span>⚠️</span> If only Pap smear done → prompt: "Please demonstrate the HPV Test"
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div className="flex justify-between items-center pt-6 mt-6 border-t border-slate-200">
                                        <button onClick={() => setActiveIdx(Math.max(0, activeIdx - 1))} disabled={activeIdx === 0} className="px-6 py-3 rounded-lg font-bold text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 disabled:opacity-50 transition-colors">
                                            &larr; Previous Step
                                        </button>
                                        <button onClick={() => setActiveIdx(Math.min(PAGES.length - 1, activeIdx + 1))} disabled={activeIdx === PAGES.length - 1} className="px-6 py-3 rounded-lg font-bold text-white bg-sky-600 hover:bg-sky-700 disabled:opacity-50 transition-colors shadow-md">
                                            Next Step &rarr;
                                        </button>
                                    </div>
                                </>
                            )}

                            {/* VIEW 2: FORMAL REPORTING */}
                            {view === 'reporting' && (
                                <div className="space-y-8 animate-fade-in">
                                    <div className="border-b-2 border-slate-200 pb-4">
                                        <h2 className="text-3xl font-black text-slate-800">📋 Formal Case Presentation</h2>
                                        <p className="text-slate-600 mt-2 font-medium">Verbalize these findings during reporting. Toggle Active Recall to practice.</p>
                                    </div>
                                    
                                    <div className="bg-white rounded-xl shadow-lg border-t-8 border-sky-600 p-8 space-y-8">
                                        
                                        <div>
                                            <h3 className="text-lg font-black text-rose-800 border-b border-rose-100 pb-2 mb-3 flex items-center"><span className="bg-rose-100 text-rose-800 w-8 h-8 rounded-full flex items-center justify-center mr-3">👋</span> Summary to Patient (Post-Exam)</h3>
                                            <div className="bg-slate-50 p-6 rounded-lg border border-slate-200 shadow-inner">
                                                <div className="text-[16px] text-slate-800 py-1 leading-relaxed">
                                                    {processCloze(`Hello po ma'am, base sa eksaminasyon na ginawa natin, wala naman po akong nakita na {kahit anong bukol, sugat, o kabaha-bahala} sa may pwerta ninyo. Nakapa ko po ang inyong cervix at matres, at {parehong tama lang sila sa inaasahan po natin}. Ito na po yung samples na ipapadala natin sa laboratoryo — {Pap smear} results ay lalabas sa {2 weeks to 1 month}; {HPV DNA} results ay depende sa laboratoryo. {Tatawagan na lang po namin kayo}. May mga katanungan pa po ba kayo? Salamat po.`, isRecallMode)}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid lg:grid-cols-2 gap-8">
                                            {REPORT_SECTIONS.map((sec, i) => (
                                                <div key={i}>
                                                    <h3 className="text-md font-black text-sky-900 border-b border-sky-100 pb-2 mb-3 flex items-center tracking-wide"><span className="bg-sky-200 text-sky-800 w-6 h-6 rounded-full flex items-center justify-center mr-2 text-xs">{i+1}</span> {sec.label}</h3>
                                                    <div className="bg-slate-50 p-5 rounded-lg border border-slate-200 h-[calc(100%-40px)]">
                                                        <div className="text-[15px] text-slate-800 leading-relaxed">
                                                            {processCloze(sec.content, isRecallMode)}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <div className="bg-amber-50 rounded-xl border border-amber-200 p-6">
                                            <h3 className="text-lg font-black text-amber-800 border-b border-amber-200 pb-2 mb-4 flex items-center"><span className="mr-2">📌</span> Key Clinical Notes</h3>
                                            <ul className="space-y-3">
                                                {[
                                                    "Screen women aged 30–65 yrs: Pap smear every 3 yrs OR HPV DNA every 5 yrs OR VIA every 3 yrs (PHEx 2022).",
                                                    "Sample ectocervix BEFORE endocervix (minimizes bleeding contamination).",
                                                    "Use water — NOT lubricating gel — during speculum insertion for Pap smear.",
                                                    "Cervix broom: rotate 3–5× clockwise; rinse 10× in vial. Discard device. Label vial with name + DOB.",
                                                    "Slide packaging (OSCE item): fill form → fold → create pocket → insert air-dried slide.",
                                                    "Cervical motion tenderness (CMT) → noted in PID or adhesions. Soft/doughy cervix → early pregnancy.",
                                                    "Rectovaginal: 'clean to dirty' principle. Parametrial obliteration/nodularity → consider cervical cancer Stage IIIb.",
                                                    "Chaperone protocol: Ensure a chaperone is present for all intimate exams, regardless of provider gender.",
                                                ].map((t, i) => (
                                                    <li key={i} className="flex items-start text-sm text-slate-700 font-medium">
                                                        <span className="text-amber-500 mr-3 font-bold mt-0.5">→</span>
                                                        <span>{t}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* VIEW 3: RUBRIC GRADER */}
                            {view === 'grader' && (
                                <div className="space-y-6 animate-fade-in">
                                    
                                    {/* Sticky Score Header */}
                                    <div className="sticky top-0 z-20 bg-white/90 backdrop-blur shadow-md rounded-xl p-6 border-b-4 border-emerald-500 flex flex-col md:flex-row justify-between items-center gap-4">
                                        <div>
                                            <h2 className="text-2xl font-black text-slate-800">78-Point Interactive Grader</h2>
                                            <p className="text-slate-500 font-medium text-sm">Self-assess using the exact OBGYN 250 OSCE Checklist.</p>
                                        </div>
                                        <div className="flex items-center gap-6">
                                            <div className="text-right">
                                                <div className="text-sm font-bold text-slate-400 uppercase tracking-widest">Total Score</div>
                                                <div className="text-4xl font-black text-emerald-600">{totalScore} <span className="text-xl text-slate-400">/ {MAX_SCORE}</span></div>
                                            </div>
                                            <div className="w-32 h-3 bg-slate-200 rounded-full overflow-hidden">
                                                <div 
                                                    className={`h-full transition-all duration-500 ${totalScore >= passThreshold ? 'bg-emerald-500' : 'bg-amber-500'}`} 
                                                    style={{ width: `${Math.min(100, (totalScore/MAX_SCORE)*100)}%` }}
                                                ></div>
                                            </div>
                                            <div className="text-sm font-bold">
                                                {totalScore >= passThreshold ? <span className="text-emerald-600">PASSED</span> : <span className="text-amber-600">Needs {passThreshold}</span>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="min-w-full text-left text-sm">
                                                <thead className="bg-slate-800 text-white">
                                                    <tr>
                                                        <th className="p-4 font-bold text-md w-2/3">Domains & Items</th>
                                                        <th className="p-4 font-bold text-center text-sm bg-slate-700 w-1/3 leading-tight">Score <br/><span className="text-xs font-normal opacity-70">(0-2)</span></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-200 text-slate-700 font-medium">
                                                    {RUBRIC.map((category, catIdx) => (
                                                        <React.Fragment key={catIdx}>
                                                            <tr className="bg-sky-50 border-t-2 border-sky-200">
                                                                <td colSpan="2" className="p-3 px-4 flex justify-between items-center w-full">
                                                                    <span className="font-black text-sky-900 text-sm tracking-wide">{category.label}</span>
                                                                    <span className="text-xs font-bold text-sky-600">Max: {category.items.length * 2}</span>
                                                                </td>
                                                            </tr>
                                                            {category.items.map((item) => {
                                                                return (
                                                                    <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                                        <td className="p-4 pl-6 text-sm">
                                                                            {item.text}
                                                                        </td>
                                                                        
                                                                        {/* Score Column */}
                                                                        <td className="p-3 text-center border-l border-slate-200 bg-slate-50/50">
                                                                            <div className="flex justify-center gap-2">
                                                                                {[0, 1, 2].map(val => (
                                                                                    <button 
                                                                                        key={val}
                                                                                        onClick={() => handleScoreChange(item.id, val)}
                                                                                        className={`w-10 h-10 rounded-full font-bold transition-all text-sm border ${scores[item.id] === val ? 'bg-emerald-500 text-white border-emerald-600 shadow-inner' : 'bg-white text-slate-400 border-slate-300 hover:border-emerald-400'}`}
                                                                                    >
                                                                                        {val}
                                                                                    </button>
                                                                                ))}
                                                                            </div>
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </React.Fragment>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    
                                    {/* Preceptor Form */}
                                    <div className="bg-white rounded-xl shadow-lg border border-slate-200 p-8">
                                        <h3 className="text-xl font-black text-slate-800 border-b border-slate-200 pb-3 mb-6">Preceptor Section</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Name of Learner</label>
                                                <input className="w-full border border-slate-300 rounded-lg p-3 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" placeholder="Student name" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Date</label>
                                                <input type="date" className="w-full border border-slate-300 rounded-lg p-3 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Name & Signature of Preceptor</label>
                                                <input className="w-full border border-slate-300 rounded-lg p-3 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all" placeholder="Preceptor name" />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Comments (Feedback)</label>
                                                <textarea rows="4" className="w-full border border-slate-300 rounded-lg p-3 outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all resize-y" placeholder="Write feedback here..."></textarea>
                                            </div>
                                        </div>
                                        <div className="mt-8 bg-sky-50 border border-sky-100 rounded-lg p-6 flex flex-col md:flex-row items-center justify-between">
                                            <span className="font-bold text-sky-800">TOTAL PERFECT SCORE: 78</span>
                                            <span className={`text-3xl font-black ${totalScore >= passThreshold ? 'text-emerald-600' : 'text-amber-600'}`}>{totalScore} / {MAX_SCORE}</span>
                                        </div>
                                    </div>

                                    <div className="flex justify-end pt-4">
                                        <button 
                                            onClick={() => setScores({})} 
                                            className="px-6 py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-lg transition-colors"
                                        >
                                            Reset Scores
                                        </button>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ObgynApp />);
    </script>
</body>
</html>

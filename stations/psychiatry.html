<html lang="en">

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Active Recall Styles */
        .cloze-hidden {
            background-color: #0284c7; /* Sky 600 */
            color: transparent;
            border-radius: 0.25rem;
            padding: 0 0.25rem;
            cursor: pointer;
            user-select: none;

            padding: 0 0.25rem;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            border-bottom: 2px solid #0284c7;
        }

            background-color: #bae6fd;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATA STRUCTURES ---

        // EXACT Rubric Mapping from[cite: 4]
        const exactRubric = [
            {

                    { id: "a3", text: "Reported on eye contact[cite: 4]", type: "report" },
                    { id: "a4", text: "Reported on cooperativeness / engagement[cite: 4]", type: "report" },

            {

                items: [
                    { id: "c1", text: "Assessed and reported orientation to person[cite: 4]", type: "both" },
                    { id: "c2", text: "Assessed and reported orientation to place[cite: 4]", type: "both" },
                    { id: "c3", text: "Assessed and reported orientation to time[cite: 4]", type: "both" },
                    { id: "c4", text: "Assessed and reported remote memory[cite: 4]", type: "both" },
                    { id: "c5", text: "Assessed and reported recent memory[cite: 4]", type: "both" },
                    { id: "c6", text: "Assessed and reported immediate recall[cite: 4]", type: "both" },
                    { id: "c7", text: "Assessed and reported concentration[cite: 4]", type: "both" },
                    { id: "c8", text: "Assessed and reported calculation[cite: 4]", type: "both" },
                    { id: "c9", text: "Assessed and reported fund of knowledge[cite: 4]", type: "both" },
                    { id: "c10", text: "Assessed and reported abstract thinking[cite: 4]", type: "both" },
                    { id: "c11", text: "Assessed and reported judgment[cite: 4]", type: "both" },
                    { id: "c12", text: "Assessed and reported insight[cite: 4]", type: "both" }
                ] 
            },
            { 
                category: "CLOSING (6)", 
                items: [
                    { id: "cl1", text: "Thanked the patient and ended the exam[cite: 4]", type: "demo" },
                    { id: "cl2", text: "Demonstrated empathy and professionalism throughout interview[cite: 4]", type: "demo" },
                    { id: "cl3", text: "Conducted interview in an organized manner (smooth flow)[cite: 4]", type: "demo" }
                ] 
            },
            { 
                category: "DIAGNOSIS AND MANAGEMENT (8)", 
                items: [
                    { id: "d1", text: "Able to give the correct COMPLETE DIAGNOSIS[cite: 4]", type: "report" },
                    { id: "d2", text: "Able to suggest (an) appropriate medicine/s (specific compound/s)[cite: 4]", type: "report" },
                    { id: "d3", text: "Able to suggest an appropriate psychosocial-spiritual intervention (any kind will do; no need for an explanation)[cite: 4]", type: "report" },
                    { id: "d4", text: "Able to give appropriate disposition (whether to admit or send home)[cite: 4]", type: "report" }
                ] 
            }
        ];

        // Expanded Step-by-Step Script emphasizing specific symptom elicitation
        const msePages = [
            {
                id: 'intro',
                title: "1. Intro & Rapport",
                icon: "🤝",
                patient: "INTRODUCTIONS:\n- Magandang araw po. Ako po si Doc {Pangalan}, isang medikal student/clerk sa Department of Psychiatry, o doktor sa mga {damdamin at pag-iisip}[cite: 1, 2]. Kayo po si Ginang/Ginoong {Pangalan}?[cite: 4]\n\nPURPOSE & CONFIDENTIALITY:\n- Nandito po ako ngayon para kamustahin ang inyong {kasalukuyang nararamdaman} at pag-iisip sa pamamagitan ng ilang mga tanong[cite: 1, 5].\n- Gusto ko pong ipaalala na ang lahat ng pag-uusapan natin ay {mananatiling pribado} at para lamang sa aming medical team na tutulong sa inyo, maliban na lang kung may kinalaman ito sa inyong {kaligtasan} o ng ibang tao[cite: 1, 2].\n\nCONSENT:\n- Ok lang po ba na {magsimula} tayo?[cite: 4]",
                rubricIds: ["i1", "i2", "i3", "i4", "i5", "i6"]
            },
            {
                id: 'observation',
                title: "2. Appearance & Speech",
                icon: "👁️",
                patient: "CLINICAL OBSERVATION (No direct questions needed. Observe continuously)[cite: 1]\n\nAPPEARANCE & BEHAVIOR:\n- Grooming and hygiene: Is the patient {well-kempt} or {disheveled}?[cite: 4]\n- Posture and psychomotor activity: Are they {fidgety}, have {tremors}, or exhibit psychomotor retardation?[cite: 1, 4]\n- Eye contact: Is it {poor}, appropriate, or piercing?[cite: 1, 4]\n- Cooperativeness: Are they {guarded}, hostile, or cooperative but adamant?[cite: 1, 4]\n- Abnormal movements: Are there presence or absence of {tics, pacing}, or extrapyramidal symptoms?[cite: 4]\n\nSPEECH:\n- Rate: Is it {slow, rapid}, or pressured?[cite: 4]\n- Volume: Is it {soft, loud}, or monotonous?[cite: 1, 4]\n- Tone/Fluency: Is it {hypoproductive} or spontaneous?[cite: 1, 4]",
                rubricIds: ["a1", "a2", "a3", "a4", "a5", "s1", "s2", "s3"]
            },
            {
                id: 'mood_affect',
                title: "3. Mood & Affect",
                icon: "🎭",
                patient: "MOOD (SUBJECTIVE SENSE OF EMOTION)[cite: 1]\n- Ano pong {emosyon o pakiramdam} ang nararamdaman niyo ngayon?[cite: 1]\n- (If they say 'Okay lang', probe further): {Masaya} po ba kayo? {Malungkot}? Hindi masaya pero hindi rin malungkot? {Iritable}?[cite: 1]\n\nAFFECT (OBJECTIVE RANGE OF EMOTIONS)[cite: 1]\n- Observe the range (e.g., {flat, blunted}, restricted, full range)[cite: 1]\n- Determine congruence: Does their facial expression visibly match their stated mood? Are they {congruent} or {incongruent}?[cite: 4]",
                rubricIds: ["m1", "m2", "m3"]
            },
            {
                id: 'thought_content',
                title: "4. Thought Content & Risk",
                icon: "💭",
                patient: "THOUGHT PROCESS:\n- May mga pagkakataon bang parang nagkukulang ka ng {focus} sa iyong mga iniisip?[cite: 1]\n\nDELUSIONS (Ask specifically to classify type)[cite: 1, 4]\n- Persecutory: May nararamdaman po ba kayong parang may mga {gustong manakit} sa inyo o may gawin sa inyo?\n- Grandiose: Sa tingin mo ba meron kang {special powers} / mga talento o abilidad?\n- Referential: Kapag nanonood ka ng balita, sa tingin mo ba ay {ikaw palagi ang pinag-uusapan}?\n- Thought Broadcasting: Sa tingin mo po ba {naririnig ng mga nasa paligid mo} ang mga pinag-iisipan mo?\n\nOBSESSIONS & PREOCCUPATIONS[cite: 1, 4]\n- Preoccupations: May mga bagay bang patuloy na {bumabalik sa iyong isipan} na hindi mo kayang tanggalin o itaboy?[cite: 1]\n- Obsessions: May mga {paulit-ulit} ka bang iniisip o ginagawa na pakiramdam mo ay kailangan mong gawin (kahit ayaw mo)?[cite: 1]\n\nRISK ASSESSMENT[cite: 1, 4]\n- Self-harm: May pagkakataon po bang naisip ninyong {saktan ang sarili ninyo} (nang walang layuning mamatay)?[cite: 1]\n- Suicidal: May pagkakataon po bang naisip ninyong {tapusin ang inyong buhay}?[cite: 1] (Follow up: Paano? Nagawa mo ba? May {pumipigil} din ba sayo para gawin ito?[cite: 1])\n- Homicidal: Naiisip niyo po bang {manakit o pumatay} ng ibang tao?[cite: 1]",
                rubricIds: ["t1", "t2", "t3", "t4", "t5", "t6", "t7"]
            },
            {
                id: 'perception',
                title: "5. Perception",
                icon: "👁️‍🗨️",
                patient: "HALLUCINATIONS (PERCEPTION WITHOUT STIMULUS)[cite: 1, 4]\n- Auditory: May time ba na may {naririnig} ka pero sabi ng iba wala silang naririnig?[cite: 1] (Delineate audible thoughts vs outside voices)[cite: 1]\n- Visual: May {nakikita} po ba kayong hindi nakikita ng iba?[cite: 1]\n- Others: May naaamoy o nararamdaman ba kayong gumagapang sa inyong balat na wala naman? (Olfactory/Tactile)[cite: 1]\n\nILLUSIONS (MISINTERPRETED STIMULUS)[cite: 1, 4]\n- Ngayon ba sa kwartong ito may {nakikita ka bang bagay} o anyo na posibleng hindi nakikita namin o ng ibang tao?[cite: 1] (e.g., interpreting a real shadow as a monster)\n- Meron po ba kayong mga nakikita na {iba sa nakikita ng ibang tao}?[cite: 1]",
                rubricIds: ["p1"]
            },
            {
                id: 'cognition_1',
                title: "6. Sensorium (Orientation & Memory)",
                icon: "🧠",
                patient: "ORIENTATION TO 3 SPHERES[cite: 1, 4]\n- Person: Ano po ang {buong pangalan} niyo? Sino po ang mga kasama niyo?[cite: 1]\n- Place: Alam niyo po ba kung {nasaan po kayo} ngayon? Nasaang lugar/lungsod po tayo?[cite: 1]\n- Time: Anong {araw/petsa/oras} po ngayon?[cite: 1]\n\nMEMORY[cite: 1, 4]\n- Remote: Saan po kayo {ipinanganak}?[cite: 1]\n- Recent: Paano ka {nakarating dito} ngayon?[cite: 1]\n- Immediate: Ngayon, susuriin ko ang inyong memorya. Magsasabi ako ng tatlong bagay: {Mangga, Pera, Kotse}. Pakiulit po. Tandaan dahil tatanungin ko ulit mamaya.[cite: 1]",
                rubricIds: ["c1", "c2", "c3", "c4", "c5", "c6"]
            },
            {
                id: 'cognition_2',
                title: "7. Higher Functions & Closing",
                icon: "⚖️",
                patient: "CONCENTRATION & CALCULATION[cite: 1, 4]\n- Concentration: Paki-spell ang salitang {K-A-R-N-E}. Ngayon, paki-spell ito ng {pabaliktad} (E-N-R-A-K).[cite: 1]\n- Calculation (Serial 7s): Mula po sa 100, {magbawas po kayo ng 7}. Magbawas nang magbawas hanggang sabihin kong tumigil. (Stop after 5 answers)[cite: 1]\n\nKNOWLEDGE & ABSTRACTION[cite: 1, 4]\n- Knowledge: Sabihin sa akin ang {limang naging pangulo} ng Pilipinas.[cite: 1]\n- Abstraction: Ano ang pagkakapareho ng {upuan at mesa}?[cite: 1] (Kung sagot ay kulay 'brown' = concrete. Kung 'muwebles' = abstract)[cite: 1]\n\nJUDGMENT & INSIGHT[cite: 1, 4]\n- Judgment: Kung biglang sumigaw ng {'sunog'} sa sinehan, ano po ang gagawin ninyo?[cite: 1]\n- Insight: Ano po ang {pagkakaintindi} ninyo tungkol sa inyong sakit? Willing po ba kayong magpagamot?[cite: 1]\n\nCLOSING[cite: 1, 4]\n- Salamat po nang marami sa pagbabahagi ng inyong mga kwento at oras. Mayroon pa po ba kayong gustong itanong o linawin?[cite: 1]",
                rubricIds: ["c7", "c8", "c9", "c10", "c11", "c12", "cl1", "cl2", "cl3"]
            }
        ];

        // --- COMPONENTS ---

        // Custom parser to handle bullets, headers, citations, and cloze tags smoothly without breaking React
        const ActiveRecallText = ({ text, isRecallMode }) => {
            const lines = text.split('\n');
            
            return (
                <div className="space-y-2">
                    {lines.map((line, lineIndex) => {
                        if (line.trim() === '') return <div key={`empty-${lineIndex}`} className="h-2"></div>;
                        
                        const isSubheader = /^[A-Z\s&/()0-9]+:(\)?)$/.test(line.trim()) || /^[A-Z\s&/()0-9]+\[cite:/.test(line.trim());
                        const isBullet = line.trim().startsWith('- ');
                        
                        let contentLine = line;
                        let lineClass = "leading-relaxed";
                        
                        if (isSubheader && !isBullet) {
                            lineClass = "font-black text-sky-800 text-sm tracking-widest mt-4 uppercase border-b border-sky-100 pb-1";
                        } else if (isBullet) {
                            lineClass = "pl-4 border-l-2 border-sky-200 ml-2 text-[15.5px] text-slate-700 py-1";
                            contentLine = line.substring(2);
                        } else {
                            lineClass = "text-[16px] text-slate-800 py-1";
                        }

                        // Parse cloze deletions {word} and citations[cite: 1] safely
                        const processParts = (str) => {
                            const clozeRegex = /\{(.*?)\}/g;
                            const parts = str.split(clozeRegex);
                            
                            return parts.map((part, index) => {
                                if (index % 2 === 1) { 
                                    return <ClozeWord key={`cloze-${lineIndex}-${index}`} word={part} isRecallMode={isRecallMode} />;
                                }
                                
                                const citeRegex = /(\]+\])/g;
                                const textWithCitations = part.split(citeRegex);
                                return textWithCitations.map((textPart, tIndex) => {
                                    if (textPart.startsWith('[cite:')) {
                                        return <sup key={`cite-${lineIndex}-${index}-${tIndex}`} className="text-slate-400 ml-0.5 font-normal tracking-tighter">{textPart}</sup>;
                                    }
                                    return <span key={`text-${lineIndex}-${index}-${tIndex}`}>{textPart}</span>;
                                });
                            });
                        };

                        return (
                            <div key={`line-${lineIndex}`} className={lineClass}>
                                {isBullet && <span className="text-sky-500 mr-2 font-bold">•</span>}
                                {processParts(contentLine)}
                            </div>
                        );
                    })}
                </div>
            );
        };

        const ClozeWord = ({ word, isRecallMode }) => {
            const [revealed, setRevealed] = useState(false);

            useEffect(() => {
                setRevealed(false);
            }, [isRecallMode]);

            if (!isRecallMode) {
                return <span className="font-bold text-sky-700">{word}</span>;
            }

            return (
                <span 
                    className={revealed ? "cloze-revealed" : "cloze-hidden"} 
                    onClick={() => setRevealed(!revealed)}
                    title={revealed ? "Click to hide" : "Click to reveal"}
                >
                    {word}
                </span>
            );
        };

        // Render citations purely for standard HTML text elements outside the ActiveRecall component
        const renderTextWithCitations = (text) => {
            const citeRegex = /(\]+\])/g;
            const parts = text.split(citeRegex);
            return parts.map((p, i) => {
                if (p.startsWith('[cite:')) {
                    return <sup key={i} className="text-slate-400 ml-0.5 font-normal tracking-tighter">{p}</sup>;
                }
                return <span key={i}>{p}</span>;
            });
        };

        // Main App
        const PsychApp = () => {
            const [view, setView] = useState('script'); 
            const [activeIndex, setActiveIndex] = useState(0);
            const [isRecallMode, setIsRecallMode] = useState(false);
            const [scores, setScores] = useState({});
            
            const handleScoreChange = (id, type, value) => {
                setScores(prev => ({
                    ...prev,
                    [id]: {
                        ...prev[id],
                        [type]: value
                    }
                }));
            };

            const calculateTotal = () => {
                let total = 0;
                Object.values(scores).forEach(item => {
                    if (item.demo) total += item.demo;
                    if (item.report) total += item.report;
                });
                return total;
            };

            const totalScore = calculateTotal();
            const passThreshold = 124 * 0.70; // 86.8
            const activePage = msePages[activeIndex];
            
            const getActiveRubricItems = () => {
                const items = [];
                exactRubric.forEach(category => {
                    category.items.forEach(item => {
                        if (activePage.rubricIds.includes(item.id)) {
                            items.push(item);
                        }
                    });
                });
                return items;
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    
                    {/* SIDEBAR */}
                    <nav className="w-full md:w-72 bg-slate-900 text-white shadow-2xl flex-shrink-0 z-10 flex flex-col">
                        <div className="p-6 pb-2 border-b border-slate-800">
                            <h1 className="text-3xl font-black text-sky-400 tracking-tight">OSCE PRO</h1>
                            <p className="text-xs text-slate-400 mt-2 uppercase tracking-widest font-bold">LU5 Psych 124-Pt</p>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            <button onClick={() => setView('script')} className={`w-full flex items-center p-3 rounded-lg font-bold transition-all duration-200 text-left ${view === 'script' ? 'bg-sky-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <span className="mr-3 text-xl">🗣️</span> MSE Script
                            </button>
                            <button onClick={() => setView('reporting')} className={`w-full flex items-center p-3 rounded-lg font-bold transition-all duration-200 text-left ${view === 'reporting' ? 'bg-sky-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <span className="mr-3 text-xl">📋</span> Formal Reporting
                            </button>
                            <button onClick={() => setView('grader')} className={`w-full flex items-center p-3 rounded-lg font-bold transition-all duration-200 text-left border-t border-slate-700 mt-4 pt-4 ${view === 'grader' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <span className="mr-3 text-xl">💯</span> Rubric Grader
                            </button>
                        </div>
                        
                        {(view === 'script' || view === 'reporting') && (
                            <div className="p-6 bg-slate-950 mt-auto border-t border-slate-800">
                                <label className="text-sm font-bold text-white cursor-pointer select-none flex items-center justify-center bg-slate-800 hover:bg-slate-700 px-4 py-3 rounded-lg transition-colors border border-slate-700 shadow-inner">
                                    <input 
                                        type="checkbox" 
                                        checked={isRecallMode} 
                                        onChange={() => setIsRecallMode(!isRecallMode)} 
                                        className="mr-3 w-5 h-5 accent-sky-500" 
                                    />
                                    Active Recall Mode
                                </label>
                            </div>
                        )}
                    </nav>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto h-screen custom-scrollbar">
                        <div className="max-w-6xl mx-auto space-y-6 animate-fade-in pb-20">
                            
                            {/* VIEW 1: MSE SCRIPT */}
                            {view === 'script' && (
                                <>
                                    <div className="border-b-2 border-slate-200 pb-4">
                                        <h2 className="text-3xl font-black text-slate-800">🗣️ Script & Execution</h2>
                                        <p className="text-slate-500 mt-2 font-medium">Do NOT take history. Ask smooth, conversational questions to comprehensively assess and elicit ALL specific findings required by the rubric.[cite: 5]</p>
                                    </div>

                                    {/* Pagination */}
                                    <div className="flex gap-2 overflow-x-auto pb-4 custom-scrollbar">
                                        {msePages.map((page, idx) => (
                                            <button 
                                                key={page.id}
                                                onClick={() => setActiveIndex(idx)}
                                                className={`whitespace-nowrap px-4 py-2 rounded-full font-bold text-sm transition-all shadow-sm ${activeIndex === idx ? 'bg-sky-600 text-white ring-2 ring-sky-300' : 'bg-white text-slate-600 hover:bg-sky-50 border border-slate-200'}`}
                                            >
                                                {page.icon} {page.title}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-fade-in">
                                        {/* Left Col: Script */}
                                        <div className="space-y-6">
                                            <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                                                <div className="bg-sky-700 text-white p-4 font-bold flex items-center">
                                                    <span className="text-xl mr-2">🗣️</span> Verbal Actions (Taglish)
                                                </div>
                                                <div className="p-6 bg-sky-50">
                                                    <ActiveRecallText text={activePage.patient} isRecallMode={isRecallMode} />
                                                </div>
                                            </div>
                                        </div>

                                        {/* Right Col: Rubric Alignment */}
                                        <div className="space-y-6">
                                            <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                                                <div className="bg-slate-800 text-white p-4 font-bold flex items-center justify-between">
                                                    <div className="flex items-center"><span className="text-xl mr-2">📋</span> Exact Rubric Target</div>
                                                </div>
                                                <div className="p-0 bg-slate-50">
                                                    <ul className="divide-y divide-slate-200">
                                                        {getActiveRubricItems().map((item) => (
                                                            <li key={item.id} className="p-4 flex items-start text-sm text-slate-700 font-medium hover:bg-slate-100 transition-colors">
                                                                <input type="checkbox" className="mt-1 mr-3 w-5 h-5 accent-emerald-500 rounded cursor-pointer" />
                                                                <span className="leading-snug">{renderTextWithCitations(item.text)}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="flex justify-between items-center pt-6 mt-6 border-t border-slate-200">
                                        <button onClick={() => setActiveIndex(Math.max(0, activeIndex - 1))} disabled={activeIndex === 0} className="px-6 py-3 rounded-lg font-bold text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 disabled:opacity-50 transition-colors">
                                            &larr; Previous Step
                                        </button>
                                        <button onClick={() => setActiveIndex(Math.min(msePages.length - 1, activeIndex + 1))} disabled={activeIndex === msePages.length - 1} className="px-6 py-3 rounded-lg font-bold text-white bg-sky-600 hover:bg-sky-700 disabled:opacity-50 transition-colors shadow-md">
                                            Next Step &rarr;
                                        </button>
                                    </div>
                                </>
                            )}

                            {/* VIEW 2: FORMAL REPORTING */}
                            {view === 'reporting' && (
                                <div className="space-y-8 animate-fade-in">
                                    <div className="border-b-2 border-slate-200 pb-4">
                                        <h2 className="text-3xl font-black text-slate-800">📋 Formal Case Reporting</h2>
                                        <p className="text-slate-600 mt-2 font-medium">The OSCE requires you to report findings based on 5 specific outputs. Do NOT explain your basis or give differential diagnoses.[cite: 5] State the facts clearly.</p>
                                    </div>
                                    
                                    <div className="bg-white rounded-xl shadow-lg border-t-8 border-sky-600 p-8 space-y-8">
                                        <div>
                                            <h3 className="text-lg font-black text-sky-900 border-b border-sky-100 pb-2 mb-3 flex items-center"><span className="bg-sky-200 text-sky-800 w-8 h-8 rounded-full flex items-center justify-center mr-3">1</span> Complete MSE Findings[cite: 5]</h3>
                                            <div className="bg-slate-50 p-6 rounded-lg border border-slate-200 shadow-inner">
                                                <ActiveRecallText 
                                                    isRecallMode={isRecallMode} 
                                                    text={`Patient is a 26-year-old male, casually dressed, with {poor grooming and hygiene}[cite: 1, 4]. He exhibits {psychomotor retardation} and {poor eye contact}[cite: 1, 4]. Speech is {slow} in pace, {soft} in volume, and {hypoproductive} in amount[cite: 1, 4].\n\nSubjective mood is {'laging malungkot'}, with a {blunted, congruent} affect[cite: 1, 4]. Thought process is {normal and goal-directed}[cite: 1, 4]. He denies {persecutory, grandiose, referential} delusions, and {thought broadcasting}[cite: 1, 4]. He denies {preoccupations and obsessions}, but admits to {active suicidal ideation}[cite: 1, 4]. He denies {homicidal ideation}[cite: 1, 4].\n\nHe denies illusions but admits to {auditory hallucinations} coming from the outside[cite: 1, 4]. He is oriented to {person, place, and time}[cite: 1, 4]. Concentration is {good}[cite: 1, 4]. Recent and remote memory are {intact}, but had {no immediate memory}[cite: 1, 4]. Abstract thinking is {good}. Judgment is {good}. Insight and planning are also {good}[cite: 1, 4].`} 
                                                />
                                            </div>
                                        </div>

                                        <div className="grid lg:grid-cols-2 gap-8">
                                            <div>
                                                <h3 className="text-lg font-black text-sky-900 border-b border-sky-100 pb-2 mb-3 flex items-center"><span className="bg-sky-200 text-sky-800 w-8 h-8 rounded-full flex items-center justify-center mr-3">2</span> Complete Diagnosis[cite: 5]</h3>
                                                <div className="bg-slate-50 p-5 rounded-lg border border-slate-200">
                                                    <ActiveRecallText isRecallMode={isRecallMode} text={`{Major Depressive Disorder t/c Psychosis}[cite: 1].`} />
                                                    <span className="text-xs text-red-600 font-bold mt-3 block border-t border-red-100 pt-2">*OSCE Rule: Provide ONLY the final diagnosis. NO need to explain basis or give differential diagnoses[cite: 5].*</span>
                                                </div>
                                            </div>

                                            <div>
                                                <h3 className="text-lg font-black text-sky-900 border-b border-sky-100 pb-2 mb-3 flex items-center"><span className="bg-sky-200 text-sky-800 w-8 h-8 rounded-full flex items-center justify-center mr-3">3</span> Specific Medicine[cite: 5]</h3>
                                                <div className="bg-slate-50 p-5 rounded-lg border border-slate-200">
                                                    <ActiveRecallText isRecallMode={isRecallMode} text={`I will start a specific medicine, such as {Sertraline 50mg OD}, and an {antipsychotic} for the psychotic features[cite: 4, 5].`} />
                                                </div>
                                            </div>

                                            <div>
                                                <h3 className="text-lg font-black text-sky-900 border-b border-sky-100 pb-2 mb-3 flex items-center"><span className="bg-sky-200 text-sky-800 w-8 h-8 rounded-full flex items-center justify-center mr-3">4</span> Psychosocial Intervention[cite: 5]</h3>
                                                <div className="bg-slate-50 p-5 rounded-lg border border-slate-200">
                                                    <ActiveRecallText isRecallMode={isRecallMode} text={`I suggest an appropriate psychosocial-spiritual intervention[cite: 4], such as {Cognitive Behavioral Therapy (CBT)}[cite: 4, 5].`} />
                                                </div>
                                            </div>

                                            <div>
                                                <h3 className="text-lg font-black text-sky-900 border-b border-sky-100 pb-2 mb-3 flex items-center"><span className="bg-sky-200 text-sky-800 w-8 h-8 rounded-full flex items-center justify-center mr-3">5</span> Patient Disposition[cite: 5]</h3>
                                                <div className="bg-red-50 p-5 rounded-lg border border-red-200">
                                                    <ActiveRecallText isRecallMode={isRecallMode} text={`Give appropriate disposition[cite: 4]. I will {ADMIT the patient to the inpatient psychiatric unit} due to the severity of the symptoms[cite: 1, 4, 5].`} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* VIEW 3: RUBRIC GRADER */}
                            {view === 'grader' && (
                                <div className="space-y-6 animate-fade-in">
                                    
                                    {/* Sticky Score Header */}
                                    <div className="sticky top-0 z-20 bg-white/90 backdrop-blur shadow-md rounded-xl p-6 border-b-4 border-emerald-500 flex flex-col md:flex-row justify-between items-center gap-4">
                                        <div>
                                            <h2 className="text-2xl font-black text-slate-800">124-Point Interactive Grader</h2>
                                            <p className="text-slate-500 font-medium text-sm">Self-assess using the exact LU5 Psychiatry Station Grading Sheet[cite: 4].</p>
                                        </div>
                                        <div className="flex items-center gap-6">
                                            <div className="text-right">
                                                <div className="text-sm font-bold text-slate-400 uppercase tracking-widest">Total Score</div>
                                                <div className="text-4xl font-black text-emerald-600">{totalScore} <span className="text-xl text-slate-400">/ 124</span></div>
                                            </div>
                                            <div className="w-32 h-3 bg-slate-200 rounded-full overflow-hidden">
                                                <div 
                                                    className={`h-full transition-all duration-500 ${totalScore >= passThreshold ? 'bg-emerald-500' : 'bg-amber-500'}`} 
                                                    style={{ width: `${Math.min(100, (totalScore/124)*100)}%` }}
                                                ></div>
                                            </div>
                                            <div className="text-sm font-bold">
                                                {totalScore >= passThreshold ? <span className="text-emerald-600">PASSED</span> : <span className="text-amber-600">Needs 86.8</span>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="min-w-full text-left text-sm">
                                                <thead className="bg-slate-800 text-white">
                                                    <tr>
                                                        <th className="p-4 font-bold text-md w-1/2">Domains & Items[cite: 4]</th>
                                                        <th className="p-4 font-bold text-center text-sm bg-slate-700 w-1/4 leading-tight">Demonstrated / Elicited <br/><span className="text-xs font-normal opacity-70">(Max 2 Pts)</span></th>
                                                        <th className="p-4 font-bold text-center text-sm bg-slate-600 w-1/4 leading-tight">Reported <br/><span className="text-xs font-normal opacity-70">(Max 2 Pts)</span></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-200 text-slate-700 font-medium">
                                                    {exactRubric.map((category, catIdx) => (
                                                        <React.Fragment key={catIdx}>
                                                            <tr className="bg-sky-50 border-t-2 border-sky-200">
                                                                <td colSpan="3" className="p-3 px-4 font-black text-sky-900 text-sm tracking-wide">{category.category}</td>
                                                            </tr>
                                                            {category.items.map((item) => {
                                                                return (
                                                                    <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                                        <td className="p-4 pl-6 text-sm">
                                                                            {renderTextWithCitations(item.text)}
                                                                        </td>
                                                                        
                                                                        {/* Demonstrated / Elicited Column */}
                                                                        <td className="p-3 text-center border-l border-slate-200 bg-slate-50/50">
                                                                            {(item.type === 'demo' || item.type === 'both') ? (
                                                                                <div className="flex justify-center gap-2">
                                                                                    {[0, 1, 2].map(val => (
                                                                                        <button 
                                                                                            key={val}
                                                                                            onClick={() => handleScoreChange(item.id, 'demo', val)}
                                                                                            className={`w-8 h-8 rounded-full font-bold transition-all text-xs border ${scores[item.id]?.demo === val ? 'bg-emerald-500 text-white border-emerald-600 shadow-inner' : 'bg-white text-slate-400 border-slate-300 hover:border-emerald-400'}`}
                                                                                        >
                                                                                            {val}
                                                                                        </button>
                                                                                    ))}
                                                                                </div>
                                                                            ) : <span className="text-slate-300">—</span>}
                                                                        </td>

                                                                        {/* Reported Column */}
                                                                        <td className="p-3 text-center border-l border-slate-200 bg-slate-50/30">
                                                                            {(item.type === 'report' || item.type === 'both') ? (
                                                                                <div className="flex justify-center gap-2">
                                                                                    {[0, 1, 2].map(val => (
                                                                                        <button 
                                                                                            key={val}
                                                                                            onClick={() => handleScoreChange(item.id, 'report', val)}
                                                                                            className={`w-8 h-8 rounded-full font-bold transition-all text-xs border ${scores[item.id]?.report === val ? 'bg-emerald-500 text-white border-emerald-600 shadow-inner' : 'bg-white text-slate-400 border-slate-300 hover:border-emerald-400'}`}
                                                                                        >
                                                                                            {val}
                                                                                        </button>
                                                                                    ))}
                                                                                </div>
                                                                            ) : <span className="text-slate-300">—</span>}
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </React.Fragment>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    
                                    <div className="flex justify-end pt-4">
                                        <button 
                                            onClick={() => setScores({})} 
                                            className="px-6 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-lg transition-colors"
                                        >
                                            Reset Scores
                                        </button>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PsychApp />);
    </script>
</body>
</html>

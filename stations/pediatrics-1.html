<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- View 1: Ultimate Master Cheat Sheet ---
        const MasterReference = () => (
            <div className="space-y-10 animate-fade-in pb-10">
                
                {/* Anthropometrics & Vital Signs */}
                <div>
                    <h2 className="text-3xl font-bold text-indigo-900 border-b-2 border-indigo-200 pb-2 mb-6">1. Clinical Anthropometrics & Vital Signs</h2>
                    
                    {/* Full Vital Signs Table */}
                    <div className="bg-white shadow rounded border border-slate-200 p-5 mb-6">
                        <h3 className="font-bold text-teal-800 border-b pb-2 mb-4 text-lg">Normal Vital Signs According to Age (Table 79.1)</h3>
                        <div className="overflow-x-auto shadow rounded border border-slate-200 mb-4">
                            <table className="min-w-full text-left text-sm bg-white divide-y divide-slate-200">
                                <thead className="bg-teal-50 text-teal-900">
                                    <tr>
                                        <th className="p-3 font-bold border-r border-slate-200 w-1/4">Age Category</th>
                                        <th className="p-3 font-bold border-r border-slate-200 w-1/4">Heart Rate (beats/min)</th>
                                        <th className="p-3 font-bold border-r border-slate-200 w-1/4">Blood Pressure (mm Hg)</th>
                                        <th className="p-3 font-bold w-1/4">Respiratory Rate (breaths/min)</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-200">
                                    <tr className="hover:bg-slate-50"><td className="p-3 font-semibold border-r border-slate-200">Premature</td><td className="p-3 border-r border-slate-200 text-slate-700">120-205*</td><td className="p-3 border-r border-slate-200 text-slate-700">60-76 / 31-45</td><td className="p-3 text-slate-700">40-70</td></tr>
                                    <tr className="hover:bg-slate-50"><td className="p-3 font-semibold border-r border-slate-200">Neonate</td><td className="p-3 border-r border-slate-200 text-slate-700">100-205*</td><td className="p-3 border-r border-slate-200 text-slate-700">67-84 / 35-53</td><td className="p-3 text-slate-700">35-55</td></tr>
                                    <tr className="hover:bg-slate-50"><td className="p-3 font-semibold border-r border-slate-200">Infant</td><td className="p-3 border-r border-slate-200 text-slate-700">100-180</td><td className="p-3 border-r border-slate-200 text-slate-700">72-104 / 37-56</td><td className="p-3 text-slate-700">30-53</td></tr>
                                    <tr className="hover:bg-slate-50"><td className="p-3 font-semibold border-r border-slate-200">Toddler</td><td className="p-3 border-r border-slate-200 text-slate-700">98-140</td><td className="p-3 border-r border-slate-200 text-slate-700">86-106 / 42-63</td><td className="p-3 text-slate-700">22-37</td></tr>
                                    <tr className="hover:bg-slate-50"><td className="p-3 font-semibold border-r border-slate-200">Preschooler</td><td className="p-3 border-r border-slate-200 text-slate-700">80-120</td><td className="p-3 border-r border-slate-200 text-slate-700">89-112 / 46-72</td><td className="p-3 text-slate-700">20-28</td></tr>
                                    <tr className="hover:bg-slate-50"><td className="p-3 font-semibold border-r border-slate-200">School-age child</td><td className="p-3 border-r border-slate-200 text-slate-700">75-118</td><td className="p-3 border-r border-slate-200 text-slate-700">97-120 / 57-80</td><td className="p-3 text-slate-700">18-25</td></tr>
                                    <tr className="hover:bg-slate-50"><td className="p-3 font-semibold border-r border-slate-200">Adolescent</td><td className="p-3 border-r border-slate-200 text-slate-700">60-100</td><td className="p-3 border-r border-slate-200 text-slate-700">110-131 / 64-83</td><td className="p-3 text-slate-700">12-20</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <ul className="text-xs text-slate-700 space-y-2 bg-slate-50 p-4 rounded border border-slate-200">
                            <li><strong>* Heart Rate:</strong> In sleep, HR may be significantly lower. If perfusion is maintained, no intervention is required. Count for a full minute.</li>
                            <li><strong>† Blood Pressure:</strong> Cuff should cover ~2/3 of the arm and 80-100% of circumference. Values are systolic/diastolic and assume 50th percentile for height for children &ge; 1 year. Obtain in all 4 extremities if screening.</li>
                            <li><strong>+ Respiratory Rate:</strong> Expected to increase in the presence of fever and stress. Count for a full minute.</li>
                        </ul>
                    </div>

                    {/* Anthropometric Rules */}
                    <div className="bg-white shadow rounded border border-slate-200 p-5 mb-6">
                        <h3 className="font-bold text-indigo-800 border-b pb-2 mb-4 text-lg">Anthropometric Techniques (Nelson & PEDIA 250)</h3>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 text-sm text-slate-700">
                            
                            {/* Core Measurements */}
                            <div>
                                <h4 className="font-bold text-indigo-600 mb-2 border-l-4 border-indigo-500 pl-2">Weight, Length/Height & BMI</h4>
                                <ul className="space-y-3">
                                    <li><strong className="text-slate-900">Weight:</strong> Taken in kg to one-tenths (0.0). The infant must be <strong>naked</strong> or wearing a dry diaper (subtract diaper weight). Remove heavy clothing and shoes for older children.</li>
                                    <li><strong className="text-slate-900">Length (&lt; 2 years old):</strong> Measured in the recumbent position. <strong>Requires two examiners</strong> (one to position the head, one to extend legs). Head must touch the inflexible board.</li>
                                    <li><strong className="text-slate-900">Height (&ge; 2 years old):</strong> Measured standing unassisted using a stadiometer. Shoes off. The back of the head, thoracic spine, buttocks, and heels must approximate the vertical axis.</li>
                                    <li><strong className="text-slate-900">Frankfurt Plane (Crucial for Length/Height):</strong> The outer canthi of the eyes must be inline with the external auditory meatus, perpendicular to the long axis of the trunk.</li>
                                    <li><strong className="text-slate-900">Body Mass Index (BMI):</strong> Calculated as Weight (kg) / Height (m)². Plotted for children &ge; 2 years old (or &ge; 5 depending on specific WHO charts used).</li>
                                </ul>
                            </div>
                            
                            {/* Circumferences & Proportions */}
                            <div className="space-y-4">
                                <div>
                                    <h4 className="font-bold text-indigo-600 mb-2 border-l-4 border-indigo-500 pl-2">Circumferences</h4>
                                    <ul className="space-y-2">
                                        <li><strong className="text-slate-900">Head (HC):</strong> Measured with a flexible tape starting at the <strong>supraorbital ridge</strong> around to the <strong>occipital prominence</strong> to find the maximal circumference. Routine for &le; 3 years old. <em>(Term avg: 34-35 cm; 1 year: 47 cm).</em></li>
                                        <li><strong className="text-slate-900">Chest (CC):</strong> Tape placed at the level of the xiphoid process, measured at mid-inspiration. <em>(At birth, HC &gt; CC. By 1 year of age, CC catches up and overtakes HC).</em></li>
                                        <li><strong className="text-slate-900">Abdomen (AC):</strong> Tape placed level against the umbilicus. Applied snugly but not compressing the skin.</li>
                                    </ul>
                                </div>
                                <div>
                                    <h4 className="font-bold text-indigo-600 mb-2 border-l-4 border-indigo-500 pl-2">Body Proportions</h4>
                                    <ul className="space-y-1">
                                        <li><strong className="text-slate-900">U/L Ratio:</strong> Upper to Lower body segment ratio. Normal: ~1.7 at birth, 1.3 at 3 years, 1.0 after 7 years.</li>
                                        <li><strong className="text-slate-900">Arm Span:</strong> Distance between tips of middle fingers with arms outstretched at 90°. Should roughly equal height.</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* WHO Z-Score Table & MUAC */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
                        <div className="lg:col-span-2 bg-white shadow rounded border border-slate-200 p-5">
                            <h3 className="font-bold text-indigo-800 border-b pb-2 mb-4 text-lg">WHO Z-Score Growth Matrix</h3>
                            <div className="overflow-x-auto">
                                <table className="min-w-full text-left text-xs bg-white divide-y divide-slate-200">
                                    <thead className="bg-indigo-50 text-indigo-900">
                                        <tr>
                                            <th className="p-2 font-bold w-1/6">Z-score</th>
                                            <th className="p-2 font-bold w-1/5">Length/Height</th>
                                            <th className="p-2 font-bold w-1/5">Weight-for-age</th>
                                            <th className="p-2 font-bold w-1/5">Weight-for-length</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200">
                                        <tr><td className="p-2 font-bold bg-slate-50">&gt; +3</td><td className="p-2 text-slate-500">Very Tall</td><td className="p-2 text-slate-500">Assess via BMI</td><td className="p-2 font-bold text-red-600">Obese</td></tr>
                                        <tr><td className="p-2 font-bold bg-slate-50">&gt; +2</td><td className="p-2"></td><td className="p-2 font-bold text-orange-600">Overweight</td><td className="p-2 font-bold text-orange-600">Overweight</td></tr>
                                        <tr><td className="p-2 font-bold bg-slate-50">&gt; +1</td><td className="p-2"></td><td className="p-2 font-semibold text-amber-600">Risk of Overweight</td><td className="p-2 font-semibold text-amber-600">Risk of Overweight</td></tr>
                                        <tr><td className="p-2 font-bold bg-slate-50">0 (Median)</td><td className="p-2">Normal</td><td className="p-2">Normal</td><td className="p-2">Normal</td></tr>
                                        <tr><td className="p-2 font-bold bg-slate-50">&lt; -2</td><td className="p-2 font-bold text-amber-600">Stunted</td><td className="p-2 font-bold text-amber-600">Underweight</td><td className="p-2 font-bold text-amber-600">Wasted (MAM)</td></tr>
                                        <tr><td className="p-2 font-bold bg-slate-50">&lt; -3</td><td className="p-2 font-bold text-red-600">Severely Stunted</td><td className="p-2 font-bold text-red-600">Severely Underwt.</td><td className="p-2 font-bold text-red-600">Severely Wasted (SAM)</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div className="bg-white shadow rounded border border-slate-200 p-5">
                            <h3 className="font-bold text-indigo-800 border-b pb-2 mb-4 text-lg">MUAC (6-59 months)</h3>
                            <ul className="space-y-4 text-sm text-slate-800">
                                <li className="flex items-center"><span className="w-4 h-4 bg-green-500 mr-3 rounded-full flex-shrink-0"></span><span><strong>&ge; 12.5 cm:</strong> Normal</span></li>
                                <li className="flex items-center"><span className="w-4 h-4 bg-yellow-400 mr-3 rounded-full flex-shrink-0"></span><span><strong>11.5 to &lt; 12.5 cm:</strong> MAM (Moderate Acute Malnutrition)</span></li>
                                <li className="flex items-start"><span className="w-4 h-4 bg-red-600 mr-3 rounded-full flex-shrink-0 mt-1"></span><span><strong className="text-red-700">&lt; 11.5 cm:</strong> SAM (Severe Acute Malnutrition) - Requires immediate admission. Overrides WFH Z-scores.</span></li>
                            </ul>
                        </div>
                    </div>
                </div>

                {/* OSCE Scripts */}
                <div>
                    <h2 className="text-3xl font-bold text-emerald-900 border-b-2 border-emerald-200 pb-2 mb-6">2. OSCE Execution Scripts</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div className="bg-emerald-50 shadow rounded border border-emerald-200 p-5">
                            <h3 className="font-bold text-emerald-800 border-b border-emerald-200 pb-2 mb-3">Consultant Reporting & 7 Rights</h3>
                            <ul className="text-sm space-y-3 text-slate-800">
                                <li><strong>Pre-Admin Checks:</strong> "Good [morning] Doc, presenting my patient, a [Age]-old [Gender]. Vitals are normal per Table 79.1. I have checked the <strong>7 Rights</strong>: Right patient, drug, dose, route, time, technique, and documentation."</li>
                                <li><strong>Vaccine Plan:</strong> "The patient is missing [Vaccines]. My plan is to administer [A, B] today via [Routes]. I will give oral vaccines before injectables to keep the infant calm."</li>
                                <li><strong>Anthro Execution:</strong> "Since the patient is [under/over] 2 years old, I used a [Recumbent Infantometer / Standing Stadiometer] with the head in the Frankfurt plane."</li>
                            </ul>
                        </div>
                        <div className="bg-emerald-50 shadow rounded border border-emerald-200 p-5">
                            <h3 className="font-bold text-emerald-800 border-b border-emerald-200 pb-2 mb-3">Patient Counseling & Administration</h3>
                            <ul className="text-sm space-y-3 text-slate-800">
                                <li><strong>Intro & Rights:</strong> "Magandang araw po Mommy. Ako po si Dok, titingin kay baby. Ito po ba si [Pangalan], [Edad]? Ngayon po ay bibigyan natin siya ng bakuna laban sa [Sakit]."</li>
                                <li><strong>Administration (PO):</strong> "Siguraduhin po natin na hindi nakadede si baby 2 oras bago ngayon. Uunahin po natin ipatak ang Rotavirus, bago ang Polio. Dahan-dahan po natin ipapatak sa gilid ng pisngi para hindi mabulunan."</li>
                                <li><strong>Administration (IM/SC/ID):</strong> "Ituturok po natin ito sa [kanang hita / braso]. Hawakan po natin nang maigi ang binti at braso ni baby gamit ang cuddle hold para hindi gumalaw."</li>
                            </ul>
                        </div>
                    </div>
                </div>

                {/* VACCINE MATRIX */}
                <div>
                    <h2 className="text-3xl font-bold text-blue-900 border-b-2 border-blue-200 pb-2 mb-6">3. Complete 2026 Vaccine Reference Matrix</h2>
                    <div className="bg-blue-50 border-l-4 border-blue-600 p-4 rounded mb-6 text-sm text-blue-900 shadow-sm">
                        <strong>Live Spacing Rule:</strong> Two parenteral live vaccines not administered simultaneously must be spaced by exactly <strong>4 weeks (28 days)</strong>. Delay live vaccines for 11 months post-Kawasaki IVIG and 4 months post-RIG.
                    </div>
                    <div className="overflow-x-auto shadow rounded border border-slate-200">
                        <table className="min-w-full text-left text-sm bg-white">
                            <thead className="bg-blue-50 text-blue-900 border-b-2 border-blue-200">
                                <tr>
                                    <th className="p-3 font-bold w-1/5">Vaccine</th>
                                    <th className="p-3 font-bold w-1/5">Route / Site</th>
                                    <th className="p-3 font-bold">2026 Guidelines, Cutoffs & Preceptor Pearls</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-200">
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">BCG</td>
                                    <td className="p-3">ID, Right Deltoid</td>
                                    <td className="p-3"><strong>Dose by Age:</strong> 0.05 mL for &lt;12 months; 0.10 mL for &ge;12 months. Do not give if birth weight &lt;2kg.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Hep B Birth</td>
                                    <td className="p-3">IM, Anterolateral Thigh</td>
                                    <td className="p-3">0, 1, 6 months routine schedule. For infants &lt;2kg with unknown HBsAg status, give HBV + HBIG &le;12 hours (dose doesn't count towards the 3-dose series).</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Pentavalent (DTP/Hib/HepB)</td>
                                    <td className="p-3">IM, Anterolateral Thigh</td>
                                    <td className="p-3">6, 10, 14 weeks. <strong>DTP Max:</strong> 7 years and 0 days is the absolute cutoff. <strong>Double-Dose Trap:</strong> Never give monovalent Hep B at the same time as Penta.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Polio (OPV / IPV)</td>
                                    <td className="p-3">OPV: Oral<br/>IPV: IM, Thigh</td>
                                    <td className="p-3">NIP schedule OPV at 6, 10, 14w. IPV strictly at 14w and 9m. For &gt;7yo unimmunized catch-up, use IPV instead of OPV.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">PCV & PPSV23</td>
                                    <td className="p-3">IM, Thigh / Arm</td>
                                    <td className="p-3">PCV at 6, 10, 14 weeks. Booster at 12-15m. Healthy unvaccinated children &gt;5 years do not require catch-up. High-risk kids &gt;2y get PPSV23.</td>
                                </tr>
                                <tr className="bg-amber-50">
                                    <td className="p-3 font-semibold text-amber-800">Rotavirus (RV)</td>
                                    <td className="p-3">Oral</td>
                                    <td className="p-3"><strong>Max 1st dose:</strong> 14w6d. <strong>Final dose max ages:</strong> RV1 (24 weeks), RV5 (32 weeks), RV5-SII (12 months). Give before OPV.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Measles / MMR</td>
                                    <td className="p-3">SC, Triceps/Thigh (45°)</td>
                                    <td className="p-3">NIP provides MMR at 9m and 12m. School-based MR given at Grade 1 and Grade 7. <strong>Outbreak:</strong> Measles vaccine given at 6m doesn't count towards primary series.</td>
                                </tr>
                                <tr className="bg-amber-50">
                                    <td className="p-3 font-semibold text-amber-800">Influenza</td>
                                    <td className="p-3">IM, Thigh/Deltoid</td>
                                    <td className="p-3">Starting at 6 months. Children 6 months to 8 years receiving it for the first time require 2 doses 4 weeks apart.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Hep A</td>
                                    <td className="p-3">IM, Thigh/Deltoid</td>
                                    <td className="p-3">2-dose series starting at 12 months. Doses separated by 6 months.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Td / Tdap</td>
                                    <td className="p-3">IM, Deltoid</td>
                                    <td className="p-3">For unimmunized children 7-18 years old, catch up using Tdap as one of the doses (preferably the first), followed by Td.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">HPV</td>
                                    <td className="p-3">IM, Deltoid</td>
                                    <td className="p-3">NIP provides HPV to females: Grade 4 (school-based) or 9 years old (community-based). Must observe 15-20 mins post-vaccination.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );

        // --- View 2: Anthro Simulator (8 Cases) ---
        const AnthroSimulator = () => {
            const [submitted, setSubmitted] = useState(false);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState([]);
            const [currentCaseId, setCurrentCaseId] = useState(1);
            const [selections, setSelections] = useState({ measure: "", hrStat: "", rrStat: "", nutStat: "" });

            const cases = {
                1: { title: "1. The 18-Month-Old", prompt: "18-month-old. HR 145, RR 32. WFH Z-score -3.2.", rules: { measure: "Recumbent", hrStat: "Tachycardia", rrStat: "Normal", nutStat: "Severe Wasting (SAM)" }, pearl: "Toddler (1-3y) normal HR is 98-140 per Table 79.1. A HR of 145 in an 18mo is tachycardic. WFH < -3 is classic SAM." },
                2: { title: "2. The 4-Year-Old", prompt: "4-year-old. HR 90, RR 35. HFA Z-score -2.5.", rules: { measure: "Standing", hrStat: "Normal", rrStat: "Tachypnea", nutStat: "Stunting" }, pearl: "Preschooler normal RR is 20-28 per Table 79.1. RR 35 is tachypneic. HFA between -2 and -3 defines Stunting." },
                3: { title: "3. MUAC Override", prompt: "18-month-old. HR 120, RR 30. WFH -2.5 (MAM). MUAC is 11.0 cm.", rules: { measure: "Recumbent", hrStat: "Normal", rrStat: "Normal", nutStat: "Severe Acute Malnutrition (SAM - Override)" }, pearl: "Regardless of a MAM WFH Z-score, a MUAC < 11.5cm is an independent, immediate diagnostic criterion for SAM." },
                4: { title: "4. The Obese Preschooler", prompt: "4-year-old. HR 85, RR 22. WFH Z-score +3.5.", rules: { measure: "Standing", hrStat: "Normal", rrStat: "Normal", nutStat: "Obese" }, pearl: "WFH > +2 is Overweight. WFH > +3 is Obese. Standing height using a stadiometer is strictly used for children >= 2 years old (Nelson)." },
                5: { title: "5. Severe Stunting & Bradypnea", prompt: "14-month-old. HR 120, RR 18. HFA Z-score -3.5.", rules: { measure: "Recumbent", hrStat: "Normal", rrStat: "Bradypnea", nutStat: "Severe Stunting" }, pearl: "Toddler normal RR is 22-37 per Table 79.1. RR 18 is bradypneic. HFA < -3 defines Severe Stunting." },
                6: { title: "6. Overweight & Tachycardia", prompt: "10-month-old. HR 200, RR 45. WFH Z-score +2.5.", rules: { measure: "Recumbent", hrStat: "Tachycardia", rrStat: "Normal", nutStat: "Overweight" }, pearl: "Infant max HR is 180 per Table 79.1. 200 is tachycardic. WFH between +2 and +3 is Overweight." },
                7: { title: "7. School-Age Bradycardia", prompt: "8-year-old. HR 55, RR 20. WFA Z-score -2.5.", rules: { measure: "Standing", hrStat: "Bradycardia", rrStat: "Normal", nutStat: "Underweight" }, pearl: "School-age normal HR is 75-118 per Table 79.1. HR 55 is bradycardic. WFA < -2 is Underweight." },
                8: { title: "8. Adjustment Rule (+/- 0.7cm)", prompt: "A 2.5-year-old refuses to stand. Measured lying down at 90.0 cm. HR 100, RR 25. WFH Z-score -1.0.", rules: { measure: "Subtract 0.7 cm", hrStat: "Normal", rrStat: "Normal", nutStat: "Normal" }, pearl: "Because gravity compresses the spine when standing, recumbent length is naturally ~0.7cm longer. You must subtract 0.7cm if an older child (>= 2y) is measured lying down to plot on standing height charts." }
            };

            const evaluateCase = () => {
                let pts = 100; let fb = []; const activeCase = cases[currentCaseId].rules;
                
                if(selections.measure === activeCase.measure) fb.push({type:'ok', msg: `Measurement: ${activeCase.measure}`});
                else { pts -= 25; fb.push({type:'err', msg: `Wrong Measurement`, rationale: `Expected: ${activeCase.measure}.`}); }
                
                if(selections.hrStat === activeCase.hrStat) fb.push({type:'ok', msg: `HR: ${activeCase.hrStat}`});
                else { pts -= 25; fb.push({type:'err', msg: `Wrong HR`, rationale: `Expected: ${activeCase.hrStat}.`}); }
                
                if(selections.rrStat === activeCase.rrStat) fb.push({type:'ok', msg: `RR: ${activeCase.rrStat}`});
                else { pts -= 25; fb.push({type:'err', msg: `Wrong RR`, rationale: `Expected: ${activeCase.rrStat}.`}); }

            const cases = {
                1: { title: "1. The 6-Week-Old (Primary Series)", prompt: "6-week-old FT baby. Home birth, given BCG and Hep B by midwife. First time at pediatrician.", req: ["Penta", "OPV", "PCV", "RV"], defer: [], traps: ["Flu", "MMR", "Hep B", "IPV"], ratReq: "Needs 1st doses of Penta, OPV, PCV, and Rotavirus.", ratTrap: "Too young for Flu/MMR. Hep B is already included in Penta. IPV is not given until 14 weeks.", pearl: "Administer Rotavirus orally first while baby is calm, before injecting IM vaccines in the vastus lateralis. Do NOT give monovalent Hep B alongside Penta." },

            const generateIdealCounselingScript = (activeCase) => {
                let adminIM = []; let adminPO = []; let adminSQ = []; let adminID = []; let deferScript = [...activeCase.defer]; let seScript = [];

                    if (specificSideEffects[v] && !seScript.includes(specificSideEffects[v])) {

                if (activeCase.req.length === 0 && activeCase.defer.length === 0) return `"Wala po tayong kailangang ibigay na bakuna sa ngayon."`;

                            <div className="flex flex-wrap gap-2">
                                {vaccineList.map(v => (
                                    <button key={v} onClick={() => !submitted && toggle(v)} disabled={submitted} className={`px-2 py-1 rounded border text-sm font-bold ${selectedVaccines[v] ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-700'}`}>{v}</button>
                                ))}
                            </div>
                        </div>
                        {Object.keys(selectedVaccines).length > 0 && (
                            <div className="mb-6 space-y-2">
                                {Object.keys(selectedVaccines).map(v => (
                                    <div key={v} className="flex gap-2 bg-slate-50 p-2 rounded border">
                                        <span className="font-bold w-24 text-sm pt-1">{v}</span>
                                        <select disabled={submitted} value={selectedVaccines[v].route} onChange={e => handleDetailChange(v, 'route', e.target.value)} className="p-1 border rounded text-sm"><option value="">Route</option><option value="Oral">Oral</option><option value="IM">IM</option><option value="SC">SC</option><option value="ID">ID</option><option value="Defer">Defer</option></select>
                                        <select disabled={submitted || selectedVaccines[v].route === 'Defer'} value={selectedVaccines[v].site} onChange={e => handleDetailChange(v, 'site', e.target.value)} className="p-1 border rounded text-sm disabled:opacity-50"><option value="">Site...</option><option value="Mouth">Mouth</option><option value="Right Deltoid">Right Deltoid</option><option value="Deltoid (Arm)">Deltoid (Arm)</option><option value="Anterolateral Thigh">Anterolateral Thigh</option><option value="Triceps Fatty Tissue">Triceps Fatty Tissue</option></select>
                                    </div>
                                ))}
                            </div>
                        )}
                        {!submitted ? <button onClick={evaluateCase} disabled={Object.keys(selectedVaccines).length === 0} className="w-full bg-blue-600 text-white font-bold py-2 rounded shadow hover:bg-blue-700 disabled:opacity-50">Evaluate Station</button> : 
                            <div className="p-4 rounded border-2 border-slate-200 bg-slate-50">
                                <h3 className="text-xl font-bold text-slate-800 mb-3">Feedback: {score}%</h3>
                                
                                <div className="mb-6 bg-white p-4 rounded border border-blue-300 shadow-sm">
                                    <h4 className="font-bold text-blue-900 border-b border-blue-100 pb-2 mb-3">🔑 Ideal Answer Key</h4>
                                    <div className="text-sm text-slate-800 space-y-2">
                                        <div><strong>💉 Administer Today:</strong> <span className="text-emerald-700 font-semibold">{cases[currentCaseId].req.length > 0 ? cases[currentCaseId].req.join(", ") : "None"}</span></div>
                                        <div><strong>⏳ Defer:</strong> <span className="text-amber-600 font-semibold">{cases[currentCaseId].defer.length > 0 ? cases[currentCaseId].defer.join(", ") : "None"}</span></div>
                                        <div><strong>🚫 Contraindicated (Traps):</strong> <span className="text-red-600 font-semibold">{cases[currentCaseId].traps.length > 0 ? cases[currentCaseId].traps.join(", ") : "None"}</span></div>
                                    </div>
                                </div>

                                <ul className="space-y-3">
                                    {feedback.map((f, i) => (
                                        <li key={i} className={`flex flex-col p-3 rounded border ${f.type === 'err' ? 'bg-red-50 border-red-200 text-red-900' : f.type === 'info' ? 'bg-blue-50 border-blue-200 text-blue-900' : f.type === 'pearl' ? 'bg-indigo-100 border-indigo-300 text-indigo-900' : f.type === 'warn' ? 'bg-amber-50 border-amber-200 text-amber-900' : 'bg-emerald-50 border-emerald-200 text-emerald-900'}`}>
                                            <div className="flex items-start">
                                                <span className="mr-2 font-bold">{f.type === 'err' ? '✘' : f.type === 'info' ? '🗣️' : f.type === 'pearl' ? '💡' : f.type === 'warn' ? '⚠' : '✔'}</span>
                                                <span className="font-semibold">{f.msg}</span>
                                            </div>
                                            {f.rationale && <div className={`mt-1 ml-6 text-sm ${f.type === 'info' || f.type === 'pearl' ? 'italic font-medium' : ''} whitespace-pre-line`}>{f.rationale}</div>}
                                        </li>
                                    ))}
                                </ul>
                                <button onClick={() => loadCase(currentCaseId)} className="mt-4 bg-slate-800 text-white font-bold px-6 py-2 rounded hover:bg-slate-700">Retry Case</button>
                            </div>}
                    </div>
                </div>
            );
        };

        // --- View 4: Proper Sequence & Scripts ---
        const ProcedureScript = () => (
            <div className="space-y-10 animate-fade-in pb-10">
                <div>
                    <h2 className="text-3xl font-bold text-teal-900 border-b-2 border-teal-200 pb-2 mb-4">Master Procedure Script (2026 Guidelines)</h2>
                    <p className="text-slate-600 mb-6">Master checklist and verbatim scripts for the preparation, administration, and post-procedure documentation of vaccines based on the 2026 UP Trans.</p>
                </div>

                <div className="bg-white shadow rounded border border-slate-200 p-6">
                    <h3 className="text-xl font-bold text-teal-800 border-b pb-2 mb-4 flex items-center gap-2">
                        <span className="bg-teal-100 text-teal-800 py-1 px-3 rounded-full text-sm">Step 1</span> Preparation & The 7 Rights
                    </h3>
                    <ul className="space-y-3 text-slate-700 font-medium ml-2">
                        <li className="flex items-center gap-3"><input type="checkbox" className="w-5 h-5 accent-teal-600 cursor-pointer" /> Wash hands and prepare a clean designated area.</li>
                        <li className="flex flex-col gap-1">
                            <div className="flex items-center gap-3">
                                <input type="checkbox" className="w-5 h-5 accent-teal-600 cursor-pointer" /> Verbalize the <strong>7 Rights of Administration</strong>:
                            </div>
                            <ul className="list-disc pl-12 text-sm text-slate-600 space-y-1 mt-1 font-mono bg-slate-50 p-3 border rounded">
                                <li>Right patient (Check baby book & ask name)</li>
                                <li>Right drug</li>
                                <li>Right dose</li>
                                <li>Right route</li>
                                <li>Right time</li>
                                <li>Right technique</li>
                                <li>Right documentation</li>
                            </ul>
                        </li>
                    </ul>
                </div>

                <div className="bg-white shadow rounded border border-slate-200 p-6">
                    <h3 className="text-xl font-bold text-teal-800 border-b pb-2 mb-4 flex items-center gap-2">
                        <span className="bg-teal-100 text-teal-800 py-1 px-3 rounded-full text-sm">Step 2</span> Execution / Administration Routes
                    </h3>
                    
                    <div className="grid grid-cols-1 gap-6">
                        <div className="border-l-4 border-purple-500 rounded p-4 bg-slate-50 shadow-sm">
                            <h4 className="font-bold text-purple-900 mb-2 uppercase tracking-wide">A. Oral (PO) - Rotavirus & OPV</h4>
                            <ul className="list-disc pl-5 space-y-2 text-sm text-slate-700 mb-3">
                                <li><strong>Timing:</strong> Do not feed baby 2 hours prior. Give Oral vaccines <em>before</em> injectables.</li>
                                <li><strong>Sequence:</strong> Give Rotavirus first (larger volume), then OPV (2 drops).</li>
                                <li><strong>Technique:</strong> Cuddle position, head tilted back. Gently squeeze cheeks. Angle RV tube to inner cheek. Do not let OPV dropper touch the mouth.</li>
                            </ul>
                        </div>

                        <div className="border-l-4 border-emerald-500 rounded p-4 bg-slate-50 shadow-sm">
                            <h4 className="font-bold text-emerald-900 mb-2 uppercase tracking-wide">B. Intradermal (ID) - BCG</h4>
                            <ul className="list-disc pl-5 space-y-2 text-sm text-slate-700 mb-3">
                                <li><strong>Dose & Site:</strong> 0.05 mL (&lt;12 mos) or 0.10 mL (&ge;12 mos) via Right Deltoid.</li>
                                <li><strong>Technique:</strong> Stretch skin firmly. Needle almost flat, <strong>bevel up</strong>. Inject to form a white wheal.</li>
                            </ul>
                            <div className="bg-emerald-100 p-3 rounded">
                                <span className="font-bold text-emerald-800">🗣️ To Consultant:</span>
                                <p className="italic mt-1 text-slate-700">"The mode of administration is intradermal. Based on the patient's age, the dose is [0.05/0.10] mL. I am pulling the skin taut, inserting the needle almost flat with the bevel up, and slowly injecting to form a wheal."</p>
                            </div>
                        </div>

                        <div className="border-l-4 border-blue-500 rounded p-4 bg-slate-50 shadow-sm">
                            <h4 className="font-bold text-blue-900 mb-2 uppercase tracking-wide">C. Intramuscular (IM)</h4>
                            <ul className="list-disc pl-5 space-y-2 text-sm text-slate-700 mb-3">
                                <li><strong>Site Selection:</strong> Vastus lateralis (anterolateral thigh) for &lt;3yo. Deltoid for &ge;3yo. Separate multiple vaccines by 1 inch.</li>
                                <li><strong>Technique:</strong> Use Z-technique to displace skin. Dart-like swift movement at a <strong>90° angle</strong>.</li>
                                <li><strong className="text-red-600">CRITICAL RULE:</strong> Routine aspiration is <strong>no longer recommended</strong> for pediatric vaccines.</li>
                            </ul>
                            <div className="bg-blue-100 p-3 rounded">
                                <span className="font-bold text-blue-800">🗣️ To Consultant:</span>
                                <p className="italic mt-1 text-slate-700">"The route is intramuscular on the vastus lateralis. I clean the site moving outward. Using the Z-technique, I insert the needle swiftly at a 90-degree angle. Without aspirating, I inject the vaccine, remove the needle, and apply pressure with dry gauze."</p>
                            </div>
                        </div>
                        
                        <div className="border-l-4 border-amber-500 rounded p-4 bg-slate-50 shadow-sm">
                            <h4 className="font-bold text-amber-900 mb-2 uppercase tracking-wide">D. Subcutaneous (SC) - MMR, Varicella, JEV</h4>
                            <ul className="list-disc pl-5 space-y-2 text-sm text-slate-700 mb-3">
                                <li><strong>Needle:</strong> Must use a 5/8 inch (23-25G) needle.</li>
                                <li><strong>Site:</strong> Fatty tissue over anterolateral thigh (&lt;1yo) or Triceps (&ge;1yo).</li>
                                <li><strong>Technique:</strong> Pinch the fatty tissue. Insert at a <strong>45° angle</strong>.</li>
                            </ul>
                            <div className="bg-amber-100 p-3 rounded">
                                <span className="font-bold text-amber-800">🗣️ To Consultant:</span>
                                <p className="italic mt-1 text-slate-700">"The route is subcutaneous. I am using a 5/8 inch needle to avoid reaching the muscle. I pinch the fatty tissue over the triceps and insert the needle at a 45-degree angle. I inject the vaccine, slowly withdraw, and apply pressure."</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div className="bg-white shadow rounded border border-slate-200 p-6">
                    <h3 className="text-xl font-bold text-teal-800 border-b pb-2 mb-4 flex items-center gap-2">
                        <span className="bg-teal-100 text-teal-800 py-1 px-3 rounded-full text-sm">Step 3</span> Post-Admin Observation & Documentation
                    </h3>
                    
                    <div className="space-y-6">
                        <div className="bg-red-50 p-4 rounded border-l-4 border-red-500">
                            <h4 className="font-bold text-red-900 mb-2">⚠ Mandatory Observation (Syncope/Anaphylaxis)</h4>
                            <p className="text-slate-800 text-sm">Must observe the patient seated or lying down for <strong>15-20 minutes</strong> post-vaccination (especially adolescents receiving HPV or Tdap) to monitor for syncope or immediate allergic reactions.</p>
                        </div>
                        
                        <div className="bg-blue-50 p-4 rounded border-l-4 border-blue-500">
                            <h4 className="font-bold text-blue-900 mb-2">🗣️ Counseling Example (Hep B):</h4>
                            <p className="italic text-slate-800">"Nabigay na po ang Hepatitis B vaccine. Oobserbahan po muna natin si baby ng 15-20 minuto dito bago kayo umuwi para makasigurado tayong walang masamang reaksyon. Maaari po siyang lagnatin o mamula ang hita. Punasan po ng maligamgam na tubig at painumin ng paracetamol kung kailangan. Babalik po kayo makalipas ang [X] buwan para sa susunod na dose."</p>
                        </div>

                        <div className="bg-indigo-50 p-4 rounded border-l-4 border-indigo-500">
                            <h4 className="font-bold text-indigo-900 mb-2">📝 Documentation (To Consultant):</h4>
                            <p className="italic text-slate-800">"I will now document the date, vaccine name, lot number, manufacturer, and administration site in the patient's baby book to ensure accurate spacing for future doses."</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('ref');
            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <nav className="w-full md:w-64 bg-slate-900 text-white p-6 shadow-xl flex-shrink-0">
                        <h1 className="text-xl font-bold text-emerald-400">UPCM Pedia OSCE</h1>
                        <p className="text-xs text-slate-400 mt-1 uppercase tracking-wider mb-6">2026 Immunization</p>
                        <ul className="space-y-2">
                            <li><button onClick={() => setView('ref')} className={`w-full text-left p-2 rounded font-bold transition-colors ${view === 'ref' ? 'bg-emerald-700' : 'hover:bg-slate-800'}`}>1. Ultimate Cheat Sheet</button></li>
                            <li><button onClick={() => setView('sim-anthro')} className={`w-full text-left p-2 rounded font-bold transition-colors ${view === 'sim-anthro' ? 'bg-emerald-700' : 'hover:bg-slate-800'}`}>2. Anthro/SAM Sim (8)</button></li>
                            <li><button onClick={() => setView('sim-vac')} className={`w-full text-left p-2 rounded font-bold transition-colors ${view === 'sim-vac' ? 'bg-emerald-700' : 'hover:bg-slate-800'}`}>3. Vaccine Sim (20 Cases)</button></li>
                            <li><button onClick={() => setView('procedure')} className={`w-full text-left p-2 rounded font-bold transition-colors ${view === 'procedure' ? 'bg-emerald-700' : 'hover:bg-slate-800'}`}>4. Procedures & Rules</button></li>
                        </ul>
                    </nav>
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto bg-slate-100 h-screen">
                        <div className="max-w-5xl mx-auto">
                            {view === 'ref' && <MasterReference />}
                            {view === 'sim-anthro' && <AnthroSimulator />}
                            {view === 'sim-vac' && <AdvancedSimulator />}
                            {view === 'procedure' && <ProcedureScript />}
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 UPCM Pediatrics OSCE - Ultimate Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- View 1: Ultimate Master Cheat Sheet ---
        const MasterReference = () => (
            <div className="space-y-10 animate-fade-in pb-10">
                {/* Reporting Scripts */}
                <div>
                    <h2 className="text-2xl font-bold text-emerald-900 border-b-2 border-emerald-200 pb-2 mb-4">OSCE Execution & Preceptor Scripts</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div className="bg-emerald-50 shadow rounded border border-emerald-200 p-5">
                            <h3 className="font-bold text-emerald-800 border-b border-emerald-200 pb-2 mb-3">1. Consultant Reporting (Anthro & Plan)</h3>
                            <ul className="text-sm space-y-3 text-slate-800">
                                <li><strong>Intro & Vitals:</strong> "Good [morning] Doc, presenting my patient, a [Age]-old [Gender]. Vitals show a HR of [X], which is [Normal/Tachy] for age, and a RR of [Y], which is [Normal/Tachypneic]."</li>
                                <li><strong>Anthro Execution:</strong> "Since the patient is [under/over] 2 years old, I used a [Recumbent Infantometer / Standing Stadiometer]. <span className="italic text-slate-600">(If uncooperative &lt;2y stood up: 'I measured standing and added 0.7cm').</span>"</li>
                                <li><strong>Diagnosis:</strong> "Based on WHO charts, WFH Z-score is [X], indicating [Diagnosis]. <span className="text-red-700 font-bold">(If MUAC &lt;11.5cm or Edema present: 'However, noting the MUAC of X / Pitting Edema, the final diagnosis is Severe Acute Malnutrition').</span>"</li>
                                <li><strong>Vaccine Plan:</strong> "The patient is missing [Vaccines]. My plan is to administer [A, B, C] today via [Routes]. I will defer [D] to the next visit to minimize simultaneous IM injections / respect live-vaccine spacing rules."</li>
                            </ul>
                        </div>
                        <div className="bg-emerald-50 shadow rounded border border-emerald-200 p-5">
                            <h3 className="font-bold text-emerald-800 border-b border-emerald-200 pb-2 mb-3">2. Patient Counseling & Administration</h3>
                            <ul className="text-sm space-y-3 text-slate-800">
                                <li><strong>Intro & Rights:</strong> "Magandang araw po Mommy. Ako po si Dok, titingin kay baby. Ito po ba si [Pangalan], [Edad]? Ngayon po ay bibigyan natin siya ng bakuna laban sa [Sakit]."</li>
                                <li><strong>Administration (PO):</strong> "Papainumin po natin si baby ng oral drops. Dahan-dahan po natin ipapatak sa gilid ng pisngi para hindi mabulunan."</li>
                                <li><strong>Administration (IM/SC/ID):</strong> "Ituturok po natin ito sa [kanang hita / braso]. Hawakan po natin nang maigi ang mga binti at braso ni baby para hindi gumalaw."</li>
                                <li><strong>Deferral / Spacing:</strong> "Dahil sa rules ng pagitan ng mga bakuna (o para hindi masyadong masaktan si baby sa dami ng turok), ipagpapaliban po muna natin ang [Vaccine]. Balik po kayo sa [Petsa]."</li>
                            </ul>
                        </div>
                    </div>
                </div>

                {/* Specific Side Effects */}
                <div>
                    <h2 className="text-2xl font-bold text-amber-900 border-b-2 border-amber-200 pb-2 mb-4">Vaccine-Specific Side Effects (Must Verbalize)</h2>
                    <div className="bg-white shadow rounded border border-slate-200 p-5 mb-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4 text-sm text-slate-800">
                            <div><strong>BCG:</strong> "Asahan po ang pag-umbok, pamumula, at pagnanana sa tinurukan pagkalipas ng ilang linggo. Normal po ito at mag-iiwan ng peklat. Huwag pipisain, kakamutin, o lalagyan ng alcohol/betadine."</div>
                            <div><strong>Pentavalent & PCV:</strong> "Maaaring magkalagnat, mamula, at sumakit ang hita ni baby. Pwede pong punasan ng maligamgam na tubig at painumin ng paracetamol kung kailangan."</div>
                            <div><strong>Measles (MCV) / MMR:</strong> "Ang lagnat o banayad na pantal (mild rash) ay maaaring lumabas pagkalipas pa ng 5 hanggang 12 araw. Sa MMR, baka mamaga rin nang bahagya ang pisngi (glands)."</div>
                            <div><strong>Rotavirus (RV):</strong> "Baka maging iritable o bahagyang magbago ang dumi ni baby. <span className="text-red-600 font-bold">RED FLAG:</span> Kung umiiyak nang matindi dahil sa sakit ng tiyan at ang dumi ay mukhang 'strawberry jelly', dalhin agad sa ER (Intussusception)."</div>
                            <div><strong>OPV / IPV:</strong> "Walang malalang side effect ang OPV bukod sa pagiging iritable. Sa IPV, maaaring mangawit ang hita."</div>
                            <div><strong>Td / HPV (School Age):</strong> "Maaaring mangawit ang braso. Ang mga teenager ay madalas mahilo o himatayin (syncope) sa takot, kaya pauupuin muna natin siya ng 15 minuto pagkatapos turukan."</div>
                        </div>
                    </div>
                </div>

                {/* Comprehensive Anthro Values */}
                <div>
                    <h2 className="text-2xl font-bold text-indigo-900 border-b-2 border-indigo-200 pb-2 mb-4">Complete Anthropometric & Vital Cutoffs</h2>
                    <div className="bg-white shadow rounded border border-slate-200 p-5 mb-6">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <h3 className="font-bold text-indigo-800 border-b pb-1 mb-2">WHO Z-Score (WFH)</h3>
                                <ul className="text-sm text-slate-700 space-y-1">
                                    <li><span className="font-bold text-red-600">&gt; +3:</span> Obese</li>
                                    <li><span className="font-bold text-orange-600">&gt; +2:</span> Overweight</li>
                                    <li><span className="font-bold text-green-700">+1 to -2:</span> Normal</li>
                                    <li><span className="font-bold text-amber-600">&lt; -2:</span> Wasted (MAM)</li>
                                    <li><span className="font-bold text-red-600">&lt; -3:</span> Severely Wasted (SAM)</li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="font-bold text-indigo-800 border-b pb-1 mb-2">MUAC (6 to 59 months)</h3>
                                <ul className="text-sm space-y-2">
                                    <li><span className="inline-block w-3 h-3 bg-green-500 mr-2 rounded-full"></span><strong>&ge; 12.5 cm:</strong> Normal</li>
                                    <li><span className="inline-block w-3 h-3 bg-yellow-400 mr-2 rounded-full"></span><strong>11.5 to &lt; 12.5 cm:</strong> MAM</li>
                                    <li><span className="inline-block w-3 h-3 bg-red-600 mr-2 rounded-full"></span><strong>&lt; 11.5 cm:</strong> SAM (Immediate admission criteria)</li>
                                </ul>
                            </div>
                            <div>
                                <h3 className="font-bold text-indigo-800 border-b pb-1 mb-2">Pediatric Vitals (HR | RR)</h3>
                                <ul className="text-sm text-slate-700 space-y-1">
                                    <li><strong>Neonate:</strong> 100-205 | 40-60</li>
                                    <li><strong>Infant:</strong> 100-190 | 30-53</li>
                                    <li><strong>Toddler:</strong> 98-140 | 22-37</li>
                                    <li><strong>Preschool:</strong> 80-120 | 20-28</li>
                                    <li><strong>School Age:</strong> 75-118 | 18-25</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                {/* COMPREHENSIVE VACCINE MATRIX */}
                <div>
                    <h2 className="text-2xl font-bold text-blue-900 border-b-2 border-blue-200 pb-2 mb-4">Complete 2026 Vaccine Reference Matrix</h2>
                    <div className="bg-blue-50 border-l-4 border-blue-600 p-4 rounded mb-6 text-sm text-blue-900">
                        <strong>NIP vs. Routine:</strong> NIP prioritizes BCG, monovalent Hep B, Pentavalent, OPV, IPV, PCV, and MMR/MR. School-based NIP includes Td, MR, and HPV. Routine/Out-of-pocket vaccines include Rotavirus, Varicella, JEV, Hep A.
                    </div>
                    <div className="overflow-x-auto shadow rounded border border-slate-200">
                        <table className="min-w-full text-left text-sm bg-white">
                            <thead className="bg-blue-50 text-blue-900 border-b-2 border-blue-200">
                                <tr>
                                    <th className="p-3 font-bold w-1/5">Vaccine</th>
                                    <th className="p-3 font-bold w-1/5">Route / Site</th>
                                    <th className="p-3 font-bold">OSCE Traps, Cutoffs & Preceptor Pearls</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-200">
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">BCG</td>
                                    <td className="p-3">ID, Right Deltoid</td>
                                    <td className="p-3"><strong>Trap:</strong> Max age is &lt; 1 year for healthy children. PPD prior to vaccination is NOT necessary for healthy infants &lt; 1 year old.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Hep B Birth</td>
                                    <td className="p-3">IM, Thigh</td>
                                    <td className="p-3"><strong>PRETERM TRAP:</strong> Routine birth dose is for newborns &ge; 2kg. For infants &lt; 2kg with unknown HBsAg status, give HBV + HBIG &le; 12 hours. <span className="text-slate-500 italic">(Pearl: For infants &lt; 2kg, the birth dose doesn't count towards the series).</span></td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Pentavalent (DTP/Hib/HepB)</td>
                                    <td className="p-3">IM, Thigh</td>
                                    <td className="p-3"><strong>DTP Max:</strong> 7 years and 0 days is the absolute cutoff. <strong>Hib Max:</strong> Not needed for healthy >5 yrs. <span className="text-slate-500 italic">(Pearl: Whole-cell pertussis (wP) causes high local reactogenicity in older children).</span></td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Polio (OPV / IPV)</td>
                                    <td className="p-3">OPV: Oral<br/>IPV: IM, Thigh</td>
                                    <td className="p-3">NIP schedule OPV at 6, 10, 14w. IPV at 14w and 9m. <strong>Trap:</strong> Ensure OPV is routed as Oral. Defer IPV if the infant is already receiving multiple IM injections to prevent distress.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">PCV / PPSV23</td>
                                    <td className="p-3">IM, Thigh / Arm</td>
                                    <td className="p-3">NIP follows 3+0 (at 6, 10, 14 weeks). <strong>Trap:</strong> Healthy >5y do not need PCV catch-up. High-risk patients &ge;2y who finished PCV get PPSV23.</td>
                                </tr>
                                <tr className="bg-amber-50">
                                    <td className="p-3 font-semibold text-amber-800">Rotavirus</td>
                                    <td className="p-3">Oral</td>
                                    <td className="p-3"><strong>Max 1st dose:</strong> 14w6d (RV5). <strong>Max Final:</strong> RV1 is 24w; RV5 is 32w; RV5-SII is 12 months. Prior infection is NOT a contraindication.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Measles (MCV) / MMR</td>
                                    <td className="p-3">SC, Outer Arm</td>
                                    <td className="p-3">NIP provides MMR at 9m and 12m. <strong>Outbreak Trap:</strong> Measles vaccine given at 6m doesn't count towards primary series because maternal IgG antibodies blunt viral replication.</td>
                                </tr>
                                <tr className="bg-amber-50">
                                    <td className="p-3 font-semibold text-amber-800">Varicella & Hep A</td>
                                    <td className="p-3">SC / IM, Arm</td>
                                    <td className="p-3">Strictly indicated at &ge; 12 months. Giving at 9 months or 11 months is a critical error.</td>
                                </tr>
                                <tr className="bg-amber-50">
                                    <td className="p-3 font-semibold text-amber-800">JEV</td>
                                    <td className="p-3">SC, Outer Arm</td>
                                    <td className="p-3">Strictly indicated at &ge; 9 months. Administer alongside MCV1.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-red-700">Live Spacing / IVIG</td>
                                    <td className="p-3">-</td>
                                    <td className="p-3 font-bold text-red-600">Non-simultaneous parenteral live vaccines MUST be spaced by 28 days. Delay live vaccines for 11 months post-IVIG (Kawasaki) and 4 months post-RIG (Rabies).</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">Td / Tdap</td>
                                    <td className="p-3">IM, Deltoid</td>
                                    <td className="p-3">Use instead of DTP for children &ge; 7 years. NIP gives Td school-based boosters at Grade 1 and Grade 7.</td>
                                </tr>
                                <tr>
                                    <td className="p-3 font-semibold text-emerald-700">HPV</td>
                                    <td className="p-3">IM, Deltoid</td>
                                    <td className="p-3">NIP provides HPV to females via 2 programs: At Grade 4 (school-based) OR 9 years old (community-based). 2 doses one year apart. Must wait 15 minutes post-vaccination due to syncope risk.</td>
                                </tr>
                                <tr className="bg-amber-50">
                                    <td className="p-3 font-semibold text-amber-800">Typhoid & Cholera</td>
                                    <td className="p-3">Typhoid: IM<br/>Cholera: Oral</td>
                                    <td className="p-3">Given during disaster/flood settings. <strong>Trap:</strong> Minimum age for Typhoid is 2 years. Minimum age for Cholera (Whole-cell bivalent) is 12 months.</td>
                                </tr>
                                <tr className="bg-amber-50">
                                    <td className="p-3 font-semibold text-amber-800">Rabies PreP</td>
                                    <td className="p-3">IM / ID, Arm</td>
                                    <td className="p-3">Pre-exposure prophylaxis recommended for 2-10 years old due to high bite risk. <strong>Trap:</strong> Never give in gluteal area (unpredictable absorption).</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );

        // --- View 2: Anthro Simulator (8 Cases) ---
        const AnthroSimulator = () => {
            const [submitted, setSubmitted] = useState(false);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState([]);
            const [currentCaseId, setCurrentCaseId] = useState(1);
            const [selections, setSelections] = useState({ measure: "", hrStat: "", rrStat: "", nutStat: "" });

            const cases = {
                1: { title: "1. The 18-Month-Old", prompt: "18-month-old. HR 145, RR 32. WFH Z-score -3.2.", rules: { measure: "Recumbent", hrStat: "Normal", rrStat: "Normal", nutStat: "Severe Wasting (SAM)" }, pearl: "Infants (1m-1y) HR up to 190. Toddlers (1-2y) HR up to 140. A HR of 145 in an 18mo is slightly tachycardic, but WFH <-3 is classic SAM." },
                2: { title: "2. The 4-Year-Old", prompt: "4-year-old. HR 90, RR 35. HFA Z-score -2.5.", rules: { measure: "Standing", hrStat: "Normal", rrStat: "Tachypnea", nutStat: "Stunting" }, pearl: "Preschoolers (3-5y) normal RR is 20-28. RR 35 is tachypneic. HFA between -2 and -3 defines Stunting." },
                3: { title: "3. MUAC Override", prompt: "18-month-old. HR 120, RR 30. WFH -2.5 (MAM). MUAC is 11.0 cm.", rules: { measure: "Recumbent", hrStat: "Normal", rrStat: "Normal", nutStat: "Severe Acute Malnutrition (SAM)" }, pearl: "Regardless of a MAM WFH Z-score, a MUAC < 11.5cm is an independent, immediate diagnostic criterion for SAM." },
                4: { title: "4. The Obese Preschooler", prompt: "4-year-old. HR 85, RR 22. WFH Z-score +3.5.", rules: { measure: "Standing", hrStat: "Normal", rrStat: "Normal", nutStat: "Obese" }, pearl: "WFH > +2 is Overweight. WFH > +3 is Obese. Standing height is strictly used for >= 2 years." },
                5: { title: "5. Severe Stunting & Bradypnea", prompt: "14-month-old. HR 120, RR 18. HFA Z-score -3.5.", rules: { measure: "Recumbent", hrStat: "Normal", rrStat: "Bradypnea", nutStat: "Severe Stunting" }, pearl: "Toddler normal RR is 22-37. RR 18 is bradypneic. HFA < -3 defines Severe Stunting." },
                6: { title: "6. Overweight & Tachycardia", prompt: "10-month-old. HR 200, RR 45. WFH Z-score +2.5.", rules: { measure: "Recumbent", hrStat: "Tachycardia", rrStat: "Normal", nutStat: "Overweight" }, pearl: "Infant max HR is 190. 200 is tachycardic. WFH between +2 and +3 is Overweight." },
                7: { title: "7. School-Age Bradycardia", prompt: "8-year-old. HR 55, RR 20. WFA Z-score -2.5.", rules: { measure: "Standing", hrStat: "Bradycardia", rrStat: "Normal", nutStat: "Underweight" }, pearl: "School-age normal HR is 75-118. HR 55 is bradycardic. WFA < -2 is Underweight." },
                8: { title: "8. Adjustment Rule (+/- 0.7cm)", prompt: "A 2.5-year-old refuses to stand. Measured lying down at 90.0 cm. HR 100, RR 25. WFH Z-score -1.0.", rules: { measure: "Subtract 0.7 cm", hrStat: "Normal", rrStat: "Normal", nutStat: "Normal" }, pearl: "Because gravity compresses the spine when standing, recumbent length is naturally ~0.7cm longer. You must subtract 0.7cm if a child >=2y is measured lying down." }
            };

            const evaluateCase = () => {
                let pts = 100; let fb = []; const activeCase = cases[currentCaseId].rules;
                
                if(selections.measure === activeCase.measure) fb.push({type:'ok', msg: `Measurement: ${activeCase.measure}`});
                else { pts -= 25; fb.push({type:'err', msg: `Wrong Measurement`, rationale: `Expected: ${activeCase.measure}.`}); }
                
                if(selections.hrStat === activeCase.hrStat) fb.push({type:'ok', msg: `HR: ${activeCase.hrStat}`});
                else { pts -= 25; fb.push({type:'err', msg: `Wrong HR`, rationale: `Expected: ${activeCase.hrStat}.`}); }
                
                if(selections.rrStat === activeCase.rrStat) fb.push({type:'ok', msg: `RR: ${activeCase.rrStat}`});
                else { pts -= 25; fb.push({type:'err', msg: `Wrong RR`, rationale: `Expected: ${activeCase.rrStat}.`}); }
                
                if(selections.nutStat === activeCase.nutStat) fb.push({type:'ok', msg: `Diagnosis: ${activeCase.nutStat}`});
                else { pts -= 25; fb.push({type:'err', msg: `Wrong Diagnosis`, rationale: `Expected: ${activeCase.nutStat}.`}); }
                
                fb.push({type: 'info', msg: '🗣️ OSCE REPORTING SCRIPT:', rationale: `"Good morning Doc, presenting my patient. Vitals show a ${selections.hrStat || '[HR]'} heart rate and ${selections.rrStat || '[RR]'} respiratory rate. Because of their age/cooperation, I utilized the ${selections.measure || '[Tool/Adjustment]'}. Based on the parameters, the final assessment is ${selections.nutStat || '[Diagnosis]'}.`});
                fb.push({type: 'pearl', msg: 'Clinical Pearl', rationale: cases[currentCaseId].pearl});

                setScore(Math.max(0, pts)); setFeedback(fb); setSubmitted(true);
            };

            const loadCase = (id) => { setSubmitted(false); setCurrentCaseId(id); setSelections({measure:"", hrStat:"", rrStat:"", nutStat:""}); setFeedback([]); };

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="flex flex-wrap gap-2 border-b-2 border-indigo-200 pb-2">
                        {Object.keys(cases).map(id => (
                            <button key={id} onClick={() => loadCase(parseInt(id))} className={`px-2 py-1 rounded text-xs font-bold transition-colors ${currentCaseId === parseInt(id) ? 'bg-indigo-900 text-white' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>Case {id}</button>
                        ))}
                    </div>
                    <div className="bg-white p-6 rounded shadow border border-slate-200">
                        <div className="bg-indigo-50 border-l-4 border-indigo-600 p-4 rounded mb-6">
                            <h3 className="font-bold text-indigo-800 uppercase tracking-wide text-sm mb-1">{cases[currentCaseId].title}</h3>
                            <p className="text-lg text-slate-800">"{cases[currentCaseId].prompt}"</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div className="space-y-4">
                                <div>
                                    <label className="block font-bold text-slate-700 mb-2">1. Measurement Tool / Rule:</label>
                                    <select disabled={submitted} value={selections.measure} onChange={e=>setSelections({...selections, measure:e.target.value})} className="w-full p-2 border rounded bg-slate-50 text-sm"><option value="">Select...</option><option value="Recumbent">Recumbent Length</option><option value="Standing">Standing Stadiometer</option><option value="Subtract 0.7 cm">Subtract 0.7 cm</option><option value="Add 0.7 cm">Add 0.7 cm</option></select>
                                </div>
                                <div>
                                    <label className="block font-bold text-slate-700 mb-2">2. Nutritional Diagnosis:</label>
                                    <select disabled={submitted} value={selections.nutStat} onChange={e=>setSelections({...selections, nutStat:e.target.value})} className="w-full p-2 border rounded bg-slate-50 text-sm"><option value="">Select...</option><option value="Normal">Normal</option><option value="Severe Wasting (SAM)">Severe Wasting (SAM)</option><option value="Severe Acute Malnutrition (SAM)">Severe Acute Malnutrition (SAM - Override)</option><option value="Wasting (MAM)">Wasting (MAM)</option><option value="Severe Stunting">Severe Stunting</option><option value="Stunting">Stunting</option><option value="Underweight">Underweight</option><option value="Overweight">Overweight</option><option value="Obese">Obese</option></select>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <div>
                                    <label className="block font-bold text-slate-700 mb-2">3. Heart Rate Status:</label>
                                    <select disabled={submitted} value={selections.hrStat} onChange={e=>setSelections({...selections, hrStat:e.target.value})} className="w-full p-2 border rounded bg-slate-50 text-sm"><option value="">Select...</option><option value="Bradycardia">Bradycardia</option><option value="Normal">Normal</option><option value="Tachycardia">Tachycardia</option></select>
                                </div>
                                <div>
                                    <label className="block font-bold text-slate-700 mb-2">4. Respiratory Rate Status:</label>
                                    <select disabled={submitted} value={selections.rrStat} onChange={e=>setSelections({...selections, rrStat:e.target.value})} className="w-full p-2 border rounded bg-slate-50 text-sm"><option value="">Select...</option><option value="Bradypnea">Bradypnea</option><option value="Normal">Normal</option><option value="Tachypnea">Tachypnea</option></select>
                                </div>
                            </div>
                        </div>
                        {!submitted ? <button onClick={evaluateCase} disabled={!selections.measure || !selections.hrStat || !selections.rrStat || !selections.nutStat} className="w-full bg-indigo-600 text-white font-bold py-3 rounded shadow hover:bg-indigo-700 disabled:opacity-50 transition-all">Submit Anthro Assessment</button> : 
                            <div className="p-6 rounded border-2 border-indigo-200 bg-indigo-50">
                                <h3 className="text-xl font-bold text-slate-800 mb-4">Feedback: {score}%</h3>
                                <ul className="space-y-3">
                                    {feedback.map((f, i) => (

        // --- View 3: Advanced Vaccine Simulator (20 Cases) ---
        const AdvancedSimulator = () => {
            const [submitted, setSubmitted] = useState(false);
            const [score, setScore] = useState(0);
            const [feedback, setFeedback] = useState([]);
            const [currentCaseId, setCurrentCaseId] = useState(1);
            const [selectedVaccines, setSelectedVaccines] = useState({});

            const vaccineList = ["BCG", "Hep B", "Penta", "OPV", "IPV", "PCV", "RV1", "RV5", "MCV0", "MCV1(9m)", "MCV2(12m)", "Td", "Tdap", "Varicella", "JEV", "HPV", "Typhoid", "Cholera", "Rabies PreP"];

            const cases = {
                1: { title: "1. Preterm <2kg", prompt: "32wks, 1.8kg, Day 1. Unknown maternal HBsAg.", req: ["BCG", "Hep B"], defer: [], traps: [], ratReq: "Give BCG and Hep B (plus HBIG).", ratTrap: "None.", pearl: "For infants <2kg with unknown HBsAg status, give HBV and HBIG within 12 hours, but this birth dose does not count toward the primary series." },

                15: { title: "15. 3mo no BCG", prompt: "3mo infant. NEVER received BCG. Healthy.", req: ["BCG", "Penta", "OPV", "PCV"], defer: ["IPV"], traps: ["Hep B"], ratReq: "BCG can be given.", ratTrap: "Hep B is in Penta.", pearl: "BCG can be given without prior PPD testing for healthy asymptomatic infants < 1 year old." },
                16: { title: "16. 15y Catch-up", prompt: "15y male. 0 prior vaccines.", req: ["Td", "Hep B", "MCV1(9m)"], defer: [], traps: ["Penta", "HPV"], ratReq: "Td, HepB, MCV catchup.", ratTrap: "Penta age out. HPV NIP is strictly for females.", pearl: "Adolescent catch-up prioritizes Td, Hepatitis B (3 doses), and MR/MMR." },

                19: { title: "19. DTP Limit", prompt: "6y and 11mo old child. 0 prior.", req: ["Penta", "OPV", "MCV1(9m)"], defer: ["IPV"], traps: ["Td", "Tdap"], ratReq: "DTP is still valid.", ratTrap: "Not yet 7.", pearl: "DTP can be given up to 6 years and 364 days old." },
                20: { title: "20. Post-RV Gastro", prompt: "8w old. Rotavirus Gastro at 6w, recovered. Missed 6w visit.", req: ["Penta", "OPV", "PCV", "RV1"], defer: [], traps: ["Hep B"], ratReq: "Give all 6w vaccines.", ratTrap: "Hep B in Penta.", pearl: "Prior rotavirus infection does not confer complete immunity to all serotypes. Complete the vaccine series." }

                "MCV1(9m)": "Sa bakuna sa tigdas, maaaring magkalagnat o magkaroon ng banayad na pantal (rash) pagkalipas ng 5-12 araw.",
                "MCV2(12m)": "Sa MMR, maaaring magkalagnat, mamaga ang pisngi (glands), o magkapantal pagkalipas ng 1-2 linggo.",

            const toggle = (v) => {
                if (selectedVaccines[v]) {

            const generateCounselingScript = (selections) => {
                let adminIM = []; let adminPO = []; let deferScript = []; let seScript = [];
                
                Object.keys(selections).forEach(v => {
                    const route = selections[v].route;
                    if (route === "Defer") deferScript.push(v);
                    else if (route === "Oral") adminPO.push(v);
                    else if (route === "IM" || route === "SC" || route === "ID") adminIM.push(`${v} sa ${selections[v].site === "Mouth" ? "mali" : selections[v].site}`);
                    
                    if (route !== "Defer" && specificSideEffects[v]) {
                        if (!seScript.includes(specificSideEffects[v])) seScript.push(specificSideEffects[v]);

                return finalScript;

            const evaluateCase = () => {

                    fb.push({type: 'ok', msg: "💉 PENTAVALENT SYNERGY: Correctly bundled DTP, Hib, Hep B.", rat: "Minimizes patient distress."});

                activeCase.req.forEach(req => {
                    if (!selectedVaccines[req]) { pts -= 15; fb.push({type: 'err', msg: `Missed: ${req}.`, rat: activeCase.ratReq}); }

                });

                activeCase.traps.forEach(trap => {
                    if (selectedVaccines[trap]) {
                        pts -= 25; fb.push({type: 'err', msg: `Contraindicated: ${trap}.`, rat: activeCase.ratTrap});
                    }
                });

                activeCase.defer.forEach(d => {
                    if (selectedVaccines[d] && selectedVaccines[d].route === "Defer") {
                        pts += 5; fb.push({type: 'ok', msg: `Deferred: ${d}.`});
                    } else if (selectedVaccines[d]) {
                        pts -= 10; fb.push({type: 'warn', msg: `Administered ${d} today.`, rat: "Violates spacing or forces extra stick. Route as 'Defer'."});
                    } else {
                        pts -= 5; fb.push({type: 'warn', msg: `Missed identifying ${d}.`, rat: "Select and route as 'Defer' to verbalize plan."});
                    }
                });

                Object.keys(selectedVaccines).forEach(v => {
                    if (activeCase.traps.includes(v) || selectedVaccines[v].route === "Defer") return; 
                    const d = selectedVaccines[v];
                    if (d.route === "" || d.site === "") { pts -= 10; fb.push({type: 'err', msg: `Missing Route/Site for ${v}.`}); return; }
                    
                    const isSC = (d.route === "SC"); const isIM = (d.route === "IM");

                            <div className="p-4 rounded border-2 border-slate-200 bg-slate-50">

                            <div className="space-y-4 text-sm">
                                <div>
                                    <span className="font-bold text-blue-800">To Patient:</span>
                                    <p className="italic mt-1 text-slate-700">"Babakunahan ko na po siya. Paki-hawakan na lang po siya nang maigi."</p>
                                </div>
                                <div>
                                    <span className="font-bold text-indigo-800">To Consultant:</span>
                                    <p className="italic mt-1 text-slate-700">"The mode of administration for <span className="font-bold">[vaccine name]</span> vaccine is intradermal. I am pulling the patient’s skin taut before I insert the needle, with the bevel of the needle parallel to the skin. I am now slowly injecting the vaccine to the patient. After injecting, I am withdrawing the needle slowly."</p>
                                </div>
                            </div>
                        </div>

                        {/* Intramuscular */}
                        <div className="border border-slate-200 rounded p-4 bg-slate-50">
                            <h4 className="font-bold text-slate-800 mb-3 bg-slate-200 py-1 px-2 rounded">B. Intramuscular (IM)</h4>
                            <div className="space-y-4 text-sm">
                                <div>
                                    <span className="font-bold text-blue-800">To Patient:</span>
                                    <p className="italic mt-1 text-slate-700">"Babakunahan ko na po siya. Paki-hawakan na lang po siya nang maigi."</p>
                                </div>
                                <div>
                                    <span className="font-bold text-indigo-800">To Consultant:</span>
                                    <p className="italic mt-1 text-slate-700">"The mode of administration for <span className="font-bold">[vaccine name]</span> vaccine is intramuscular. I am pulling the patient’s skin taut before I insert the needle, with the bevel of the needle at a 90° angle. I am now slowly injecting the vaccine to the patient. After injecting, I am withdrawing the needle slowly."</p>
                                </div>
                            </div>
                        </div>
                        
                        {/* Subcutaneous */}
                        <div className="border border-slate-200 rounded p-4 bg-slate-50">
                            <h4 className="font-bold text-slate-800 mb-3 bg-slate-200 py-1 px-2 rounded">C. Subcutaneous (SC)</h4>
                            <div className="space-y-4 text-sm">
                                <div>
                                    <span className="font-bold text-blue-800">To Patient:</span>
                                    <p className="italic mt-1 text-slate-700">"Babakunahan ko na po siya. Paki-hawakan na lang po siya nang maigi."</p>
                                </div>
                                <div>
                                    <span className="font-bold text-indigo-800">To Consultant:</span>
                                    <p className="italic mt-1 text-slate-700">"The mode of administration for <span className="font-bold">[vaccine name]</span> vaccine is subcutaneous. First, I clean the injection site using cotton and alcohol, making sure I wipe from the center going outward. Then, I pinch the patient’s fatty tissue before inserting the needle, with the bevel up. I aspirate to check if any blood vessels are hit and since there is no blood aspirated, I can now inject the vaccine into the patient. For subcutaneous administration, this is done at a 45° angle. After injecting, I slowly withdraw the needle, applying pressure with my [non-dominant] hand using a cotton. Once completely out, I tape the cotton ball and dispose of the syringe properly."</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                {/* Section 4: Post-Administration */}
                <div className="bg-white shadow rounded border border-slate-200 p-6">
                    <h3 className="text-xl font-bold text-teal-800 border-b pb-2 mb-4 flex items-center gap-2">
                        <span className="bg-teal-100 text-teal-800 py-1 px-3 rounded-full text-sm">Step 4</span> Sample Reporting of Findings
                    </h3>
                    
                    <div className="space-y-6">
                        {/* Consultant Documentation */}
                        <div className="bg-indigo-50 p-4 rounded border-l-4 border-indigo-500">
                            <h4 className="font-bold text-indigo-900 mb-2">📝 To Consultant (Documentation phase):</h4>
                            <p className="italic text-slate-800">"After administering the vaccines, we must document all these in the patient’s record. We should put the date of administration, name of vaccine, vaccine lot number, vaccine manufacturer, and administration site."</p>
                        </div>
                        
                        {/* Patient Counseling */}
                        <div className="bg-blue-50 p-4 rounded border-l-4 border-blue-500">
                            <h4 className="font-bold text-blue-900 mb-2">🗣️ To Patient / Guardian (Post-admin & Adverse Effects):</h4>
                            <p className="italic text-slate-800">"Nabigay na po ang <span className="font-bold text-blue-700">[vaccine name]</span> vaccine kay <span className="font-bold text-blue-700">[patient’s name]</span>. Oobserbahan lang po natin ng 15-20 minutes kung magkakaroon ng reaksyon, tapos pwede na po kayong umuwi. Maari pong makaramdam ang anak ninyo ng paglalagnat o kaya pagbigat, pamumula o pagkati sa parte ng pinagtusukan. Normal lang po iyon, pero kung hindi nawawala matapos ang ilang araw, magpatingin na po kayo sa doktor."</p>
                            
                            <div className="mt-4 pt-4 border-t border-blue-200">
                                <span className="font-bold text-blue-900 text-sm">If Multiple Doses are needed:</span>
                                <p className="italic text-slate-800 mt-1 text-sm">"Pakitandaan na may <span className="font-bold text-blue-700">[number of doses]</span> pang injection na kailangan gawin para makumpleto ang bakuna. Follow-up po sila makalipas ang <span className="font-bold text-blue-700">[number of weeks/months]</span> na linggo/buwan."</p>
                            </div>
                        </div>

                        {/* Full Example */}
                        <div className="bg-emerald-50 p-4 rounded border border-emerald-300">
                            <h4 className="font-bold text-emerald-900 mb-2">🌟 Example Script: Administration of Hep B at Birth</h4>
                            <p className="text-slate-700 italic">"Nabigay na po ang Hepatitis B vaccine kay James. Oobserbahan lang po natin ng 15-20 minutes kung magkakaroon ng reaksyon, tapos pwede na po kayong umuwi. Maari pong makaramdam ang anak ninyo ng paglalagnat o kaya pagbigat, pamumula o pagkati sa parte ng pinagtusukan. Normal lang po iyon, pero kung hindi nawawala matapos ang 1-2 araw, magpatingin na po kayo sa doktor. Pakitandaan din po na may dalawa pang injection/doses na kailangan gawin para makumpleto ang bakuna. Follow-up po sila makalipas ang 1-2 na buwan."</p>
                        </div>
                    </div>
                </div>

            </div>
        );

        const App = () => {
            const [view, setView] = useState('ref');
            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <nav className="w-full md:w-64 bg-slate-900 text-white p-6 shadow-xl flex-shrink-0">
                        <h1 className="text-xl font-bold text-emerald-400">UPCM Pedia OSCE</h1>
                        <p className="text-xs text-slate-400 mt-1 uppercase tracking-wider mb-6">LU5 Master Trainer</p>
                        <ul className="space-y-2">
                            <li><button onClick={() => setView('ref')} className={`w-full text-left p-2 rounded font-bold transition-colors ${view === 'ref' ? 'bg-emerald-700' : 'hover:bg-slate-800'}`}>1. Ultimate Cheat Sheet</button></li>
                            <li><button onClick={() => setView('sim-anthro')} className={`w-full text-left p-2 rounded font-bold transition-colors ${view === 'sim-anthro' ? 'bg-emerald-700' : 'hover:bg-slate-800'}`}>2. Anthro/SAM Sim (8)</button></li>
                            <li><button onClick={() => setView('sim-vac')} className={`w-full text-left p-2 rounded font-bold transition-colors ${view === 'sim-vac' ? 'bg-emerald-700' : 'hover:bg-slate-800'}`}>3. Vaccine Sim (20 Cases)</button></li>
                            <li><button onClick={() => setView('procedure')} className={`w-full text-left p-2 rounded font-bold transition-colors ${view === 'procedure' ? 'bg-emerald-700' : 'hover:bg-slate-800'}`}>4. Procedure & Scripts</button></li>
                        </ul>
                    </nav>
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto bg-slate-100 h-screen">
                        <div className="max-w-5xl mx-auto">
                            {view === 'ref' && <MasterReference />}
                            {view === 'sim-anthro' && <AnthroSimulator />}
                            {view === 'sim-vac' && <AdvancedSimulator />}
                            {view === 'procedure' && <ProcedureScript />}
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
